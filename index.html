<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스쿨 톡 (Ghost ID Fixed Version)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        html, body { height: 100%; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; overflow: hidden; }
        .container { width: 100%; height: 100%; display: flex; flex-direction: column; background: white; overflow: hidden; }
        
        #login-screen { text-align: center; padding-top: 15vh; height: 100%; box-sizing: border-box; background: #f0f2f5; }
        .login-box { display: inline-block; text-align: left; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; }
        select, input { padding: 12px; margin: 8px 0 20px 0; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        button { background-color: #4CAF50; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background-color: #45a049; }
        .btn-teacher { background-color: #2196F3; margin-top: 10px; }
        .btn-teacher:hover { background-color: #0b7dda; }

        #invite-zone { background: #fff3cd; color: #856404; padding: 10px 20px; border-bottom: 2px solid #ffeeba; display: none; flex-direction: column; gap: 5px; flex-shrink: 0; }
        .invite-card { display: flex; justify-content: space-between; align-items: center; background: white; padding: 8px 15px; border-radius: 5px; border: 1px solid #ffeeba; }
        .invite-btn-zone button { padding: 5px 12px; margin-left: 5px; font-size: 13px; width: auto; display: inline-block; }

        .header { background: #4CAF50; color: white; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; box-sizing: border-box; flex-shrink: 0; }
        .header button { background: #ff5252; width: auto; padding: 5px 15px; font-size: 14px; }
        
        .main-area { display: flex; flex: 1; overflow: hidden; height: calc(100% - 60px); }
        .sidebar { width: 250px; background: #f9f9f9; border-right: 1px solid #ddd; padding: 15px; overflow-y: auto; box-sizing: border-box; flex-shrink: 0; }
        .sidebar h3 { margin-top: 0; font-size: 14px; border-bottom: 2px solid #ddd; padding-bottom: 10px; color: #333; }
        .user-list { list-style: none; padding: 0; margin: 0; }
        .user-list li { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px; border-radius: 4px; transition: 0.2s; }
        .user-list li:hover { background: #e2f0d9; color: #2e7d32; font-weight: bold; }
        
        #student-grid { display: flex; flex-direction: row; gap: 12px; padding: 12px; flex: 1; background: #e9ecef; box-sizing: border-box; overflow-x: auto; align-items: stretch; }
        .chat-card { background: white; border-radius: 8px; border: 1px solid #ccc; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); box-sizing: border-box; flex: 1; min-width: 340px; height: 100%; }

        .chat-card-header { background: #4CAF50; color: white; padding: 10px 12px; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .chat-card-header .btn-group { display: flex; gap: 5px; }
        .chat-card-header button { background: #fff; color: #333; font-size: 11px; padding: 4px 8px; border-radius: 4px; border: 1px solid #ccc; width: auto; font-weight: normal; cursor: pointer; }
        .chat-card-header button:hover { background: #eee; }
        .chat-card-header button.btn-danger { background: #ff5252; color: white; border: none; font-weight: bold; }
        .chat-card-header button.btn-danger:hover { background: #e04444; }
        .chat-card-header button.btn-warning { background: #ff9800; color: white; border: none; font-weight: bold; }
        .chat-card-header button.btn-warning:hover { background: #e68a00; }

        .chat-card-messages { flex: 1; padding: 12px; overflow-y: auto; background: #e5ddd5; font-size: 13px; }
        .msg-line { margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg-line.me { align-items: flex-end; }
        .msg-line.other { align-items: flex-start; }
        .msg-sender { font-size: 11px; color: #666; margin-bottom: 2px; }
        .msg-text { background: white; padding: 8px 14px; border-radius: 12px; max-width: 80%; word-break: break-all; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg-line.me .msg-text { background: #dcf8c6; }
        .msg-time { font-size: 10px; color: #999; margin-top: 2px; }

        .chat-card-input-area { padding: 10px; background: #f0f0f0; display: flex; border-top: 1px solid #ddd; align-items: center; flex-shrink: 0; }
        .chat-card-input-area input { margin: 0; padding: 10px 15px; border-radius: 20px; border: 1px solid #ccc; font-size: 13px; flex: 1; }
        .chat-card-input-area button { width: 60px; font-size: 13px; padding: 9px 0; border-radius: 20px; margin-left: 6px; background-color: #4CAF50; font-weight: bold; }

        #teacher-screen { display: none; height: 100%; flex-direction: column; flex: 1; overflow: hidden; }
        #teacher-grid { display: flex; flex-wrap: wrap; gap: 12px; padding: 12px; flex: 1; overflow-y: auto; background: #f5f5f5; box-sizing: border-box; }
        #teacher-grid .chat-card { flex: 1 1 calc(33.33% - 12px); min-width: 340px; height: calc(50% - 6px); }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h2>💬 스쿨 톡 에 오신 것을 환영합니다!</h2>
        <div class="login-box">
            <label>학년</label>
            <select id="grade">
                <option value="1학년">1학년</option>
                <option value="2학년">2학년</option>
                <option value="3학년">3학년</option>
                <option value="4학년">4학년</option>
                <option value="5학년">5학년</option>
                <option value="6학년">6학년</option>
            </select>
            <label>반</label>
            <select id="classNum">
                <option value="1반">1반</option>
                <option value="2반">2반</option>
                <option value="3반">3반</option>
                <option value="4반">4반</option>
                <option value="5반">5반</option>
                <option value="6반">6반</option>
            </select>
            <label>본인 이름 (실명)</label>
            <input type="text" id="username" placeholder="이름을 입력하세요">
            <button onclick="login(false)">학생으로 입장하기</button>
            <button onclick="login(true)" class="btn-teacher">👨‍🏫 선생님으로 입장하기</button>
        </div>
    </div>

    <div id="invite-zone"></div>

    <div id="chat-screen" style="display:none; flex-direction:column; height:100%;">
        <div class="header">
            <span id="welcome-msg">환영합니다!</span>
            <button onclick="handleLogout()">로그아웃</button>
        </div>
        <div class="main-area">
            <div class="sidebar">
                <h3>👥 클릭시 1:1 대화방 개설</h3>
                <ul class="user-list" id="user-list-ul"></ul>
            </div>
            <div id="student-grid"></div>
        </div>
    </div>

    <div id="teacher-screen">
        <div class="header" style="background: #2196F3;">
            <span id="teacher-welcome-msg">👨‍🏫 선생님 대시보드</span>
            <button onclick="handleLogout()">로그아웃</button>
        </div>
        <div style="padding: 12px 20px; background: #e3f2fd; font-weight: bold; border-bottom: 1px solid #bbdefb; color: #1565c0; flex-shrink: 0;">
            📢 참여할 대화방 선택: <span id="selected-room-title" style="color: #d32f2f; background: white; padding: 2px 8px; border-radius: 4px; border: 1px solid #ccc;">채팅창 하나를 클릭하세요!</span>
        </div>
        <div id="teacher-grid"></div>
        <div class="input-area" id="teacher-input-area" style="border-top: 3px solid #2196F3; display: none; padding:15px; background:#f0f0f0; display: flex; align-items: center; flex-shrink: 0;">
            <input type="text" id="teacher-msg-input" placeholder="선택한 방에 메시지 전송..." onkeypress="if(event.keyCode==13) sendTeacherMessage()" style="flex: 1; margin: 0; padding: 12px; border-radius: 6px;">
            <button onclick="sendTeacherMessage()" style="background-color: #2196F3; border:none; padding:12px; color:white; border-radius:6px; margin-left:10px; width:90px; font-weight: bold; cursor: pointer;">전송</button>
        </div>
    </div>
</div>

<script>
    let database;
    try {
        const firebaseConfig = { databaseURL: "https://school-chat-7051e-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        database = firebase.database();
    } catch (e) {
        alert("파이어베이스 설정 에러!");
    }

    let myInfo = {};
    let myUserRef = null;
    let currentTeacherTarget = "";
    let localRooms = {};
    let localMessages = [];

    window.onload = function() {
        if(localStorage.getItem('school_chat_grade')) document.getElementById('grade').value = localStorage.getItem('school_chat_grade');
        if(localStorage.getItem('school_chat_classNum')) document.getElementById('classNum').value = localStorage.getItem('school_chat_classNum');
        if(localStorage.getItem('school_chat_name')) document.getElementById('username').value = localStorage.getItem('school_chat_name');
    };

    function login(isTeacher = false) {
        if(!database) { alert("파이어베이스가 연결되지 않았습니다."); return; }

        try {
            const grade = document.getElementById('grade').value;
            const classNum = document.getElementById('classNum').value;
            const name = document.getElementById('username').value.trim();

            if (name === "") { alert("이름을 입력해주세요!"); return; }

            if (isTeacher) {
                const masterPassword = prompt("👨‍🏫 선생님 전용 암호를 입력하세요:");
                if (masterPassword !== "school1234") { alert("❌ 암호가 일치하지 않습니다."); return; }
            }

            localStorage.setItem('school_chat_grade', grade);
            localStorage.setItem('school_chat_classNum', classNum);
            localStorage.setItem('school_chat_name', name);

            myInfo = { grade, classNum, name, isTeacher };
            document.getElementById('login-screen').style.display = 'none';

            if (isTeacher) {
                document.getElementById('teacher-screen').style.display = 'flex';
                document.getElementById('teacher-welcome-msg').innerText = `👨‍🏫 ${grade} ${classNum} ${name} 선생님 (관찰 모드)`;
            } else {
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('welcome-msg').innerText = `🏫 ${grade} ${classNum} 【${name}】 학생`;

                const defaultRoomId = `group_${grade}_${classNum}`;
                database.ref(`rooms/${defaultRoomId}`).once('value', snap => {
                    if(!snap.exists()) {
                        database.ref(`rooms/${defaultRoomId}`).set({
                            roomId: defaultRoomId,
                            title: `${grade} ${classNum} 단체방`,
                            grade: grade,
                            classNum: classNum,
                            isDefault: true,
                            creator: "시스템",
                            members: { [name]: true }
                        });
                    } else {
                        database.ref(`rooms/${defaultRoomId}/members/${name}`).set(true);
                    }
                    database.ref(`rooms/${defaultRoomId}/members/${name}`).onDisconnect().remove();
                });

                // [수정된 부분] 무작위 ID(push) 대신 학년_반_이름으로 고정된 키 사용
                const userKey = `user_${grade}_${classNum}_${name}`; 
                myUserRef = database.ref(`users/${userKey}`);
                myUserRef.set(myInfo);
                myUserRef.onDisconnect().remove(); // 창을 닫아도 삭제됨
            }
            startRealtimeListening();
        } catch (error) {
            alert("로그인 중 에러: " + error.message);
        }
    }

    function handleLogout() {
        // [수정된 부분] 로컬스토리지 완벽 초기화 (다음 번엔 무조건 백지상태부터)
        localStorage.removeItem('school_chat_grade');
        localStorage.removeItem('school_chat_classNum');
        localStorage.removeItem('school_chat_name');

        if (!myInfo.isTeacher && myInfo.name) {
            // 단체방에서 나감
            const defaultRoomId = `group_${myInfo.grade}_${myInfo.classNum}`;
            database.ref(`rooms/${defaultRoomId}/members/${myInfo.name}`).remove();
            
            // 본인이 속해있던 모든 개인방에서도 자동 강제 퇴장 처리
            for(let id in localRooms) {
                if(!localRooms[id].isDefault && localRooms[id].members && localRooms[id].members[myInfo.name]) {
                    database.ref(`rooms/${id}/members/${myInfo.name}`).remove();
                }
            }
        }
        
        if (myUserRef) {
            myUserRef.remove().then(() => { location.reload(); }).catch(() => { location.reload(); });
        } else {
            location.reload();
        }
    }

    function startRealtimeListening() {
        database.ref('users').on('value', snapshot => {
            if (myInfo.isTeacher) return;
            const ul = document.getElementById('user-list-ul');
            ul.innerHTML = "";
            snapshot.forEach(child => {
                let u = child.val();
                if(u.grade === myInfo.grade && u.name !== myInfo.name) {
                    let li = document.createElement('li');
                    li.innerText = `👤 [${u.classNum}] ${u.name}`;
                    li.onclick = () => confirmAndCreateRoom(u.name);
                    ul.appendChild(li);
                }
            });
        });

        database.ref('rooms').on('value', snapshot => {
            localRooms = {};
            snapshot.forEach(child => { localRooms[child.key] = child.val(); });
            updateViews();
        });

        database.ref('messages').on('value', snapshot => {
            localMessages = [];
            snapshot.forEach(child => { localMessages.push(child.val()); });
            updateViews();
        });

        if (!myInfo.isTeacher) {
            database.ref('invitations').on('value', snapshot => {
                const zone = document.getElementById('invite-zone');
                zone.innerHTML = "";
                let hasInvite = false;

                snapshot.forEach(child => {
                    let inv = child.val();
                    if(inv.to === myInfo.name && inv.status === 'pending') {
                        hasInvite = true;
                        let div = document.createElement('div');
                        div.className = 'invite-card';
                        div.innerHTML = `
                            <div>🔔 <b>${inv.from}</b>님이 [<b>${inv.roomTitle}</b>] 방으로 초대했습니다!</div>
                            <div class="invite-btn-zone">
                                <button style="background:#4CAF50; border:none; color:white; padding:6px 12px; border-radius:4px; cursor:pointer;" onclick="respondInvite('${child.key}', '${inv.roomId}', true)">수락</button>
                                <button style="background:#ff5252; border:none; color:white; padding:6px 12px; border-radius:4px; cursor:pointer;" onclick="respondInvite('${child.key}', '${inv.roomId}', false)">거절</button>
                            </div>
                        `;
                        zone.appendChild(div);
                    }
                });
                zone.style.display = hasInvite ? 'flex' : 'none';
            });
        }
    }

    function updateViews() {
        if(myInfo.isTeacher) renderTeacherDashboard();
        else renderStudentMultiScreen();
    }

    function confirmAndCreateRoom(targetName) {
        let myGeneralRoomCount = 0;
        let targetGeneralRoomCount = 0;

        for(let id in localRooms) {
            let r = localRooms[id];
            if(!r.isDefault && r.members) {
                if(r.members[myInfo.name] === true) myGeneralRoomCount++;
                if(r.members[targetName] === true) targetGeneralRoomCount++;
            }
        }

        if (myGeneralRoomCount >= 1) {
            alert("❌ 이미 참여 중인 개인 채팅방이 있습니다! 기존 방을 없애거나 나간 후 새로 만들어주세요.");
            return;
        }

        if (targetGeneralRoomCount >= 1) {
            alert(`❌ ${targetName} 학생은 이미 다른 개인 채팅방에 참여 중이라 1:1 방을 만들 수 없습니다.`);
            return;
        }

        const choice = confirm(`💬 ${targetName} 학생과 1:1 대화방을 만드시겠습니까?`);
        if (!choice) return;

        const roomId = `room_${Date.now()}_${Math.floor(Math.random()*1000)}`;
        database.ref(`rooms/${roomId}`).set({
            roomId: roomId,
            title: `${myInfo.name}, ${targetName}의 대화방`,
            grade: myInfo.grade,
            classNum: myInfo.classNum,
            creator: myInfo.name, 
            members: { [myInfo.name]: true, [targetName]: true }
        });
    }

    function inviteFriend(roomId, currentMemberCount) {
        const room = localRooms[roomId];
        if(!room.isDefault && currentMemberCount >= 5) {
            alert("❌ 인원 초과! 개인 채팅방은 방장 포함 최대 5명까지만 들어올 수 있습니다.");
            return;
        }
        
        const friendName = prompt("초대할 학생의 이름을 정확하게 입력하세요:");
        if(!friendName) return;
        
        if(room.members && room.members[friendName]) {
            alert("이미 방에 있는 학생입니다.");
            return;
        }

        let targetGeneralRoomCount = 0;
        for(let id in localRooms) {
            let r = localRooms[id];
            if(!r.isDefault && r.members && r.members[friendName] === true) {
                targetGeneralRoomCount++;
            }
        }

        if (targetGeneralRoomCount >= 1) {
            alert(`❌ ${friendName} 학생은 이미 다른 개인 채팅방에 참여 중이라 초대할 수 없습니다.`);
            return;
        }

        database.ref('invitations').push({ roomId: roomId, roomTitle: room.title, from: myInfo.name, to: friendName, status: 'pending' });
        alert(`${friendName} 학생에게 초대장을 보냈습니다!`);
    }

    function respondInvite(inviteKey, roomId, isAccept) {
        if(isAccept) {
            let generalRoomCount = 0;
            for(let id in localRooms) {
                let r = localRooms[id];
                if(!r.isDefault && r.members && r.members[myInfo.name] === true) generalRoomCount++;
            }
            if(generalRoomCount >= 1) {
                alert("❌ 이미 다른 개인 채팅방에 참여 중이라 초대를 받을 수 없습니다!");
                database.ref(`invitations/${inviteKey}`).remove();
                return;
            }
            const room = localRooms[roomId];
            const currentCount = room.members ? Object.keys(room.members).length : 0;
            if(!room.isDefault && currentCount >= 5) {
                alert("❌ 방 인원이 꽉 차서 들어갈 수 없습니다.");
                database.ref(`invitations/${inviteKey}`).remove();
                return;
            }
            database.ref(`rooms/${roomId}/members/${myInfo.name}`).set(true);
        }
        database.ref(`invitations/${inviteKey}`).remove();
    }

    function destroyRoom(roomId) {
        if (!confirm("⚠️ 정말 이 방을 완전히 삭제하시겠습니까?\n방과 대화 내용이 모두 사라집니다.")) return;
        database.ref(`rooms/${roomId}`).remove();
        database.ref('messages').once('value', snapshot => {
            snapshot.forEach(child => { if(child.val().roomId === roomId) database.ref(`messages/${child.key}`).remove(); });
        });
    }

    function clearRoomMessages(roomId) {
        if (!confirm("⚠️ 이 단체방의 모든 대화 내용을 지우시겠습니까? (방은 남고 내용만 사라집니다)")) return;
        database.ref('messages').once('value', snapshot => {
            snapshot.forEach(child => { if(child.val().roomId === roomId) database.ref(`messages/${child.key}`).remove(); });
        });
    }

    function leaveRoom(roomId) {
        if (!confirm("🚪 이 방에서 나가시겠습니까?")) return;
        database.ref(`rooms/${roomId}/members/${myInfo.name}`).remove();
    }

    function renderStudentMultiScreen() {
        let activeInputId = document.activeElement ? document.activeElement.id : null;
        let savedTexts = {};
        document.querySelectorAll('.chat-card-input-area input').forEach(input => {
            savedTexts[input.id] = input.value;
        });

        const grid = document.getElementById('student-grid');
        grid.innerHTML = "";

        let myActiveRooms = [];
        for(let id in localRooms) {
            if(localRooms[id].members && localRooms[id].members[myInfo.name] === true) {
                myActiveRooms.push(localRooms[id]);
            }
        }

        myActiveRooms.forEach(room => {
            const memberCount = Object.keys(room.members || {}).length;
            const isCreator = room.creator === myInfo.name;
            const card = document.createElement('div');
            card.className = 'chat-card';

            const header = document.createElement('div');
            header.className = 'chat-card-header';
            header.style.background = room.isDefault ? '#4CAF50' : '#673AB7';

            let actionBtn = "";
            if (!room.isDefault) {
                if (isCreator) actionBtn = `<button class="btn-danger" onclick="destroyRoom('${room.roomId}')">❌ 방 폭파</button>`;
                else actionBtn = `<button class="btn-warning" onclick="leaveRoom('${room.roomId}')">🚪 나가기</button>`;
            }

            const maxLimit = room.isDefault ? 50 : 5;
            header.innerHTML = `
                <div>${room.title} (${memberCount}/${maxLimit}명)</div>
                <div class="btn-group">
                    <button onclick="inviteFriend('${room.roomId}', ${memberCount})">➕ 초대</button>
                    ${actionBtn}
                </div>
            `;
            card.appendChild(header);

            const msgArea = document.createElement('div');
            msgArea.className = 'chat-card-messages';
            localMessages.forEach(m => {
                if(m.roomId === room.roomId) {
                    const isMe = m.sender === myInfo.name;
                    msgArea.innerHTML += `
                        <div class="msg-line ${isMe ? 'me' : 'other'}">
                            <div class="msg-sender">${isMe ? '나' : m.sender}</div>
                            <div class="msg-text">${m.text}</div>
                            <div class="msg-time">${m.time}</div>
                        </div>`;
                }
            });
            card.appendChild(msgArea);

            const inputArea = document.createElement('div');
            inputArea.className = 'chat-card-input-area';
            
            let currentInputId = `input-${room.roomId}`;
            inputArea.innerHTML = `
                <input type="text" id="${currentInputId}" placeholder="대화 입력..." onkeypress="if(event.keyCode==13) sendMultiMessage('${room.roomId}')">
                <button onclick="sendMultiMessage('${room.roomId}')">전송</button>
            `;
            card.appendChild(inputArea);
            grid.appendChild(card);
            msgArea.scrollTop = msgArea.scrollHeight;

            let newInput = document.getElementById(currentInputId);
            if (newInput && savedTexts[currentInputId]) {
                newInput.value = savedTexts[currentInputId];
            }
        });

        if (activeInputId) {
            let activeEl = document.getElementById(activeInputId);
            if (activeEl) {
                activeEl.focus();
                activeEl.selectionStart = activeEl.selectionEnd = activeEl.value.length;
            }
        }
    }

    function sendMultiMessage(roomId) {
        const input = document.getElementById(`input-${roomId}`);
        const text = input.value.trim();
        if(text === "") return;
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        database.ref('messages').push({ roomId: roomId, sender: myInfo.name, text: text, time: timeStr, grade: myInfo.grade, classNum: myInfo.classNum });
        input.value = "";
    }

    function renderTeacherDashboard() {
        const grid = document.getElementById('teacher-grid');
        grid.innerHTML = "";
        let activeRoomCount = 0;

        for (let id in localRooms) {
            const room = localRooms[id];
            if (room.grade === myInfo.grade && room.classNum === myInfo.classNum) {
                const currentMemberCount = Object.keys(room.members || {}).length;
                if (currentMemberCount <= 0) continue; 

                activeRoomCount++;
                const card = document.createElement('div');
                card.className = 'chat-card';
                card.style.border = currentTeacherTarget === room.roomId ? "3px solid #2196F3" : "1px solid #ccc";
                card.style.cursor = "pointer";
                card.onclick = () => {
                    currentTeacherTarget = room.roomId;
                    document.getElementById('selected-room-title').innerText = room.title;
                    document.getElementById('teacher-input-area').style.display = 'flex';
                    updateViews();
                };

                const header = document.createElement('div');
                header.className = 'chat-card-header';
                header.style.background = room.isDefault ? '#4CAF50' : '#2196F3';
                
                let teacherActionBtn = "";
                if(!room.isDefault) {
                    teacherActionBtn = `<button class="btn-danger" onclick="event.stopPropagation(); destroyRoom('${room.roomId}')">❌ 방 폭파</button>`;
                } else {
                    teacherActionBtn = `<button class="btn-warning" onclick="event.stopPropagation(); clearRoomMessages('${room.roomId}')">🧹 대화 초기화</button>`;
                }

                header.innerHTML = `
                    <div style="pointer-events: none;">🔍 [관찰중] ${room.title} (${currentMemberCount}명)</div>
                    <div class="btn-group">${teacherActionBtn}</div>
                `;
                card.appendChild(header);

                const msgArea = document.createElement('div');
                msgArea.className = 'chat-card-messages';
                localMessages.forEach(m => {
                    if(m.roomId === room.roomId) {
                        msgArea.innerHTML += `<div style="margin-bottom:5px;"><strong>${m.sender}:</strong> ${m.text} <span style="font-size:9px; color:#888;">(${m.time})</span></div>`;
                    }
                });
                card.appendChild(msgArea);
                grid.appendChild(card);
                msgArea.scrollTop = msgArea.scrollHeight;
            }
        }
        if(activeRoomCount === 0) grid.innerHTML = `<div style="padding:40px; text-align:center; width:100%; color:#666;">활성화된 채팅방이 없습니다.</div>`;
    }

    function sendTeacherMessage() {
        const input = document.getElementById('teacher-msg-input');
        const text = input.value.trim();
        if (text === "" || !currentTeacherTarget) return;
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        database.ref('messages').push({ roomId: currentTeacherTarget, sender: `${myInfo.name}(선생님)`, text: text, time: timeStr, grade: myInfo.grade, classNum: myInfo.classNum });
        input.value = "";
    }
</script>
</body>
</html>
