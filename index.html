<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스쿨 톡</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* 기본 스타일 */
        html, body { height: 100%; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; overflow: hidden; }
        .container { width: 100%; height: 100%; display: flex; flex-direction: column; background: white; overflow: hidden; }
        
        #login-screen { text-align: center; padding-top: 15vh; height: 100%; box-sizing: border-box; background: #f0f2f5; }
        .login-box { display: inline-block; text-align: left; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; }
        select, input { padding: 12px; margin: 8px 0 20px 0; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        button { background-color: #4CAF50; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background-color: #45a049; }
        .btn-teacher { background-color: #2196F3; margin-top: 10px; }
        .btn-teacher:hover { background-color: #0b7dda; }

        .header { background: #4CAF50; color: white; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; box-sizing: border-box; flex-shrink: 0; }
        .header button { background: #ff5252; width: auto; padding: 5px 15px; font-size: 14px; }
        
        .main-area { display: flex; flex: 1; overflow: hidden; height: calc(100% - 60px); }
        .sidebar { width: 250px; background: #f9f9f9; border-right: 1px solid #ddd; padding: 15px; overflow-y: auto; box-sizing: border-box; flex-shrink: 0; }
        .sidebar h3 { margin-top: 0; font-size: 14px; border-bottom: 2px solid #ddd; padding-bottom: 10px; color: #333; }
        .user-list { list-style: none; padding: 0; margin: 0; }
        .user-list li { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; border-radius: 4px; transition: 0.2s; }
        .user-list li:hover { background: #e2f0d9; }
        
        #student-grid { display: flex; flex-direction: row; gap: 12px; padding: 12px; flex: 1; background: #e9ecef; box-sizing: border-box; overflow-x: auto; align-items: stretch; }
        .chat-card { background: white; border-radius: 8px; border: 1px solid #ccc; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); box-sizing: border-box; flex: 1; min-width: 340px; height: 100%; }

        .chat-card-header { background: #4CAF50; color: white; padding: 10px 12px; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; gap: 5px; }
        .chat-card-header .btn-group { display: flex; gap: 4px; }
        .chat-card-header button { background: #fff; color: #333; font-size: 11px; padding: 4px 8px; border-radius: 4px; border: 1px solid #ccc; width: auto; font-weight: normal; cursor: pointer; }
        .chat-card-header button:hover { background: #eee; }
        .btn-game { background: #ffeb3b !important; color: #000 !important; font-weight: bold !important; border: 1px solid #fbc02d !important; }
        .btn-game:hover { background: #fdd835 !important; }

        .chat-card-messages { flex: 1; padding: 12px; overflow-y: auto; background: #e5ddd5; font-size: 13px; }
        .msg-line { margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg-line.me { align-items: flex-end; }
        .msg-line.other { align-items: flex-start; }
        .msg-sender { font-size: 11px; color: #666; margin-bottom: 2px; font-weight: bold; }
        .msg-text { background: white; padding: 8px 14px; border-radius: 12px; max-width: 80%; word-break: break-all; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg-line.me .msg-text { background: #dcf8c6; }
        .msg-time { font-size: 10px; color: #999; margin-top: 2px; }

        .chat-card-input-area { padding: 10px; background: #f0f0f0; display: flex; border-top: 1px solid #ddd; align-items: center; flex-shrink: 0; }
        .chat-card-input-area input { margin: 0; padding: 10px 15px; border-radius: 20px; border: 1px solid #ccc; font-size: 13px; flex: 1; }
        .chat-card-input-area button { width: 60px; font-size: 13px; padding: 9px 0; border-radius: 20px; margin-left: 6px; background-color: #4CAF50; font-weight: bold; }

        /* 선생님 대시보드 구조 */
        #teacher-screen { display: none; height: 100%; flex-direction: column; }
        #teacher-grid { display: flex; flex-wrap: wrap; gap: 12px; padding: 12px; flex: 1; overflow-y: auto; background: #f5f5f5; box-sizing: border-box; }
        #teacher-grid .chat-card { flex: 1 1 calc(33.33% - 12px); min-width: 340px; height: calc(50% - 6px); }

        /* 🎮 산성비 게임 전용 스타일 */
        #game-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .game-wrapper { display: flex; width: 850px; height: 550px; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .game-play-area { flex: 1; display: flex; flex-direction: column; background: #1e1e1e; position: relative; }
        .game-header { height: 50px; background: #333; color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-weight: bold; flex-shrink: 0; }
        .game-sky { flex: 1; position: relative; background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364); overflow: hidden; }
        .falling-word { position: absolute; color: white; font-weight: bold; font-size: 18px; text-shadow: 1px 1px 2px black; padding: 4px 10px; background: rgba(0,0,0,0.4); border-radius: 8px; transition: top 0.1s linear; }
        .game-input-area { height: 60px; background: #222; display: flex; align-items: center; padding: 0 15px; flex-shrink: 0; }
        .game-input-area input { flex: 1; padding: 12px; font-size: 16px; font-weight: bold; text-align: center; border-radius: 30px; border: none; outline: none; }
        
        .game-leaderboard { width: 250px; background: #f4f4f4; border-left: 2px solid #ddd; display: flex; flex-direction: column; }
        .leaderboard-title { background: #ff9800; color: white; padding: 15px; font-weight: bold; text-align: center; margin: 0; }
        .leaderboard-list { flex: 1; overflow-y: auto; padding: 10px; list-style: none; margin: 0; }
        .leaderboard-list li { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #ccc; font-size: 14px; }
        .leaderboard-list li.me { font-weight: bold; color: #d32f2f; background: #ffebee; border-radius: 4px; }
        .rank-badge { font-weight: bold; width: 45px; text-align: left; }
        .close-game-btn { background: #ff5252; padding: 10px; text-align: center; color: white; cursor: pointer; font-weight: bold; }
        .close-game-btn:hover { background: #d32f2f; }
        
        #game-start-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; justify-content:center; align-items:center; z-index: 10; flex-direction: column; gap: 15px; }
        #game-start-overlay button { width: auto; font-size: 24px; padding: 15px 40px; border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); background-color: #ff9800; }
        #game-start-overlay button:hover { background-color: #e68a00; }
        .waiting-text { color: white; font-size: 22px; font-weight: bold; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h2>💬 스쿨 톡 에 오신 것을 환영합니다!</h2>
        <div class="login-box">
            <label>학년</label>
            <select id="grade">
                <option value="1학년">1학년</option><option value="2학년">2학년</option><option value="3학년">3학년</option>
                <option value="4학년">4학년</option><option value="5학년">5학년</option><option value="6학년">6학년</option>
            </select>
            <label>반</label>
            <select id="classNum">
                <option value="1반">1반</option><option value="2반">2반</option><option value="3반">3반</option>
                <option value="4반">4반</option><option value="5반">5반</option><option value="6반">6반</option>
            </select>
            <label>본인 이름 (실명)</label>
            <input type="text" id="username" placeholder="이름을 입력하세요">
            <button onclick="window.login(false)">학생으로 입장하기</button>
            <button onclick="window.login(true)" class="btn-teacher">👨‍🏫 선생님으로 입장하기</button>
        </div>
    </div>

    <div id="chat-screen" style="display:none; flex-direction:column; height:100%;">
        <div class="header">
            <span id="welcome-msg">환영합니다!</span>
            <button onclick="window.handleLogout()">로그아웃</button>
        </div>
        <div class="main-area">
            <div class="sidebar">
                <h3>👥 전체 접속자 명단<br><span style="font-size:11px; font-weight:normal; color:#666;">(다른 학생을 클릭해 1:1 대화방 개설)</span></h3>
                <ul class="user-list" id="user-list-ul"></ul>
            </div>
            <div id="student-grid"></div>
        </div>
    </div>

    <div id="teacher-screen">
        <div class="header" style="background: #2196F3;">
            <span id="teacher-welcome-msg">👨‍🏫 선생님 대시보드</span>
            <div style="display:flex; gap:10px;">
                <button onclick="window.resetAllUsers()" style="background:#ff9800; font-size:13px; padding:5px 12px;">👻 전체 접속자 초기화</button>
                <button onclick="window.handleLogout()" style="font-size:13px; padding:5px 12px;">로그아웃</button>
            </div>
        </div>
        <div class="main-area">
            <div class="sidebar">
                <h3>👥 현재 접속자 명단</h3>
                <ul class="user-list" id="teacher-user-list-ul"></ul>
            </div>
            <div style="display: flex; flex-direction: column; flex: 1; overflow: hidden; background: #f5f5f5;">
                
                <div style="padding: 12px 20px; background: #e3f2fd; font-weight: bold; border-bottom: 1px solid #bbdefb; color: #1565c0; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center;">
                    <div>📢 참여할 대화방 선택: <span id="selected-room-title" style="color: #d32f2f; background: white; padding: 2px 8px; border-radius: 4px; border: 1px solid #ccc;">채팅창 하나를 클릭하세요!</span></div>
                    
                    <div id="teacher-game-area" style="display: none; align-items: center; gap: 8px;">
                        <select id="hancom-game-select" style="margin: 0; padding: 6px; width: 140px; border-radius: 4px; border: 1px solid #1565c0; font-size: 13px;">
                            <option value="https://www.hancomtaja.com/ko/typing|낱말연습">📖 낱말연습</option>
                            <option value="https://www.hancomtaja.com/ko/typing|단문연습">📝 단문연습</option>
                            <option value="https://www.hancomtaja.com/ko/game|판뒤집기">🔄 판뒤집기</option>
                            <option value="https://www.hancomtaja.com/ko/game|산성비">☔ 산성비</option>
                            <option value="https://www.hancomtaja.com/ko/game|워드크러시">💥 워드크러시</option>
                            <option value="https://www.hancomtaja.com/ko/game|타자실험실">🧪 타자실험실</option>
                            <option value="https://www.hancomtaja.com/ko/topik|맞춤법 퀴즈">✅ 맞춤법 퀴즈</option>
                            <option value="https://www.hancomtaja.com/ko/topik|초성 퀴즈">💡 초성 퀴즈</option>
                        </select>
                        <button onclick="window.sendSelectedGameLink()" style="background-color: #8e44ad; border:none; padding:7px 12px; color:white; border-radius:4px; font-weight: bold; cursor: pointer; font-size: 12px;">게임 전송 🚀</button>
                    </div>
                </div>

                <div id="teacher-grid"></div>
                <div class="input-area" id="teacher-input-area" style="border-top: 3px solid #2196F3; display: none; padding:15px; background:#f0f0f0; display: flex; align-items: center; flex-shrink: 0;">
                    <input type="text" id="teacher-msg-input" placeholder="선택한 방에 공지 메시지 전송..." onkeypress="if(event.keyCode==13) window.sendTeacherMessage()" style="flex: 1; margin: 0; padding: 12px; border-radius: 6px;">
                    <button onclick="window.sendTeacherMessage()" style="background-color: #2196F3; border:none; padding:12px; color:white; border-radius:6px; margin-left:10px; width:90px; font-weight: bold; cursor: pointer;">전송</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="game-modal">
    <div class="game-wrapper">
        <div class="game-play-area">
            <div class="game-header">
                <span id="game-room-name">방 이름</span>
                <span>점수: <span id="game-score" style="color:#ffeb3b; font-size:20px;">0</span> | 생명: <span id="game-lives" style="color:#ff5252; font-size:20px;">❤️❤️❤️❤️❤️</span></span>
            </div>
            <div class="game-sky" id="game-sky">
                <div id="game-start-overlay"></div>
            </div>
            <div class="game-input-area">
                <input type="text" id="game-input" placeholder="여기에 단어를 입력하고 엔터를 누르세요!" onkeypress="if(event.keyCode==13) window.checkGameWord()" disabled autocomplete="off">
            </div>
        </div>
        <div class="game-leaderboard">
            <h3 class="leaderboard-title">🏆 실시간 방 랭킹</h3>
            <ul class="leaderboard-list" id="leaderboard-list">
                <li style="text-align:center; color:#888;">데이터를 불러오는 중...</li>
            </ul>
            <div class="close-game-btn" onclick="window.closeGame()">나가기</div>
        </div>
    </div>
</div>

<script>
    let database;
    try {
        const firebaseConfig = { databaseURL: "https://school-chat-7051e-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        database = firebase.database();
    } catch (e) {
        console.error("Firebase 초기화 에러:", e);
    }

    let myInfo = {};
    let myUserRef = null;
    let currentTeacherTarget = "";
    
    let localUsers = {};
    let localRooms = {};
    let localMessages = [];
    let localGameScores = {};     
    let localClassScores = {};    
    let lastGameTrigger = {};

    window.onload = function() {
        if(localStorage.getItem('school_chat_grade')) document.getElementById('grade').value = localStorage.getItem('school_chat_grade');
        if(localStorage.getItem('school_chat_classNum')) document.getElementById('classNum').value = localStorage.getItem('school_chat_classNum');
        if(localStorage.getItem('school_chat_name')) document.getElementById('username').value = localStorage.getItem('school_chat_name');
    };

    function login(isTeacher) {
        if(!database) { alert("파이어베이스가 연결되지 않았습니다."); return; }
        try {
            const grade = document.getElementById('grade').value;
            const classNum = document.getElementById('classNum').value;
            const name = document.getElementById('username').value.trim();

            if (name === "") { alert("이름을 입력해주세요!"); return; }
            if (isTeacher) {
                const masterPassword = prompt("👨‍🏫 선생님 전용 암호를 입력하세요:");
                if (masterPassword !== "school1234") { alert("❌ 암호가 일치하지 않습니다."); return; }
            }

            localStorage.setItem('school_chat_grade', grade);
            localStorage.setItem('school_chat_classNum', classNum);
            localStorage.setItem('school_chat_name', name);

            myInfo = { grade: grade, classNum: classNum, name: name, isTeacher: isTeacher };
            document.getElementById('login-screen').style.display = 'none';

            if (isTeacher) {
                document.getElementById('teacher-screen').style.display = 'flex';
                document.getElementById('teacher-welcome-msg').innerText = `👨‍🏫 ${grade} ${classNum} ${name} 선생님`;
            } else {
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('welcome-msg').innerText = `🏫 ${grade} ${classNum} 【${name}】 학생`;

                const defaultRoomId = `group_${grade}_${classNum}`;
                database.ref(`rooms/${defaultRoomId}`).once('value', function(snap) {
                    if(!snap.exists()) {
                        database.ref(`rooms/${defaultRoomId}`).set({
                            roomId: defaultRoomId, title: `${grade} ${classNum} 단체방`, grade: grade, classNum: classNum, isDefault: true, creator: "시스템", members: { [name]: true }
                        });
                    } else {
                        database.ref(`rooms/${defaultRoomId}/members/${name}`).set(true);
                    }
                    database.ref(`rooms/${defaultRoomId}/members/${name}`).onDisconnect().remove();
                });
            }

            const userType = isTeacher ? "teacher" : "student";
            const userKey = `user_${grade}_${classNum}_${name}_${userType}`; 
            myUserRef = database.ref(`users/${userKey}`);
            myUserRef.set(myInfo);
            myUserRef.onDisconnect().remove();

            startRealtimeListening();
        } catch (error) {
            alert("로그인 중 에러: " + error.message);
        }
    }

    function handleLogout() {
        localStorage.clear();
        if (!myInfo.isTeacher && myInfo.name) {
            const defaultRoomId = `group_${myInfo.grade}_${myInfo.classNum}`;
            database.ref(`rooms/${defaultRoomId}/members/${myInfo.name}`).remove();
            for(let id in localRooms) {
                if(!localRooms[id].isDefault && localRooms[id].members && localRooms[id].members[myInfo.name]) {
                    database.ref(`rooms/${id}/members/${myInfo.name}`).remove();
                }
            }
        }
        if (myUserRef) {
            myUserRef.remove().then(function() { location.reload(); }).catch(function() { location.reload(); });
        } else {
            location.reload();
        }
    }

    function resetAllUsers() {
        if(!myInfo.isTeacher) return;
        if (confirm("⚠️ 데이터베이스에 쌓인 모든 접속자를 초기화하시겠습니까?")) {
            database.ref('users').remove().then(function() { alert("✨ 유령 아이디가 싹 청소되었습니다!"); });
        }
    }

    function getRankString(userName) {
        if (!localClassScores || Object.keys(localClassScores).length === 0) return "";
        const scoreArray = [];
        for (let name in localClassScores) {
            scoreArray.push({ name: name, score: localClassScores[name].score });
        }
        scoreArray.sort(function(a, b) { return b.score - a.score; });
        let rank = -1;
        for (let i = 0; i < scoreArray.length; i++) {
            if (scoreArray[i].name === userName) {
                rank = i + 1; break;
            }
        }
        if (rank === -1) return "";
        if (rank === 1) return `[🏆1위] `;
        if (rank === 2) return `[🥈2위] `;
        if (rank === 3) return `[🥉3위] `;
        return `[${rank}위] `;
    }

    // 🔗 URL 주소를 감지하여 새 창 이동용 하이퍼링크로 변경하는 함수
    function linkify(text) {
        if (!text) return "";
        let escaped = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return escaped.replace(urlRegex, function(url) {
            return '<a href="' + url + '" target="_blank" rel="noopener noreferrer" style="color: #2196F3; text-decoration: underline; font-weight: bold;">' + url + '</a>';
        });
    }

    // 🧹 특정 채팅방의 대화 내용만 초기화(교사 권한)
    function clearRoomMessages(roomId) {
        if (!confirm("🧹 이 방의 모든 대화 내용을 정말 초기화하시겠습니까?\n(방 목록과 게임 점수는 유지되고 대화 기록만 지워집니다.)")) return;
        database.ref('messages').once('value', function(snapshot) {
            snapshot.forEach(function(child) {
                if(child.val().roomId === roomId) {
                    database.ref(`messages/${child.key}`).remove();
                }
            });
            alert("✅ 대화 내용이 성공적으로 비워졌습니다.");
        });
    }

    function startRealtimeListening() {
        database.ref('users').on('value', function(snapshot) { localUsers = snapshot.val() || {}; updateViews(); });
        database.ref('rooms').on('value', function(snapshot) { localRooms = {}; snapshot.forEach(function(child) { localRooms[child.key] = child.val(); }); updateViews(); });
        database.ref('messages').on('value', function(snapshot) { localMessages = []; snapshot.forEach(function(child) { localMessages.push(child.val()); }); updateViews(); });
        database.ref('gameScores').on('value', function(snapshot) { localGameScores = {}; snapshot.forEach(function(roomSnap) { localGameScores[roomSnap.key] = roomSnap.val(); }); updateLeaderboard(); });
        database.ref(`classScores/${myInfo.grade}_${myInfo.classNum}`).on('value', function(snapshot) { localClassScores = snapshot.val() || {}; updateViews(); });
        database.ref('gameState').on('value', function(snapshot) {
            const states = snapshot.val() || {};
            for (let rid in states) {
                if (states[rid].trigger !== lastGameTrigger[rid]) {
                    lastGameTrigger[rid] = states[rid].trigger;
                    if (currentGameRoomId === rid && !isGameRunning) startGameLocally();
                }
            }
        });
    }

    function updateViews() {
        renderUserList(); 
        if(myInfo.isTeacher) renderTeacherDashboard();
        else renderStudentMultiScreen();
    }

    function renderUserList() {
        const studentUl = document.getElementById('user-list-ul');
        const teacherUl = document.getElementById('teacher-user-list-ul');
        
        if (studentUl) studentUl.innerHTML = "";
        if (teacherUl) teacherUl.innerHTML = "";

        for (let key in localUsers) {
            let u = localUsers[key];
            
            if(u.grade === myInfo.grade) {
                let li = document.createElement('li');
                let rankStr = getRankString(u.name); 
                let isMe = (u.name === myInfo.name && u.isTeacher === myInfo.isTeacher);
                
                let displayName = `${rankStr} 👤 [${u.classNum}] ${u.name}`;
                if (u.isTeacher) displayName += " 👨‍🏫";
                
                if (isMe) {
                    displayName = `⭐ ${displayName} (나)`;
                    li.style.background = '#e3f2fd'; 
                    li.style.fontWeight = 'bold';
                    li.style.color = '#1565c0';
                    li.style.cursor = 'default';
                } else {
                    li.style.cursor = 'pointer';
                    if (!myInfo.isTeacher && !u.isTeacher) {
                        li.onclick = function() { confirmAndCreateRoom(u.name); };
                    } else if (!myInfo.isTeacher && u.isTeacher) {
                        li.onclick = function() { alert("선생님과는 1:1 대화방을 만들 수 없습니다."); };
                    }
                }

                li.innerText = displayName;

                if (myInfo.isTeacher && teacherUl) {
                    teacherUl.appendChild(li);
                } else if (!myInfo.isTeacher && studentUl) {
                    studentUl.appendChild(li);
                }
            }
        }
    }

    function confirmAndCreateRoom(targetName) {
        let myGeneralRoomCount = 0; let targetGeneralRoomCount = 0;
        for(let id in localRooms) {
            let r = localRooms[id];
            if(!r.isDefault && r.members) {
                if(r.members[myInfo.name] === true) myGeneralRoomCount++;
                if(r.members[targetName] === true) targetGeneralRoomCount++;
            }
        }
        if (myGeneralRoomCount >= 1) { alert("❌ 이미 참여 중인 개인 채팅방이 있습니다!"); return; }
        if (targetGeneralRoomCount >= 1) { alert(`❌ ${targetName} 학생은 이미 참여 중입니다.`); return; }
        if (!confirm(`💬 ${targetName} 학생과 1:1 대화방을 만드시겠습니까?`)) return;

        const roomId = `room_${Date.now()}_${Math.floor(Math.random()*1000)}`;
        database.ref(`rooms/${roomId}`).set({
            roomId: roomId, title: `${myInfo.name}, ${targetName}의 대화방`, grade: myInfo.grade, classNum: myInfo.classNum, creator: myInfo.name, members: { [myInfo.name]: true, [targetName]: true }
        });
    }

    function destroyRoom(roomId) {
        if (!confirm("⚠️ 정말 이 방을 완전히 삭제하시겠습니까?\n(방과 관련된 대화 및 게임 점수가 모두 사라집니다.)")) return;
        database.ref(`rooms/${roomId}`).remove();
        database.ref('messages').once('value', function(snapshot) {
            snapshot.forEach(function(child) { if(child.val().roomId === roomId) database.ref(`messages/${child.key}`).remove(); });
        });
        database.ref(`gameScores/${roomId}`).remove(); 
        if(currentTeacherTarget === roomId) {
            currentTeacherTarget = "";
            document.getElementById('selected-room-title').innerText = "채팅창 하나를 클릭하세요!";
            document.getElementById('teacher-input-area').style.display = 'none';
            document.getElementById('teacher-game-area').style.display = 'none'; // 선택 취소 시 숨김
        }
    }

    function leaveRoom(roomId) {
        if (!confirm("🚪 이 방에서 나가시겠습니까?")) return;
        database.ref(`rooms/${roomId}/members/${myInfo.name}`).remove();
    }

    function renderStudentMultiScreen() {
        const grid = document.getElementById('student-grid');
        let savedScrolls = {};
        document.querySelectorAll('.chat-card-messages').forEach(function(el) {
            savedScrolls[el.dataset.roomid] = el.scrollTop;
        });

        grid.innerHTML = "";
        let myActiveRooms = [];
        for(let id in localRooms) {
            if(localRooms[id].members && localRooms[id].members[myInfo.name] === true) myActiveRooms.push(localRooms[id]);
        }

        myActiveRooms.forEach(function(room) {
            const isCreator = room.creator === myInfo.name;
            const isHost = room.isDefault ? false : isCreator; 

            const card = document.createElement('div');
            card.className = 'chat-card';

            const header = document.createElement('div');
            header.className = 'chat-card-header';
            header.style.background = room.isDefault ? '#4CAF50' : '#673AB7';

            let actionBtn = "";
            if (!room.isDefault) {
                if (isCreator) actionBtn = `<button class="btn-danger" onclick="window.destroyRoom('${room.roomId}')">❌ 폭파</button>`;
                else actionBtn = `<button class="btn-warning" onclick="window.leaveRoom('${room.roomId}')">🚪 나가기</button>`;
            }

            header.innerHTML = `
                <div>${room.title}</div>
                <div class="btn-group">
                    <button class="btn-game" onclick="window.openGame('${room.roomId}', '${room.title}', ${isHost})">🎮 산성비(내부)</button>
                    ${actionBtn}
                </div>
            `;
            card.appendChild(header);

            const msgArea = document.createElement('div');
            msgArea.className = 'chat-card-messages';
            msgArea.dataset.roomid = room.roomId;

            localMessages.forEach(function(m) {
                if(m.roomId === room.roomId) {
                    const isMe = m.sender === myInfo.name;
                    const displaySender = isMe ? '나' : getRankString(m.sender) + m.sender;
                    
                    msgArea.innerHTML += `
                        <div class="msg-line ${isMe ? 'me' : 'other'}">
                            <div class="msg-sender" style="color: ${isMe ? '#4CAF50' : '#d32f2f'}">${displaySender}</div>
                            <div class="msg-text">${window.linkify(m.text)}</div>
                            <div class="msg-time">${m.time}</div>
                        </div>`;
                }
            });
            card.appendChild(msgArea);

            const inputArea = document.createElement('div');
            inputArea.className = 'chat-card-input-area';
            inputArea.innerHTML = `
                <input type="text" id="input-${room.roomId}" placeholder="대화 입력..." onkeypress="if(event.keyCode==13) window.sendMultiMessage('${room.roomId}')">
                <button onclick="window.sendMultiMessage('${room.roomId}')">전송</button>
            `;
            card.appendChild(inputArea);
            grid.appendChild(card);
            
            if(savedScrolls[room.roomId] !== undefined) msgArea.scrollTop = savedScrolls[room.roomId];
            else msgArea.scrollTop = msgArea.scrollHeight;
        });
    }

    function renderTeacherDashboard() {
        const grid = document.getElementById('teacher-grid');
        grid.innerHTML = "";
        
        for (let id in localRooms) {
            const room = localRooms[id];
            if (room.grade === myInfo.grade && room.classNum === myInfo.classNum) {
                const currentMemberCount = Object.keys(room.members || {}).length;
                if (currentMemberCount <= 0) continue; 

                const card = document.createElement('div');
                card.className = 'chat-card';
                card.style.border = currentTeacherTarget === room.roomId ? "3px solid #2196F3" : "1px solid #ccc";
                card.style.cursor = "pointer";
                
                // 💡 클릭 시 드롭다운 게임 전송 영역도 함께 나타나도록 수정
                card.onclick = function() {
                    currentTeacherTarget = room.roomId;
                    document.getElementById('selected-room-title').innerText = room.title;
                    document.getElementById('teacher-input-area').style.display = 'flex';
                    document.getElementById('teacher-game-area').style.display = 'flex'; 
                    updateViews();
                };

                const header = document.createElement('div');
                header.className = 'chat-card-header';
                header.style.background = room.isDefault ? '#4CAF50' : '#2196F3';
                
                header.innerHTML = `
                    <div style="pointer-events: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 110px;">🔍 ${room.title}</div>
                    <div class="btn-group" style="display:flex; gap:3px; flex-shrink:0;">
                        <button class="btn-game" onclick="event.stopPropagation(); window.openGame('${room.roomId}', '${room.title}', true)">🎮 게임</button>
                        <button style="background:#ff9800; color:white; font-size:11px; padding:4px 6px; border:none; border-radius:4px; cursor:pointer;" onclick="event.stopPropagation(); window.clearRoomMessages('${room.roomId}')">🧹 초기화</button>
                        <button style="background:#ff5252; color:white; font-size:11px; padding:4px 6px; border:none; border-radius:4px; cursor:pointer;" onclick="event.stopPropagation(); window.destroyRoom('${room.roomId}')">❌ 삭제</button>
                    </div>
                `;
                card.appendChild(header);

                const msgArea = document.createElement('div');
                msgArea.className = 'chat-card-messages';
                localMessages.forEach(function(m) {
                    if(m.roomId === room.roomId) {
                        msgArea.innerHTML += `<div style="margin-bottom:5px;"><strong>${getRankString(m.sender)}${m.sender}:</strong> ${window.linkify(m.text)} <span style="font-size:9px; color:#888;">(${m.time})</span></div>`;
                    }
                });
                card.appendChild(msgArea);
                grid.appendChild(card);
                msgArea.scrollTop = msgArea.scrollHeight;
            }
        }
    }

    function sendMultiMessage(roomId) {
        const input = document.getElementById(`input-${roomId}`);
        const text = input.value.trim();
        if(text === "") return;
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        database.ref('messages').push({ roomId: roomId, sender: myInfo.name, text: text, time: timeStr, grade: myInfo.grade, classNum: myInfo.classNum });
        input.value = "";
    }
    
    function sendTeacherMessage() {
        const input = document.getElementById('teacher-msg-input');
        const text = input.value.trim();
        if (text === "" || !currentTeacherTarget) return;
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        database.ref('messages').push({ roomId: currentTeacherTarget, sender: `${myInfo.name}(선생님)`, text: text, time: timeStr, grade: myInfo.grade, classNum: myInfo.classNum });
        input.value = "";
    }

    // ==============================================================================
    // 🎮 산성비 게임 (내부 구현)
    // ==============================================================================
    let currentGameRoomId = "";
    let isCurrentRoomHost = false; 
    let gameLoop;
    let wordSpawnTimer;
    let scoreSyncTimer;        
    let lastSyncedScore = 0;   

    let gameWords = []; 
    let gameScore = 0;
    let gameLives = 5;
    let isGameRunning = false;
    
    const DICTIONARY = ["초등학교", "선생님", "쉬는시간", "점심시간", "국어", "수학", "사회", "과학", "영어", "체육", "미술", "음악", "실과", "도덕", "숙제", "시험", "여름방학", "겨울방학", "파이어베이스", "자바스크립트", "코딩", "스마트폰", "컴퓨터", "키보드", "우정", "친구", "행복", "사랑", "열정", "노력"];

    function openGame(roomId, roomTitle, isHost) {
        currentGameRoomId = roomId;
        isCurrentRoomHost = isHost;
        document.getElementById('game-room-name').innerText = `🎮 ${roomTitle} 게임장`;
        document.getElementById('game-modal').style.display = 'flex';
        
        showGameOverlay(); 
        gameScore = 0;
        gameLives = 5;
        updateGameUI();
        clearSky();
        updateLeaderboard();
    }

    function closeGame() {
        stopGame();
        document.getElementById('game-modal').style.display = 'none';
        currentGameRoomId = "";
    }

    function emitStartGameSignal() {
        if (!isCurrentRoomHost) return;
        database.ref(`gameState/${currentGameRoomId}`).set({ trigger: Date.now() });
    }

    function showGameOverlay(isGameOver) {
        const overlay = document.getElementById('game-start-overlay');
        overlay.style.display = 'flex';

        if (isCurrentRoomHost) {
            const btnText = isGameOver ? `🔄 다 같이 다시 하기 (내 점수: ${gameScore})` : `▶ 방장 권한으로 다 함께 시작!`;
            overlay.innerHTML = `<button onclick="window.emitStartGameSignal()">${btnText}</button>`;
        } else {
            const statusText = isGameOver ? "게임이 종료되었습니다.<br>방장의 다음 게임 시작을 기다리는 중입니다..." : "방장(또는 선생님)이 게임을 시작할 때까지 기다려주세요!";
            overlay.innerHTML = `
                <div class="waiting-text">
                    ⏳ 대기 중...<br>
                    <span style="font-size:16px; font-weight:normal;">${statusText}</span>
                </div>
            `;
        }
    }

    function startGameLocally() {
        if(isGameRunning) return;
        document.getElementById('game-start-overlay').style.display = 'none';
        document.getElementById('game-input').disabled = false;
        document.getElementById('game-input').focus();
        
        gameScore = 0;
        gameLives = 5;
        gameWords = [];
        lastSyncedScore = 0; 
        clearSky();
        updateGameUI();
        isGameRunning = true;

        updateRealTimeScore(gameScore);

        gameLoop = setInterval(moveWords, 33);
        wordSpawnTimer = setInterval(spawnWord, 1500);

        scoreSyncTimer = setInterval(function() {
            if (gameScore !== lastSyncedScore) {
                updateRealTimeScore(gameScore);
                lastSyncedScore = gameScore;
            }
        }, 1500);
    }

    function stopGame() {
        isGameRunning = false;
        clearInterval(gameLoop);
        clearInterval(wordSpawnTimer);
        clearInterval(scoreSyncTimer); 
        document.getElementById('game-input').disabled = true;
        document.getElementById('game-input').value = "";
    }

    function gameOver() {
        stopGame();
        alert(`😭 게임 오버!\n최종 점수: ${gameScore}점`);
        updateRealTimeScore(gameScore); 
        showGameOverlay(true); 
    }

    function spawnWord() {
        const sky = document.getElementById('game-sky');
        const wordText = DICTIONARY[Math.floor(Math.random() * DICTIONARY.length)];
        const span = document.createElement('span');
        span.className = 'falling-word';
        span.innerText = wordText;
        
        span.style.left = `${Math.floor(Math.random() * 75) + 5}%`;
        span.style.top = '0px';
        
        sky.appendChild(span);
        gameWords.push({ element: span, text: wordText, top: 0 });
    }

    function moveWords() {
        const skyHeight = document.getElementById('game-sky').clientHeight;
        for (let i = gameWords.length - 1; i >= 0; i--) {
            let w = gameWords[i];
            w.top += 2; 
            w.element.style.top = w.top + 'px';

            if (w.top > skyHeight - 30) {
                w.element.remove();
                gameWords.splice(i, 1);
                
                gameLives--;
                updateGameUI();
                
                const sky = document.getElementById('game-sky');
                sky.style.background = "#ff5252";
                setTimeout(function() { if(isGameRunning) sky.style.background = "linear-gradient(to bottom, #0f2027, #203a43, #2c5364)"; }, 100);

                if (gameLives <= 0) {
                    gameOver();
                    break;
                }
            }
        }
    }

    function checkGameWord() {
        const inputEl = document.getElementById('game-input');
        const typedWord = inputEl.value.trim();
        if (typedWord === "") return;

        let matched = false;
        for (let i = 0; i < gameWords.length; i++) {
            if (gameWords[i].text === typedWord) {
                gameWords[i].element.remove();
                gameWords.splice(i, 1);
                matched = true;
                break;
            }
        }

        if (matched) {
            gameScore += 10;
            updateGameUI();
        }
        inputEl.value = ""; 
    }

    function updateGameUI() {
        document.getElementById('game-score').innerText = gameScore;
        let hearts = "";
        for(let i=0; i<gameLives; i++) hearts += "❤️";
        document.getElementById('game-lives').innerText = hearts || "💀";
    }

    function clearSky() {
        const falling = document.getElementById('game-sky').querySelectorAll('.falling-word');
        for (let i = 0; i < falling.length; i++) falling[i].remove();
        gameWords = [];
        document.getElementById('game-sky').style.background = "linear-gradient(to bottom, #0f2027, #203a43, #2c5364)";
    }

    function updateRealTimeScore(score) {
        if (!currentGameRoomId) return;
        const myNameTag = myInfo.isTeacher ? `${myInfo.name}(선생님)` : myInfo.name;
        
        database.ref(`gameScores/${currentGameRoomId}/${myNameTag}`).set({
            score: score,
            timestamp: Date.now()
        });

        const currentGlobalBest = (localClassScores[myNameTag] && localClassScores[myNameTag].score) || 0;
        if (score > currentGlobalBest) {
            database.ref(`classScores/${myInfo.grade}_${myInfo.classNum}/${myNameTag}`).set({
                score: score,
                timestamp: Date.now()
            });
        }
    }

    function updateLeaderboard() {
        if (!currentGameRoomId) return;
        
        const listEl = document.getElementById('leaderboard-list');
        listEl.innerHTML = "";
        
        const roomScores = localGameScores[currentGameRoomId] || {};
        const scoreArray = [];
        
        for (let userName in roomScores) {
            scoreArray.push({ name: userName, score: roomScores[userName].score });
        }
        scoreArray.sort(function(a, b) { return b.score - a.score; });

        if (scoreArray.length === 0) {
            listEl.innerHTML = `<li style="text-align:center; color:#888;">아직 점수가 없습니다.<br>게임을 시작해보세요!</li>`;
            return;
        }

        const myNameTag = myInfo.isTeacher ? `${myInfo.name}(선생님)` : myInfo.name;

        scoreArray.forEach(function(data, index) {
            let medal = "";
            if (index === 0) medal = "🥇 1위";
            else if (index === 1) medal = "🥈 2위";
            else if (index === 2) medal = "🥉 3위";
            else medal = `${index + 1}위`;

            const isMe = data.name === myNameTag;
            
            listEl.innerHTML += `
                <li class="${isMe ? 'me' : ''}">
                    <span class="rank-badge">${medal}</span>
                    <span style="flex:1; margin-left:10px;">${data.name}</span>
                    <span style="font-weight:bold; color:#d32f2f;">${data.score}점</span>
                </li>
            `;
        });
    }

    // 🎯 선생님이 고른 드롭다운 게임 링크 전송 함수
    function sendSelectedGameLink() {
        if (!currentTeacherTarget) {
            alert("❌ 먼저 게임을 전송할 학생들 채팅방을 하나 클릭해서 선택해주세요!");
            return;
        }
        
        const selectEl = document.getElementById('hancom-game-select');
        const selectedValue = selectEl.value; // 예: "주소|게임이름"
        const parts = selectedValue.split('|');
        const gameUrl = parts[0];
        const gameName = parts[1];
        
        if (confirm(`📢 선택한 방에 [${gameName}] 시작 링크를 전송하시겠습니까?`)) {
            const now = new Date();
            const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            
            // 학생들에게 보낼 메시지 (자동으로 파란색 링크로 변환됨)
            const gameMsg = `🚨 [선생님 호출] 지금 바로 🎯${gameName}🎯 연습을 시작하세요!\n아래 주소를 눌러 바로 입장!\n👉 ${gameUrl}`;

            database.ref('messages').push({ 
                roomId: currentTeacherTarget, 
                sender: "👨‍🏫 선생님(시스템)", 
                text: gameMsg, 
                time: timeStr, 
                grade: myInfo.grade, 
                classNum: myInfo.classNum 
            });
            
            alert(`✅ ${gameName} 안내 링크가 성공적으로 전송되었습니다!`);
        }
    }

    // 전역 스코프 함수 연결
    window.login = login;
    window.handleLogout = handleLogout;
    window.resetAllUsers = resetAllUsers;
    window.openGame = openGame;
    window.closeGame = closeGame;
    window.emitStartGameSignal = emitStartGameSignal;
    window.checkGameWord = checkGameWord;
    window.sendMultiMessage = sendMultiMessage;
    window.sendTeacherMessage = sendTeacherMessage;
    window.destroyRoom = destroyRoom;
    window.leaveRoom = leaveRoom;
    window.linkify = linkify;
    window.clearRoomMessages = clearRoomMessages;
    window.sendSelectedGameLink = sendSelectedGameLink; 
</script>
</body>
</html>
