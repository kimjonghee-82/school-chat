<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Apps</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    font-family: 'Segoe UI', sans-serif;
    gap: 32px;
    padding: 40px 20px;
  }
  h1 { color: #fff; font-size: 1.6rem; margin-bottom: 8px; }
  .cards {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }
  a.card {
    text-decoration: none;
    background: #16213e;
    border-radius: 20px;
    padding: 36px 40px;
    width: 200px;
    text-align: center;
    color: #fff;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  a.card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
  .card .icon { font-size: 3rem; margin-bottom: 16px; }
  .card .name { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
  .card .desc { font-size: 0.8rem; color: #a0a0c0; }
  .card.chat { border: 2px solid #5c6bc0; }
  .card.translator { border: 2px solid #fb8c00; }
  .card.game { border: 2px solid #4caf50; }
</style>
</head>
<body>
<h1>School Apps</h1>
<div class="cards">
  <a class="card chat" href="chat/">
    <div class="icon">💬</div>
    <div class="name">학교 채팅</div>
    <div class="desc">선생님과 학생 채팅</div>
  </a>
  <a class="card translator" href="translator/">
    <div class="icon">📖</div>
    <div class="name">교과서 번역기</div>
    <div class="desc">사진·PDF 번역</div>
  </a>
  <a class="card game" href="game/">
    <div class="icon">🎮</div>
    <div class="name">게임</div>
    <div class="desc">숲속의 강 모험</div>
  </a>
</div>
</body>
</html>
