<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스쿨 톡</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* 기본 스타일 */
        html, body { height: 100%; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; overflow: hidden; }
        .container { width: 100%; height: 100%; display: flex; flex-direction: column; background: white; overflow: hidden; }
        
        #login-screen { text-align: center; padding-top: 15vh; height: 100%; box-sizing: border-box; background: #f0f2f5; }
        .login-box { display: inline-block; text-align: left; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; }
        select, input[type="text"] { padding: 12px; margin: 8px 0 20px 0; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        
        /* 암호 저장 체크박스 스타일 */
        .checkbox-container { display: flex; align-items: center; margin-bottom: 20px; font-size: 14px; color: #333; }
        .checkbox-container input[type="checkbox"] { width: auto; margin: 0 8px 0 0; transform: scale(1.2); }

        button { background-color: #4CAF50; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background-color: #45a049; }
        .btn-teacher { background-color: #2196F3; margin-top: 10px; }
        .btn-teacher:hover { background-color: #0b7dda; }

        .header { background: #4CAF50; color: white; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; box-sizing: border-box; flex-shrink: 0; }
        .header button { background: #ff5252; width: auto; padding: 5px 15px; font-size: 14px; }
        
        .main-area { display: flex; flex: 1; overflow: hidden; height: calc(100% - 60px); }
        .sidebar { width: 250px; background: #f9f9f9; border-right: 1px solid #ddd; padding: 15px; overflow-y: auto; box-sizing: border-box; flex-shrink: 0; transition: background 0.2s; }
        .sidebar h3 { margin-top: 0; font-size: 14px; border-bottom: 2px solid #ddd; padding-bottom: 10px; color: #333; }
        .user-list { list-style: none; padding: 0; margin: 0; }
        .user-list li { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; border-radius: 4px; transition: 0.2s; }
        .user-list li:hover { background: #e2f0d9; }
        
        #student-grid { display: flex; flex-direction: row; gap: 12px; padding: 12px; flex: 1; background: #e9ecef; box-sizing: border-box; overflow-x: auto; align-items: stretch; }
        .chat-card { background: white; border-radius: 8px; border: 1px solid #ccc; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); box-sizing: border-box; flex: 1; min-width: 350px; height: 100%; transition: border 0.2s; }

        .chat-card-header { background: #4CAF50; color: white; padding: 10px 12px; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; gap: 5px; }
        .chat-card-header .btn-group { display: flex; gap: 4px; }
        .chat-card-header button { background: #fff; color: #333; font-size: 11px; padding: 4px 8px; border-radius: 4px; border: 1px solid #ccc; width: auto; font-weight: normal; cursor: pointer; }
        .chat-card-header button:hover { background: #eee; }
        .btn-game { background: #ffeb3b !important; color: #000 !important; font-weight: bold !important; border: 1px solid #fbc02d !important; }
        .btn-game:hover { background: #fdd835 !important; }

        /* 💡 채팅방 내부 구조 분리 (채팅창 + 참여자 명단) */
        .chat-card-body { display: flex; flex: 1; overflow: hidden; }
        .chat-card-messages { flex: 1; padding: 12px; overflow-y: auto; background: #e5ddd5; font-size: 13px; }
        
        .chat-card-participants { width: 85px; background: #f4f4f4; border-left: 1px solid #ddd; overflow-y: auto; padding: 8px 5px; display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
        .participant-item { background: white; border: 1px solid #ccc; padding: 6px 4px; text-align: center; font-size: 11px; border-radius: 4px; font-weight: bold; cursor: grab; word-break: break-all; }
        .participant-item:active { cursor: grabbing; }

        .msg-line { margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg-line.me { align-items: flex-end; }
        .msg-line.other { align-items: flex-start; }
        .msg-sender { font-size: 11px; color: #666; margin-bottom: 2px; font-weight: bold; }
        .msg-text { background: white; padding: 8px 14px; border-radius: 12px; max-width: 80%; word-break: break-all; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg-line.me .msg-text { background: #dcf8c6; }
        .msg-time { font-size: 10px; color: #999; margin-top: 2px; }

        .chat-card-input-area { padding: 10px; background: #f0f0f0; display: flex; border-top: 1px solid #ddd; align-items: center; flex-shrink: 0; }
        .chat-card-input-area input { margin: 0; padding: 10px 15px; border-radius: 20px; border: 1px solid #ccc; font-size: 13px; flex: 1; }
        .chat-card-input-area button { width: 60px; font-size: 13px; padding: 9px 0; border-radius: 20px; margin-left: 6px; background-color: #4CAF50; font-weight: bold; }

        /* 선생님 대시보드 구조 */
        #teacher-screen { display: none; height: 100%; flex-direction: column; }
        #teacher-grid { display: flex; flex-wrap: wrap; gap: 12px; padding: 12px; flex: 1; overflow-y: auto; background: #f5f5f5; box-sizing: border-box; align-content: flex-start; }
        #teacher-grid .chat-card { flex: 1 1 calc(33.33% - 12px); min-width: 350px; height: calc(50% - 6px); min-height: 300px; }
        
        .draggable-student { cursor: grab; }
        .draggable-student:active { cursor: grabbing; }

        #remove-dropzone-hint { display: none; background: #ffcdd2; color: #c62828; padding: 15px; text-align: center; border-radius: 6px; margin-bottom: 15px; font-weight: bold; border: 2px dashed #ef5350; font-size: 14px; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 0.7; transform: scale(0.98); } to { opacity: 1; transform: scale(1.02); } }

        /* 🎮 산성비 게임 전용 스타일 (내부) */
        #game-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .game-wrapper { display: flex; width: 850px; height: 550px; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .game-play-area { flex: 1; display: flex; flex-direction: column; background: #1e1e1e; position: relative; }
        .game-header { height: 50px; background: #333; color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-weight: bold; flex-shrink: 0; }
        .game-sky { flex: 1; position: relative; background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364); overflow: hidden; }
        .falling-word { position: absolute; color: white; font-weight: bold; font-size: 18px; text-shadow: 1px 1px 2px black; padding: 4px 10px; background: rgba(0,0,0,0.4); border-radius: 8px; transition: top 0.1s linear; }
        .game-input-area { height: 60px; background: #222; display: flex; align-items: center; padding: 0 15px; flex-shrink: 0; }
        .game-input-area input { flex: 1; padding: 12px; font-size: 16px; font-weight: bold; text-align: center; border-radius: 30px; border: none; outline: none; }
        
        .game-leaderboard { width: 250px; background: #f4f4f4; border-left: 2px solid #ddd; display: flex; flex-direction: column; }
        .leaderboard-title { background: #ff9800; color: white; padding: 15px; font-weight: bold; text-align: center; margin: 0; }
        .leaderboard-list { flex: 1; overflow-y: auto; padding: 10px; list-style: none; margin: 0; }
        .leaderboard-list li { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #ccc; font-size: 14px; }
        .leaderboard-list li.me { font-weight: bold; color: #d32f2f; background: #ffebee; border-radius: 4px; }
        .rank-badge { font-weight: bold; width: 45px; text-align: left; }
        .close-game-btn { background: #ff5252; padding: 10px; text-align: center; color: white; cursor: pointer; font-weight: bold; }
        .close-game-btn:hover { background: #d32f2f; }
        
        #game-start-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; justify-content:center; align-items:center; z-index: 10; flex-direction: column; gap: 15px; }
        #game-start-overlay button { width: auto; font-size: 24px; padding: 15px 40px; border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); background-color: #ff9800; }
        #game-start-overlay button:hover { background-color: #e68a00; }
        .waiting-text { color: white; font-size: 22px; font-weight: bold; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h2>💬 스쿨 톡 에 오신 것을 환영합니다!</h2>
        <div class="login-box">
            <label>학년</label>
            <select id="grade">
                <option value="1학년">1학년</option><option value="2학년">2학년</option><option value="3학년">3학년</option>
                <option value="4학년">4학년</option><option value="5학년">5학년</option><option value="6학년">6학년</option>
            </select>
            <label>반</label>
            <select id="classNum">
                <option value="1반">1반</option><option value="2반">2반</option><option value="3반">3반</option>
                <option value="4반">4반</option><option value="5반">5반</option><option value="6반">6반</option>
            </select>
            <label>본인 이름 (실명)</label>
            <input type="text" id="username" placeholder="이름을 입력하세요">
            
            <div class="checkbox-container">
                <input type="checkbox" id="saveTeacherPwd">
                <label for="saveTeacherPwd">👨‍🏫 선생님 암호 자동 저장</label>
            </div>

            <button onclick="window.login(false)">학생으로 입장하기</button>
            <button onclick="window.login(true)" class="btn-teacher">👨‍🏫 선생님으로 입장하기</button>
        </div>
    </div>

    <div id="chat-screen" style="display:none; flex-direction:column; height:100%;">
        <div class="header">
            <span id="welcome-msg">환영합니다!</span>
            <button onclick="window.handleLogout()">로그아웃</button>
        </div>
        <div class="main-area">
            <div class="sidebar">
                <h3>👥 전체 접속자 명단<br><span style="font-size:11px; font-weight:normal; color:#666;">(다른 학생을 클릭해 1:1 대화방 개설)</span></h3>
                <ul class="user-list" id="user-list-ul"></ul>
            </div>
            <div id="student-grid"></div>
        </div>
    </div>

    <div id="teacher-screen">
        <div class="header" style="background: #2196F3;">
            <span id="teacher-welcome-msg">👨‍🏫 선생님 대시보드</span>
            <div style="display:flex; gap:10px;">
                <button onclick="window.resetAllUsers()" style="background:#ff9800; font-size:13px; padding:5px 12px;">👻 전체 접속자 초기화</button>
                <button onclick="window.handleLogout()" style="font-size:13px; padding:5px 12px;">로그아웃</button>
            </div>
        </div>
        <div class="main-area">
            <div class="sidebar" id="teacher-sidebar" ondrop="window.handleRemoveDrop(event)" ondragover="window.handleRemoveDragOver(event)" ondragleave="window.handleRemoveDragLeave(event)">
                <div id="remove-dropzone-hint">🗑️ 이곳에 놓아 방에서 퇴장</div>
                <h3>👥 접속자 명단<br><span style="font-size:11px; font-weight:normal; color:#666;">(학생을 우측 채팅방으로 드래그 하세요!)</span></h3>
                <ul class="user-list" id="teacher-user-list-ul"></ul>
            </div>
            
            <div style="display: flex; flex-direction: column; flex: 1; overflow: hidden; background: #f5f5f5;">
                <div style="padding: 12px 20px; background: #e3f2fd; font-weight: bold; border-bottom: 1px solid #bbdefb; color: #1565c0; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center;">
                    <div>📢 참여 방: <span id="selected-room-title" style="color: #d32f2f; background: white; padding: 2px 8px; border-radius: 4px; border: 1px solid #ccc;">채팅창 하나를 클릭하세요!</span></div>
                    
                    <div id="teacher-game-area" style="display: none; align-items: center; gap: 15px;">
                        <div style="display: flex; align-items: center; gap: 5px;">
                            <select id="hancom-game-select" style="margin: 0; padding: 6px; width: 130px; border-radius: 4px; border: 1px solid #1565c0; font-size: 13px;">
                                <option value="https://tt.hancomtaja.com/ko?pr=W|낱말연습">📖 낱말연습</option>
                                <option value="https://acidrain.hancomtaja.com/?gamekey=acidrain|산성비">☔ 산성비</option>
                            </select>
                            <button onclick="window.sendSelectedGameLink()" style="background-color: #8e44ad; border:none; padding:7px 12px; color:white; border-radius:4px; font-weight: bold; cursor: pointer; font-size: 12px; white-space: nowrap;">게임 전송 🚀</button>
                        </div>
                        <span style="color:#bbdefb;">|</span>
                        <div style="display: flex; align-items: center; gap: 5px;">
                            <button onclick="window.toggleMissionInput()" style="background-color: #ff5722; border:none; padding:7px 12px; color:white; border-radius:4px; font-weight: bold; cursor: pointer; font-size: 12px; white-space: nowrap;">미션 전달 🔗</button>
                            <div id="custom-mission-area" style="display: none; align-items: center; gap: 5px;">
                                <input type="text" id="custom-mission-url" placeholder="URL 입력 (http://...)" style="margin: 0; padding: 6px; width: 300px; border-radius: 4px; border: 1px solid #ff5722; font-size: 13px; font-weight: normal;">
                                <button onclick="window.sendCustomMission()" style="background-color: #d84315; border:none; padding:7px 12px; color:white; border-radius:4px; font-weight: bold; cursor: pointer; font-size: 12px; white-space: nowrap;">전송</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="teacher-grid"></div>
                
                <div class="input-area" id="teacher-input-area" style="border-top: 3px solid #2196F3; display: none; padding:15px; background:#f0f0f0; display: flex; align-items: center; flex-shrink: 0;">
                    <input type="text" id="teacher-msg-input" placeholder="선택한 방에 공지 메시지 전송..." onkeypress="if(event.keyCode==13) window.sendTeacherMessage()" style="flex: 1; margin: 0; padding: 12px; border-radius: 6px;">
                    <button onclick="window.sendTeacherMessage()" style="background-color: #2196F3; border:none; padding:12px; color:white; border-radius:6px; margin-left:10px; width:90px; font-weight: bold; cursor: pointer; white-space: nowrap;">전송</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="game-modal">
    <div class="game-wrapper">
        <div class="game-play-area">
            <div class="game-header">
                <span id="game-room-name">방 이름</span>
                <span>점수: <span id="game-score" style="color:#ffeb3b; font-size:20px;">0</span> | 생명: <span id="game-lives" style="color:#ff5252; font-size:20px;">❤️❤️❤️❤️❤️</span></span>
            </div>
            <div class="game-sky" id="game-sky">
                <div id="game-start-overlay"></div>
            </div>
            <div class="game-input-area">
                <input type="text" id="game-input" placeholder="여기에 단어를 입력하고 엔터를 누르세요!" onkeypress="if(event.keyCode==13) window.checkGameWord()" disabled autocomplete="off">
            </div>
        </div>
        <div class="game-leaderboard">
            <h3 class="leaderboard-title">🏆 실시간 방 랭킹</h3>
            <ul class="leaderboard-list" id="leaderboard-list">
                <li style="text-align:center; color:#888;">데이터를 불러오는 중...</li>
            </ul>
            <div class="close-game-btn" onclick="window.closeGame()">나가기</div>
        </div>
    </div>
</div>

<div id="fullscreen-alert-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; flex-direction: column;">
    <div style="background: white; color: #333; padding: 40px; border-radius: 16px; width: 85%; max-width: 480px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <h1 style="margin: 0 0 10px 0; color: #8e44ad; font-size: 30px;">👨‍🏫 선생님의 특급 호출!</h1>
        <p id="alert-desc-text" style="font-size: 18px; margin: 15px 0; line-height: 1.6; color: #444;"></p>
        <button id="alert-action-btn" onclick="window.openGameFromAlert()" style="background: #8e44ad; color: white; font-size: 20px; padding: 16px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px;">
            🎯 지금 즉시 이동하기
        </button>
        <button onclick="window.closeFullscreenAlert()" style="background: #eee; color: #666; font-size: 13px; padding: 8px; border: none; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 12px;">닫기</button>
    </div>
</div>

<script>
    let database;
    try {
        const firebaseConfig = { databaseURL: "https://school-chat-7051e-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        database = firebase.database();
    } catch (e) { console.error("Firebase 초기화 에러:", e); }

    let myInfo = {};
    let myUserRef = null;
    let currentTeacherTarget = "";
    
    let localUsers = {};
    let localRooms = {};
    let localMessages = [];
    let localGameScores = {};     
    let localClassScores = {};    
    let lastGameTrigger = {};

    let sessionStartTime = Date.now();
    let lastAlertTimestamps = {};
    let alertTargetGameUrl = "";

    window.onload = function() {
        if(localStorage.getItem('school_chat_grade')) document.getElementById('grade').value = localStorage.getItem('school_chat_grade');
        if(localStorage.getItem('school_chat_classNum')) document.getElementById('classNum').value = localStorage.getItem('school_chat_classNum');
        if(localStorage.getItem('school_chat_name')) document.getElementById('username').value = localStorage.getItem('school_chat_name');
        
        // 💡 암호 저장 체크박스 상태 불러오기
        if(localStorage.getItem('school_chat_save_pwd') === 'true') {
            document.getElementById('saveTeacherPwd').checked = true;
        }
    };

    function login(isTeacher) {
        if(!database) { alert("파이어베이스가 연결되지 않았습니다."); return; }
        try {
            const grade = document.getElementById('grade').value;
            const classNum = document.getElementById('classNum').value;
            const name = document.getElementById('username').value.trim();
            const savePwdChecked = document.getElementById('saveTeacherPwd').checked;

            if (name === "") { alert("이름을 입력해주세요!"); return; }
            
            if (isTeacher) {
                let masterPassword = "";
                // 💡 암호 저장 기능 적용
                if (savePwdChecked && localStorage.getItem('school_chat_teacher_pwd_val')) {
                    masterPassword = localStorage.getItem('school_chat_teacher_pwd_val');
                } else {
                    masterPassword = prompt("👨‍🏫 선생님 전용 암호를 입력하세요:");
                }

                if (masterPassword !== "school1234") { alert("❌ 암호가 일치하지 않습니다."); return; }
                
                // 암호 저장 처리
                localStorage.setItem('school_chat_save_pwd', savePwdChecked);
                if(savePwdChecked) {
                    localStorage.setItem('school_chat_teacher_pwd_val', masterPassword);
                } else {
                    localStorage.removeItem('school_chat_teacher_pwd_val');
                }
            }

            localStorage.setItem('school_chat_grade', grade);
            localStorage.setItem('school_chat_classNum', classNum);
            localStorage.setItem('school_chat_name', name);

            myInfo = { grade: grade, classNum: classNum, name: name, isTeacher: isTeacher };
            document.getElementById('login-screen').style.display = 'none';
            sessionStartTime = Date.now();

            if (isTeacher) {
                document.getElementById('teacher-screen').style.display = 'flex';
                document.getElementById('teacher-welcome-msg').innerText = `👨‍🏫 ${grade} ${classNum} ${name} 선생님`;
            } else {
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('welcome-msg').innerText = `🏫 ${grade} ${classNum} 【${name}】 학생`;
