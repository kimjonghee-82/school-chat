<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게임 허브</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0d1117;
    font-family: 'Segoe UI', sans-serif;
    gap: 32px;
    padding: 40px 20px;
  }
  h1 { color: #fff; font-size: 1.6rem; }
  .back { color: #888; font-size: 0.85rem; text-decoration: none; margin-bottom: -16px; }
  .back:hover { color: #ccc; }
  .cards { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
  a.card {
    text-decoration: none;
    background: #161b22;
    border-radius: 20px;
    padding: 36px 40px;
    width: 200px;
    text-align: center;
    color: #fff;
    border: 2px solid #4caf50;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  a.card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(76,175,80,0.3); }
  a.card.fraction { border-color: #e06020; }
  a.card.fraction:hover { box-shadow: 0 8px 30px rgba(224,96,32,0.3); }
  .card .icon { font-size: 3rem; margin-bottom: 16px; }
  .card .name { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
  .card .desc { font-size: 0.8rem; color: #8b949e; }
</style>
</head>
<body>
<a class="back" href="../">← 메인으로</a>
<h1>🎮 게임</h1>
<div class="cards">
  <a class="card" href="river/">
    <div class="icon">🌊</div>
    <div class="name">숲속의 강 모험</div>
    <div class="desc">보트를 타고 강을 내려가세요</div>
  </a>
  <a class="card fraction" href="fraction/">
    <div class="icon">➗</div>
    <div class="name">분수 학습</div>
    <div class="desc">분수를 재미있게 배워요</div>
  </a>
  <a class="card" style="border-color:#f06292;" href="speedquiz/">
    <div class="icon">⚡</div>
    <div class="name">스피드 퀴즈</div>
    <div class="desc">빠르게 맞히는 퀴즈 게임</div>
  </a>
  <a class="card" style="border-color:#ffd54f;" href="rummikub/">
    <div class="icon">🀄</div>
    <div class="name">루미큐브</div>
    <div class="desc">타일 조합 보드게임 (2~4인)</div>
  </a>
  <a class="card" style="border-color:#90caf9;" href="chess/">
    <div class="icon">♟</div>
    <div class="name">체스</div>
    <div class="desc">전략 보드게임 (1인/2인 온라인)</div>
  </a>
</div>
</body>
</html>
