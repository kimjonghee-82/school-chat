<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>숲속의 강 모험</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:0;overflow:hidden;background:#2d5a27;font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;touch-action:none}
canvas{display:block}
.hidden{display:none!important}
#info{position:absolute;top:14px;left:16px;z-index:500;display:flex;flex-direction:column;gap:5px}
.stat{font-size:17px;color:white;font-weight:bold;background:rgba(0,0,0,0.55);padding:4px 10px;border-radius:6px}
#env-badge{font-size:12px;color:rgba(255,255,255,.95);background:rgba(0,0,0,.5);padding:3px 9px;border-radius:6px}
#energy-bar{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:500;display:flex;gap:4px;align-items:center;background:rgba(0,0,0,.55);padding:5px 14px;border-radius:22px;white-space:nowrap}
.heart{font-size:24px;line-height:1;display:inline-block;transition:opacity .2s}
.heart.empty{filter:grayscale(100%);opacity:.25}
@keyframes hshake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.heart.shake{animation:hshake .5s}
#msg-layer{position:absolute;width:100%;text-align:center;top:28%;pointer-events:none;z-index:2000}
#countdown{font-size:100px;color:white;font-weight:bold;text-shadow:2px 2px 14px rgba(0,0,0,.6)}
#levelup-msg{font-size:52px;font-weight:bold;color:#ffeb3b;text-shadow:0 0 20px #f57f17;display:none}
@keyframes pop{0%{transform:scale(.5);opacity:0}40%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:0}}
.pop-anim{animation:pop 1.3s ease-out forwards}
#controls{position:absolute;bottom:28px;right:22px;z-index:1100;display:grid;grid-template-columns:repeat(3,64px);grid-template-rows:repeat(3,64px);gap:5px;pointer-events:auto}
.ctrl-btn{width:64px;height:64px;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.4);border-radius:13px;display:flex;justify-content:center;align-items:center;font-size:26px;color:white;user-select:none;-webkit-tap-highlight-color:transparent;cursor:pointer}
.ctrl-btn.pressed{background:rgba(255,255,255,.5);transform:scale(.92)}
.btn-up{grid-column:2;grid-row:1}.btn-left{grid-column:1;grid-row:2}.btn-right{grid-column:3;grid-row:2}.btn-down{grid-column:2;grid-row:3}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;justify-content:center;align-items:center;z-index:1000;pointer-events:none}
.screen{pointer-events:auto;text-align:center;background:rgba(255,255,255,.96);padding:24px 20px;border-radius:22px;border:4px solid #8d6e63;box-shadow:0 0 30px rgba(0,0,0,.4);width:88%;max-width:430px}
.main-btn{padding:13px 28px;font-size:20px;cursor:pointer;background:#4caf50;color:white;border:none;border-radius:10px;font-weight:bold;margin-top:10px;width:100%;font-family:inherit}
.main-btn:disabled{background:#bbb;cursor:default}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:12px 0}
.mode-btn{padding:12px 6px;font-size:15px;cursor:pointer;background:#e8f5e9;color:#1b5e20;border:3px solid #c8e6c9;border-radius:12px;font-weight:bold;transition:all .15s;font-family:inherit;line-height:1.4}
.mode-btn:hover{background:#c8e6c9}.mode-btn.selected{background:#4caf50;color:white;border-color:#2e7d32}
.mode-icon{font-size:22px;display:block;margin-bottom:3px}
#mini-overlay{position:absolute;inset:0;background:rgba(0,0,0,.8);z-index:3000;display:flex;justify-content:center;align-items:center}
#mini-box{background:#fff;border-radius:22px;padding:20px 18px;width:90%;max-width:420px}
#mini-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
#mini-title{font-size:20px;font-weight:bold;color:#2e7d32}
#mini-progress{font-size:15px;color:#888;background:#f1f8e9;padding:3px 12px;border-radius:20px}
#mini-fall-area{height:160px;background:linear-gradient(135deg,#e8f5e9,#f1f8e9);border-radius:14px;position:relative;overflow:hidden;margin-bottom:11px;border:2px solid #c8e6c9}
#mini-falling-word{position:absolute;left:50%;transform:translateX(-50%);width:210px;height:112px;display:flex;justify-content:center;align-items:center;top:0}
.diamond-bg{position:absolute;width:210px;height:112px;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);background:linear-gradient(135deg,#29b6f6,#0288d1);transition:background .3s}
.diamond-text{position:relative;z-index:1;font-weight:bold;color:#fff;white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,80,.45)}
#mini-fall-bar{position:absolute;bottom:0;left:0;right:0;height:5px}
#mini-fall-bar-fill{height:100%;background:#66bb6a;border-radius:2px;width:100%}
#mini-problem-area{height:108px;background:linear-gradient(135deg,#fff3e0,#fce4ec);border-radius:14px;padding:12px;margin-bottom:11px;display:flex;flex-direction:column;justify-content:center;align-items:center;border:2px solid #ffccbc}
#mini-problem-text{font-size:42px;font-weight:bold;color:#d32f2f;letter-spacing:3px}
#mini-math-timer{width:100%;height:7px;background:#ddd;border-radius:4px;margin-top:10px}
#mini-math-timer-fill{height:100%;background:#ef5350;border-radius:4px;width:100%}
#mini-input-row{display:flex;gap:8px;margin-bottom:9px}
#mini-input{flex:1;font-size:24px;padding:9px 12px;border:2px solid #ddd;border-radius:10px;outline:none;font-family:inherit;text-align:center}
#mini-input:focus{border-color:#4caf50}
#mini-submit{padding:9px 14px;font-size:20px;background:#4caf50;color:white;border:none;border-radius:10px;cursor:pointer;font-weight:bold;min-width:60px;font-family:inherit}
#mini-feedback{font-size:22px;font-weight:bold;text-align:center;min-height:32px;margin-bottom:3px}
#mini-result{text-align:center;padding:4px 0}
#mini-result-stars{font-size:34px;margin-bottom:8px}
#mini-result-title{font-size:24px;font-weight:bold;margin-bottom:7px;color:#2e7d32}
#mini-result-sub{font-size:14px;color:#666;margin-bottom:14px;line-height:1.7}
#mini-continue-btn{padding:12px 34px;font-size:20px;background:#4caf50;color:white;border:none;border-radius:12px;cursor:pointer;font-weight:bold;font-family:inherit}
</style>
</head>
<body>
<div id="info">
  <div id="score-val" class="stat">Score: 0</div>
  <div id="level-val" class="stat">Level: 1</div>
  <div id="env-badge">봄의 숲</div>
</div>
<div id="energy-bar" class="hidden">
  <span class="heart" id="h1">❤️</span><span class="heart" id="h2">❤️</span>
  <span class="heart" id="h3">❤️</span><span class="heart" id="h4">❤️</span>
  <span class="heart" id="h5">❤️</span>
</div>
<div id="msg-layer"><div id="countdown"></div><div id="levelup-msg"></div></div>
<div id="controls" class="hidden">
  <div></div><div class="ctrl-btn btn-up" id="btn-up">▲</div><div></div>
  <div class="ctrl-btn btn-left" id="btn-left">◀</div><div></div>
  <div class="ctrl-btn btn-right" id="btn-right">▶</div>
  <div></div><div class="ctrl-btn btn-down" id="btn-down">▼</div><div></div>
</div>
<div id="mini-overlay" class="hidden">
  <div id="mini-box">
    <div id="mini-header"><span id="mini-title">타자 연습</span><span id="mini-progress">1/9</span></div>
    <div id="mini-fall-area"><div id="mini-falling-word"><div class="diamond-bg"></div><span class="diamond-text">나비</span></div><div id="mini-fall-bar"><div id="mini-fall-bar-fill"></div></div></div>
    <div id="mini-problem-area" class="hidden"><div id="mini-problem-text">3 × 4 = ?</div><div id="mini-math-timer"><div id="mini-math-timer-fill"></div></div></div>
    <div id="mini-input-row"><input id="mini-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="여기에 입력"><button id="mini-submit">확인</button></div>
    <div id="mini-feedback"></div>
    <div id="mini-result" class="hidden"><div id="mini-result-stars"></div><div id="mini-result-title"></div><div id="mini-result-sub"></div><button id="mini-continue-btn" onclick="closeMiniGame()">계속하기 ▶</button></div>
  </div>
</div>
<div id="ui">
  <div id="home-screen" class="screen">
    <h2 style="color:#2e7d32;margin:0 0 5px;font-size:23px;">🌊 숲속의 강 모험</h2>
    <p style="font-size:12px;color:#555;margin:0 0 10px;line-height:1.7">보트를 타고 강을 내려가세요!<br>💎 다이아몬드 수집 · 🦈 수중 생물 주의 · 미니게임 클리어!</p>
    <div style="font-size:13px;font-weight:bold;color:#444;text-align:left;margin-bottom:6px">미니게임 모드 선택:</div>
    <div class="mode-grid">
      <button class="mode-btn" id="mode-typing" onclick="selectMode('typing')"><span class="mode-icon">⌨️</span>타자 연습</button>
      <button class="mode-btn" id="mode-arith" onclick="selectMode('arith')"><span class="mode-icon">➕</span>셈하기 연습</button>
      <button class="mode-btn" id="mode-mult" onclick="selectMode('mult')"><span class="mode-icon">✖️</span>구구단 연습</button>
      <button class="mode-btn" id="mode-div" onclick="selectMode('div')"><span class="mode-icon">➗</span>나눗셈 연습</button>
    </div>
    <div style="font-size:11px;background:#f1f8e9;padding:8px;border-radius:8px;margin-bottom:8px;line-height:2;color:#444">
      1~2단계: 봄의 숲 | 3~4단계: 가을 숲 | 5~6단계: 겨울 숲 | 7단계~: 마법의 숲
    </div>
    <button class="main-btn" id="btn-start" disabled onclick="startSequence()">모험 시작!</button>
  </div>
  <div id="finish-screen" class="screen hidden">
    <h2 style="color:#d32f2f;margin:0 0 12px">⛵ 모험 종료</h2>
    <p id="final-score" style="font-size:20px;font-weight:bold;color:#333;margin-bottom:18px"></p>
    <button class="main-btn" onclick="location.reload()">다시 도전</button>
  </div>
</div>
<canvas id="gameCanvas"></canvas>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const scoreEl=document.getElementById('score-val');
const levelEl=document.getElementById('level-val');
const envBadge=document.getElementById('env-badge');
const countEl=document.getElementById('countdown');
const levelupMsg=document.getElementById('levelup-msg');
const HEARTS=[1,2,3,4,5].map(i=>document.getElementById('h'+i));

const THEMES=[
  {name:'봄의 숲',bg:'#2d5a27',bank:'#9c8a5e',riverDeep:'#1565c0',riverBase:'#1e88e5',riverLight:'#64b5f6',foam:'rgba(200,235,255,0.28)',treesA:['#1b5e20','#2e7d32','#388e3c'],treesB:['#33691e','#558b2f','#689f38'],trunk:'#4e342e',flowers:['#ffeb3b','#f48fb1','#ce93d8','#ff7043','#aed581'],bird:'#fffde7',rocks:['#546e7a','#607d8b','#78909c'],mtFar:'#1a3d14',mtNear:'#254d1e',grass:'#4caf50'},
  {name:'가을 숲',bg:'#3e2723',bank:'#6d4c3a',riverDeep:'#01579b',riverBase:'#0288d1',riverLight:'#4fc3f7',foam:'rgba(179,229,252,0.28)',treesA:['#bf360c','#d84315','#e64a19'],treesB:['#f57c00','#ff8f00','#ffa000'],trunk:'#3e2723',flowers:['#ffca28','#ffa000','#ff7043','#ef5350','#ff8f00'],bird:'#fff9c4',rocks:['#5d4037','#6d4c41','#795548'],mtFar:'#4a1c05',mtNear:'#6b2d0f',grass:'#ff8f00'},
  {name:'겨울 숲',bg:'#546e7a',bank:'#78909c',riverDeep:'#00838f',riverBase:'#00acc1',riverLight:'#80deea',foam:'rgba(255,255,255,0.45)',treesA:['#cfd8dc','#b0bec5','#eceff1'],treesB:['#546e7a','#607d8b','#78909c'],trunk:'#6d4c41',flowers:['#e3f2fd','#bbdefb','#e0f7fa','#ffffff','#f8bbd0'],bird:'#e3f2fd',rocks:['#78909c','#90a4ae','#b0bec5'],mtFar:'#37474f',mtNear:'#455a64',grass:'#b0bec5'},
  {name:'마법의 숲',bg:'#0d0221',bank:'#2a0a4e',riverDeep:'#4527a0',riverBase:'#7c4dff',riverLight:'#b388ff',foam:'rgba(209,196,233,0.32)',treesA:['#4a148c','#6a1b9a','#7b1fa2'],treesB:['#311b92','#1a237e','#283593'],trunk:'#1a237e',flowers:['#ea80fc','#e040fb','#ce93d8','#ff80ab','#82b1ff'],bird:'#ce93d8',rocks:['#311b92','#4527a0','#4a148c'],mtFar:'#0d0033',mtNear:'#1a0050',grass:'#7c4dff'}
];
function getTheme(lv){if(lv<=2)return THEMES[0];if(lv<=4)return THEMES[1];if(lv<=6)return THEMES[2];return THEMES[3];}

const GEM_PALS=[
  ['#0d47a1','#1976d2','#42a5f5','#90caf9','#e3f2fd'],
  ['#880e4f','#c2185b','#f06292','#f8bbd0','#fce4ec'],
  ['#1b5e20','#388e3c','#66bb6a','#c8e6c9','#e8f5e9'],
  ['#4a148c','#7b1fa2','#ba68c8','#e1bee7','#f3e5f5'],
  ['#b71c1c','#d32f2f','#ef5350','#ffcdd2','#ffebee'],
  ['#e65100','#f57c00','#ffa726','#ffe082','#fffde7'],
  ['#006064','#0097a7','#4dd0e1','#b2ebf2','#e0f7fa'],
];

const PATH_STEP=30,BOAT_R=16,BOOST_MULT=2.2,BRAKE_MULT=0.2,INV_FRAMES=90;
let RIVER_W=600,riverDisplayW=600;

let gameActive=false,miniGameActive=false;
let boat,boatVx,riverPath,riverRocks,birds;
let nearestIdx,pathDriftX;
let score,level,speed;
let leftHeld=false,rightHeld=false,upHeld=false,downHeld=false;
let tick=0,fadeAlpha=0;
let DECOR=[],MOUNTAINS=[];
let energy=5,invFrames=0;
let gameMode=null,selectedBoat='yacht';
let pathSegType='diagonal',pathSegLen=0;
let pathWidthMult=1.0,pathWidthTarget=1.0,pathWidthTimer=0;
let riverDiamonds=[],waterCreatures=[],fallingRocks=[],floatTexts=[];

let miniWords=[],miniWordIdx=0,miniProblems=[],miniProbIdx=0,miniCorrect=0;
let fallAnimId=null,mathAnimId=null,currentAnswer='';

const WORD_LISTS=[
  ['나비','꽃잎','하늘','사과','나무','강물','봄날','눈물','마음','친구','학교','바람','구름','달님','별빛','햇살','토끼','오리','다람쥐','고래','연필','지우개','의자','책상','창문','모자','장갑','양말','신발','배추'],
  ['사랑해','행복해','초록빛','파란색','강아지','고양이','민들레','하늘색','봄바람','나뭇잎','무지개','소나기','열기구','잠자리','반딧불','여우비','수달이','하마야','기린아','코끼리','장미꽃','개나리','진달래','수선화'],
  ['아름다운','대한민국','행복한날','봄날의꿈','파란하늘','초록나무','맑은강물','즐거운날','가을단풍','반짝이는','따뜻한봄','산들바람','황금들판','눈덮인산','흐르는강','울창한숲'],
  ['아름다워요','행복한하루','봄날의소풍','신나는모험','즐거운공부','멋진우리들','따뜻한봄날','눈부신여름','알록달록한','형형색색의','파도치는바다','산넘어저편에'],
];
const DIAMOND_COLORS=['linear-gradient(135deg,#29b6f6,#0288d1)','linear-gradient(135deg,#66bb6a,#2e7d32)','linear-gradient(135deg,#ffa726,#e65100)','linear-gradient(135deg,#ce93d8,#6a1b9a)'];
function rnd(min,max){return Math.floor(Math.random()*(max-min+1))+min;}

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

function generateMorePath(count){
  const last=riverPath[riverPath.length-1];
  let x=last.x,y=last.y;
  for(let i=0;i<count;i++){
    if(pathSegLen<=0){
      const r=Math.random();
      if(r<0.28){pathSegType='straight';pathSegLen=rnd(12,28);pathDriftX*=0.2;}
      else if(r<0.52){pathSegType='horizontal';pathSegLen=rnd(8,18);pathDriftX=(Math.random()<.5?1:-1)*rnd(14,26);}
      else if(r<0.78){pathSegType='diagonal';pathSegLen=rnd(14,32);}
      else{pathSegType='curve';pathSegLen=rnd(20,42);pathDriftX=(Math.random()<.5?1:-1)*rnd(8,20);}
    }
    pathSegLen--;
    switch(pathSegType){
      case 'straight':pathDriftX*=0.72;break;
      case 'horizontal':pathDriftX+=(Math.random()-.5)*2;pathDriftX=Math.max(-28,Math.min(28,pathDriftX));break;
      case 'diagonal':pathDriftX+=(Math.random()-.5)*9;pathDriftX=Math.max(-24,Math.min(24,pathDriftX));break;
      case 'curve':pathDriftX*=0.95;break;
    }
    if(pathWidthTimer<=0){pathWidthTarget=0.45+Math.random()*1.1;pathWidthTimer=rnd(90,200);}
    pathWidthTimer--;pathWidthMult=pathWidthTarget;
    y-=PATH_STEP;x+=pathDriftX;
    riverPath.push({x,y,w:pathWidthMult});
    const idx=riverPath.length-1;
    const localW=pathWidthMult*RIVER_W;
    if(idx>30&&Math.random()<0.045){const ang=(Math.random()-.5)*Math.PI;const dist=(0.08+Math.random()*0.35)*localW;riverRocks.push({x:x+Math.cos(ang)*dist,y,r:(20+Math.random()*32)*3,rot:Math.random()*Math.PI*2,style:rnd(0,2)});}
    if(idx>15&&Math.random()<0.014){riverDiamonds.push({x:x+(Math.random()-.5)*localW*.45,y,r:36,collected:false,pulse:Math.random()*Math.PI*2,pal:rnd(0,6)});}
  }
}

function initGame(){
  RIVER_W=Math.min(Math.max(Math.floor(canvas.width*0.70),240),680);
  const sx=canvas.width/2,sy=canvas.height*0.75;
  boat={x:sx,y:sy};boatVx=0;
  riverPath=[{x:sx,y:sy,w:1.0}];riverRocks=[];birds=[];
  riverDiamonds=[];waterCreatures=[];fallingRocks=[];floatTexts=[];
  pathDriftX=0;nearestIdx=0;pathSegType='diagonal';pathSegLen=0;
  pathWidthMult=1.0;pathWidthTarget=1.0;pathWidthTimer=0;riverDisplayW=RIVER_W;
  score=0;level=1;speed=2;tick=0;fadeAlpha=0;
  energy=5;invFrames=0;miniGameActive=false;
  updateEnergyBar();
  generateMorePath(900);
  for(let i=0;i<3;i++){const pidx=12+i*14;if(pidx<riverPath.length){const p=riverPath[pidx];riverDiamonds.push({x:p.x+(Math.random()-.5)*RIVER_W*.4,y:p.y,r:36,collected:false,pulse:Math.random()*Math.PI*2,pal:rnd(0,6)});}}
  DECOR=[];
  for(let i=0;i<420;i++){const side=Math.random()<.5?-1:1;const distFromRiver=RIVER_W*.52+Math.random()*600;DECOR.push({x:sx+side*distFromRiver,y:sy-i*100,type:Math.random()<0.55?'tree':Math.random()<0.6?'bush':'flower',kind:Math.floor(Math.random()*3),size:20+Math.random()*46,ci:Math.floor(Math.random()*5),phase:Math.random()*Math.PI*2});}
  MOUNTAINS=[];
  for(let i=0;i<120;i++){const side=Math.random()<.5?-1:1;MOUNTAINS.push({x:sx+side*(RIVER_W*.6+200+Math.random()*700),y:sy-i*200,w:100+Math.random()*220,h:80+Math.random()*160,style:Math.random()<.6?'peak':'dome',snow:Math.random()<.4});}
}

function updateEnergyBar(){HEARTS.forEach((h,i)=>h.classList.toggle('empty',i>=energy));}
function addHeart(){if(energy<5){energy++;updateEnergyBar();}}
function takeHit(){
  if(invFrames>0)return;
  energy=Math.max(0,energy-1);invFrames=INV_FRAMES;updateEnergyBar();
  const h=HEARTS[energy];
  if(h){h.classList.remove('shake');void h.offsetWidth;h.classList.add('shake');setTimeout(()=>h.classList.remove('shake'),600);}
  if(energy<=0)endGame();
}
function showFloatText(x,y,text){floatTexts.push({x,y,text,life:75,vy:-2});}

function updateNearestIdx(){
  while(nearestIdx<riverPath.length-2&&Math.abs(riverPath[nearestIdx+1].y-boat.y)<Math.abs(riverPath[nearestIdx].y-boat.y))nearestIdx++;
  if(nearestIdx>riverPath.length-120)generateMorePath(400);
}
function distToRiver(){
  let minD=Infinity;

function drawDiamond(d){

function draw(){
  const th=getTheme(level);ctx.fillStyle=th.bg;ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.save();ctx.translate(-boat.x+canvas.width/2,-boat.y+canvas.height*.75);
  MOUNTAINS.forEach(m=>{const sy=m.y-boat.y+canvas.height*.75;if(sy<-300||sy>canvas.height+300)return;const sx=m.x-boat.x+canvas.width/2;if(sx<-400||sx>canvas.width+400)return;drawMountain(m,th);});
  DECOR.forEach(d=>{const sy=d.y-boat.y+canvas.height*.75;if(sy<-160||sy>canvas.height+160)return;const sx=d.x-boat.x+canvas.width/2;if(sx<-200||sx>canvas.width+200)return;if(d.type==='tree'){if(d.kind===0)drawPine(d.x,d.y,d.size,th);else if(d.kind===1)drawOak(d.x,d.y,d.size,th);else drawTall(d.x,d.y,d.size,th);}else if(d.type==='bush')drawBush(d.x,d.y,d.size,th);else drawFlower(d,th);});
  drawBankGrass(th);drawRiver(th);drawRiverWaves(th);
  riverRocks.forEach(r=>{if(Math.abs(r.y-boat.y)>canvas.height)return;drawRock(r,th);});
  fallingRocks.forEach(fr=>{if(Math.abs(fr.y-boat.y)>canvas.height)return;drawFallingRock(fr,th);});
  riverDiamonds.forEach(d=>{if(d.collected)return;if(d.y>boat.y+300||d.y<boat.y-canvas.height*1.2)return;drawDiamond(d);});
  waterCreatures.forEach(c=>{if(Math.abs(c.baseY-boat.y)>canvas.height*1.2)return;const inWater=!c.jumping||Math.sin(c.jumpPhase||0)<=0.08;ctx.globalAlpha=inWater?.2:1;if(c.type==='shark')drawShark(c);else if(c.type==='whale')drawWhale(c);else drawFish(c);ctx.globalAlpha=1;});
  birds.forEach(b=>drawBird(b,th));drawBoat();
  ctx.textAlign='center';ctx.font='bold 22px "Malgun Gothic",sans-serif';
  floatTexts.forEach(ft=>{ctx.globalAlpha=Math.min(1,ft.life/28);ctx.strokeStyle='rgba(0,0,0,.55)';ctx.lineWidth=3;ctx.strokeText(ft.text,ft.x,ft.y);ctx.fillStyle='#fff';ctx.fillText(ft.text,ft.x,ft.y);ft.y+=ft.vy;ft.life--;});
  floatTexts=floatTexts.filter(ft=>ft.life>0);ctx.globalAlpha=1;ctx.restore();
  drawParticles();
  if(fadeAlpha>0){ctx.fillStyle=`rgba(255,255,255,${fadeAlpha.toFixed(2)})`;ctx.fillRect(0,0,canvas.width,canvas.height);fadeAlpha=Math.max(0,fadeAlpha-.04);}
}

function endGame(){gameActive=false;miniGameActive=false;clearMiniAnimations();document.getElementById('mini-overlay').classList.add('hidden');document.getElementById('controls').classList.add('hidden');document.getElementById('energy-bar').classList.add('hidden');document.getElementById('finish-screen').classList.remove('hidden');document.getElementById('final-score').innerText=`점수: ${Math.floor(score/10)} | Level: ${level}`;}

function update(){
  if(!gameActive)return;tick++;if(invFrames>0)invFrames--;
  const STEER=0.5,MAX_VX=Math.min(5+level*.3,8);
  if(leftHeld)boatVx=Math.max(-MAX_VX,boatVx-STEER);if(rightHeld)boatVx=Math.min(MAX_VX,boatVx+STEER);
  boatVx*=.88;const curSpeed=upHeld?speed*BOOST_MULT:downHeld?speed*BRAKE_MULT:speed;
  boat.x+=boatVx;boat.y-=curSpeed;updateNearestIdx();
  const localRW=(riverPath[nearestIdx]?.w||1)*RIVER_W;
  if(distToRiver()>localRW/2-BOAT_R){const p=riverPath[nearestIdx];boat.x+=(p.x-boat.x)*.55;boatVx=0;takeHit();if(!gameActive)return;}
  if(riverRocks.some(r=>Math.hypot(boat.x-r.x,boat.y-r.y)<r.r+BOAT_R-4)){takeHit();if(!gameActive)return;}
  if(level>=3){const spawnC=0.003*(level-2)*(1+Math.floor(level/3)*.2);if(Math.random()<spawnC){const ahead=Math.min(nearestIdx+rnd(8,22),riverPath.length-1);const p=riverPath[ahead];fallingRocks.push({x:p.x+(Math.random()-.5)*localRW*.65,y:boat.y-canvas.height*.8,vy:1.8+Math.random()*1.5+(level-3)*.4,r:(14+Math.random()*16)*3,rot:0,rotV:(Math.random()-.5)*.12,style:rnd(0,2)});}fallingRocks.forEach(fr=>{fr.y+=fr.vy;fr.rot+=fr.rotV;});fallingRocks=fallingRocks.filter(fr=>fr.y<boat.y+150);if(fallingRocks.some(fr=>Math.hypot(boat.x-fr.x,boat.y-fr.y)<fr.r+BOAT_R-4)){takeHit();if(!gameActive)return;}}
  let pendingDiamondMini=false;
  riverDiamonds.forEach(d=>{if(d.collected)return;if(Math.hypot(boat.x-d.x,boat.y-d.y)<d.r+BOAT_R+6){d.collected=true;if(Math.random()<.5){showFloatText(d.x,d.y,'💎 미니게임!');pendingDiamondMini=true;}else{addHeart();showFloatText(d.x,d.y,'💎 ❤️ +1!');}}});
  riverDiamonds=riverDiamonds.filter(d=>!d.collected&&d.y<=boat.y+300);
  const FISH_COLS=['#ff8f00','#e91e63','#00bcd4','#8bc34a','#ff5722'];
  const cMax=4+Math.floor(level/2);
  if(waterCreatures.length<cMax&&Math.random()<0.005*(1+level*.1)){const ahead=Math.min(nearestIdx+rnd(12,30),riverPath.length-1);const p=riverPath[ahead];const lw=(p.w||1)*RIVER_W;const r2=Math.random();if(r2<0.25)waterCreatures.push({x:p.x+(Math.random()-.5)*lw*.5,baseY:p.y,y:p.y,type:'shark',vx:(Math.random()<.5?1:-1)*(1.5+Math.random()*2),jumping:false,jumpPhase:0,jumpTimer:rnd(40,90),jumpHeight:60,dangerous:true});else if(r2<0.45)waterCreatures.push({x:p.x+(Math.random()-.5)*lw*.4,baseY:p.y,y:p.y,type:'whale',vx:(Math.random()<.5?1:-1)*(.8+Math.random()*1.4),jumping:false,jumpPhase:0,jumpTimer:rnd(50,110),jumpHeight:78,dangerous:true});else waterCreatures.push({x:p.x+(Math.random()-.5)*lw*.55,baseY:p.y,y:p.y,type:'fish',vx:(Math.random()<.5?1:-1)*(2+Math.random()*3),jumping:false,jumpPhase:0,jumpTimer:rnd(20,60),jumpHeight:30,dangerous:false,col:FISH_COLS[rnd(0,4)]});}
  waterCreatures.forEach(c=>{c.baseY+=curSpeed;c.x+=c.vx;const cx=riverCenterX(nearestIdx);const lw=(riverPath[nearestIdx]?.w||1)*RIVER_W;if(Math.abs(c.x-cx)>lw*.45){c.vx*=-1;c.x+=c.vx*2;}if(!c.jumping){if(--c.jumpTimer<=0){c.jumping=true;c.jumpPhase=0;c.jumpTimer=rnd(c.type==='fish'?15:55,c.type==='fish'?50:200);}c.y=c.baseY;}else{c.jumpPhase+=c.type==='fish'?.14:.07+level*.005;c.y=c.baseY-Math.sin(c.jumpPhase)*c.jumpHeight;if(c.jumpPhase>=Math.PI)c.jumping=false;}});
  if(waterCreatures.some(c=>c.dangerous&&c.jumping&&Math.sin(c.jumpPhase)>0.15&&Math.hypot(boat.x-c.x,boat.y-c.y)<34+BOAT_R)){takeHit();if(!gameActive)return;}
  waterCreatures=waterCreatures.filter(c=>c.baseY<boat.y+400&&c.baseY>boat.y-canvas.height*1.5);
  if(Math.random()<.004*(1+level*.2))birds.push({x:boat.x+(Math.random()*600-300),y:boat.y-450,phase:Math.random()*Math.PI*2});
  birds.forEach(b=>{b.y+=curSpeed*.35;b.x+=Math.sin(tick*.02+b.phase)*.7;});birds=birds.filter(b=>b.y<boat.y+800);
  if(birds.some(b=>Math.hypot(boat.x-b.x,boat.y-b.y)<26)){takeHit();if(!gameActive)return;}
  score++;const cur=Math.floor(score/10);scoreEl.innerText=`Score: ${cur}`;
  const newLv=Math.floor(cur/500)+1;
  if(newLv>level){level=newLv;speed=Math.min(2+(level-1)*.5,7);levelEl.innerText=`Level: ${level}`;envBadge.innerText=getTheme(level).name;fadeAlpha=.75;levelupMsg.innerText=`LEVEL ${level}!`;levelupMsg.style.display='block';levelupMsg.classList.remove('pop-anim');void levelupMsg.offsetWidth;levelupMsg.classList.add('pop-anim');setTimeout(()=>{levelupMsg.style.display='none';levelupMsg.classList.remove('pop-anim');},1350);}
  if(pendingDiamondMini){draw();triggerMiniGame();return;}
  draw();requestAnimationFrame(update);
}

function genArith(lv){let a,b;if(lv<=1){a=rnd(1,9);b=rnd(1,9);}else if(lv===2){a=rnd(10,99);b=rnd(1,9);}else{a=rnd(10,99);b=rnd(10,99);}const op=Math.random()<.5?'+':'-';if(op==='-'&&b>a){const t=a;a=b;b=t;}return{text:`${a} ${op} ${b} = ?`,answer:op==='+'?a+b:a-b};}
function genMult(lv){let a,b;if(lv<=1){a=rnd(2,9);b=rnd(2,9);}else if(lv===2){a=rnd(2,9);b=rnd(10,19);}else{a=rnd(10,19);b=rnd(10,19);}return{text:`${a} × ${b} = ?`,answer:a*b};}
function genDiv(lv){let b,ans;if(lv<=1){b=rnd(2,5);ans=rnd(1,9);}else if(lv===2){b=rnd(2,9);ans=rnd(2,9);}else{b=rnd(2,9);ans=rnd(10,20);}return{text:`${b*ans} ÷ ${b} = ?`,answer:ans};}
function clearMiniAnimations(){if(fallAnimId){cancelAnimationFrame(fallAnimId);fallAnimId=null;}if(mathAnimId){cancelAnimationFrame(mathAnimId);mathAnimId=null;}}
function triggerMiniGame(){
  gameActive=false;miniGameActive=true;miniWordIdx=0;miniProbIdx=0;miniCorrect=0;
  document.getElementById('mini-result').classList.add('hidden');document.getElementById('mini-fall-area').classList.remove('hidden');document.getElementById('mini-problem-area').classList.add('hidden');document.getElementById('mini-input-row').classList.remove('hidden');document.getElementById('mini-feedback').classList.remove('hidden');document.getElementById('mini-feedback').textContent='';document.getElementById('mini-progress').classList.remove('hidden');document.getElementById('mini-overlay').classList.remove('hidden');
  if(gameMode==='typing'){document.getElementById('mini-title').textContent='⌨️ 타자 연습';document.getElementById('mini-fall-area').classList.remove('hidden');document.getElementById('mini-problem-area').classList.add('hidden');const wlIdx=Math.min(Math.floor((level-1)/2),WORD_LISTS.length-1);document.querySelector('#mini-falling-word .diamond-bg').style.background=DIAMOND_COLORS[wlIdx];miniWords=[...WORD_LISTS[wlIdx]].sort(()=>Math.random()-.5).slice(0,9);setTimeout(()=>{document.getElementById('mini-input').value='';document.getElementById('mini-input').focus();startTypingRound();},150);}
  else{const names={arith:'➕ 셈하기 연습',mult:'✖️ 구구단 연습',div:'➗ 나눗셈 연습'};document.getElementById('mini-title').textContent=names[gameMode];document.getElementById('mini-fall-area').classList.add('hidden');document.getElementById('mini-problem-area').classList.remove('hidden');const lv=Math.min(level,4);miniProblems=Array.from({length:9},()=>gameMode==='arith'?genArith(lv):gameMode==='mult'?genMult(lv):genDiv(lv));setTimeout(()=>{document.getElementById('mini-input').value='';document.getElementById('mini-input').focus();startMathRound();},150);}
}
function startTypingRound(){if(miniWordIdx>=9){showMiniResult();return;}clearMiniAnimations();const word=miniWords[miniWordIdx];document.getElementById('mini-progress').textContent=`${miniWordIdx+1}/9`;const dtEl=document.querySelector('#mini-falling-word .diamond-text');dtEl.textContent=word;dtEl.style.fontSize=(word.length<=2?28:word.length<=4?22:word.length<=6?18:15)+'px';document.getElementById('mini-feedback').textContent='';document.getElementById('mini-input').value='';currentAnswer=word;const fallMs=Math.max(2000,10000-(level-1)*900);const fallEl=document.getElementById('mini-falling-word');const barFill=document.getElementById('mini-fall-bar-fill');const area=document.getElementById('mini-fall-area');const startT=performance.now();function animFall(now){const prog=Math.min((now-startT)/fallMs,1);fallEl.style.top=(prog*Math.max(0,area.offsetHeight-112))+'px';barFill.style.width=((1-prog)*100)+'%';barFill.style.background=prog<.6?'#66bb6a':prog<.85?'#ffb300':'#ef5350';if(prog>=1){showFeedback('⏰ 시간 초과!',false);setTimeout(()=>{miniWordIdx++;startTypingRound();},700);}else{fallAnimId=requestAnimationFrame(animFall);}}fallAnimId=requestAnimationFrame(animFall);}
function startMathRound(){if(miniProbIdx>=9){showMiniResult();return;}clearMiniAnimations();const prob=miniProblems[miniProbIdx];document.getElementById('mini-progress').textContent=`${miniProbIdx+1}/9`;document.getElementById('mini-problem-text').textContent=prob.text;document.getElementById('mini-feedback').textContent='';document.getElementById('mini-input').value='';currentAnswer=String(prob.answer);const timeMs=Math.max(4000,15000-(level-1)*2500);const barFill=document.getElementById('mini-math-timer-fill');const startT=performance.now();function animTimer(now){const prog=Math.min((now-startT)/timeMs,1);barFill.style.width=((1-prog)*100)+'%';barFill.style.background=prog<.6?'#66bb6a':prog<.85?'#ffb300':'#ef5350';if(prog>=1){showFeedback('⏰ 시간 초과!',false);setTimeout(()=>{miniProbIdx++;startMathRound();},700);}else{mathAnimId=requestAnimationFrame(animTimer);}}mathAnimId=requestAnimationFrame(animTimer);}
function submitMiniAnswer(){const inp=document.getElementById('mini-input');const val=inp.value.trim();if(!val)return;clearMiniAnimations();const correct=gameMode==='typing'?val===currentAnswer:Number(val)===Number(currentAnswer);if(correct){miniCorrect++;showFeedback('✅ 정답!',true);}else{showFeedback(`❌ 오답 (정답: ${currentAnswer})`,false);}inp.value='';setTimeout(()=>{if(gameMode==='typing'){miniWordIdx++;startTypingRound();}else{miniProbIdx++;startMathRound();}},650);}
function showFeedback(msg,ok){const fb=document.getElementById('mini-feedback');fb.textContent=msg;fb.style.color=ok?'#2e7d32':'#d32f2f';}
function showMiniResult(){clearMiniAnimations();document.getElementById('mini-fall-area').classList.add('hidden');document.getElementById('mini-problem-area').classList.add('hidden');document.getElementById('mini-input-row').classList.add('hidden');document.getElementById('mini-feedback').classList.add('hidden');document.getElementById('mini-progress').classList.add('hidden');document.getElementById('mini-result').classList.remove('hidden');let stars,title,sub;if(miniCorrect>=9){stars='⭐⭐⭐';title=`완벽해요! ${miniCorrect}/9`;}else if(miniCorrect>=7){stars='⭐⭐';title=`훌륭해요! ${miniCorrect}/9`;}else if(miniCorrect>=5){stars='⭐';title=`잘 했어요! ${miniCorrect}/9`;}else{stars='💪';title=`다음엔 더 잘할 수 있어요! ${miniCorrect}/9`;}if(miniCorrect>=7){energy=5;sub='에너지가 완전히 회복됩니다! ❤️❤️❤️❤️❤️';}else if(miniCorrect>=5){const prev=energy;energy=Math.min(5,energy+2);sub=`에너지 +${energy-prev} 회복!`;}else{sub='5개 이상 맞히면 에너지가 회복됩니다.';}updateEnergyBar();document.getElementById('mini-result-stars').textContent=stars;document.getElementById('mini-result-title').textContent=title;document.getElementById('mini-result-sub').textContent=sub;setTimeout(()=>document.getElementById('mini-continue-btn').focus(),100);}
function closeMiniGame(){clearMiniAnimations();document.getElementById('mini-overlay').classList.add('hidden');document.getElementById('mini-fall-area').classList.remove('hidden');document.getElementById('mini-input-row').classList.remove('hidden');document.getElementById('mini-feedback').classList.remove('hidden');document.getElementById('mini-progress').classList.remove('hidden');document.getElementById('mini-result').classList.add('hidden');document.getElementById('mini-feedback').textContent='';miniGameActive=false;gameActive=true;requestAnimationFrame(update);}
(function(){const inp=document.getElementById('mini-input');inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.isComposing){e.preventDefault();submitMiniAnswer();}});document.getElementById('mini-submit').addEventListener('click',submitMiniAnswer);})();

function setupControls(){const map={'btn-left':{d:()=>{leftHeld=true;},u:()=>{leftHeld=false;}},'btn-right':{d:()=>{rightHeld=true;},u:()=>{rightHeld=false;}},'btn-up':{d:()=>{upHeld=true;},u:()=>{upHeld=false;}},'btn-down':{d:()=>{downHeld=true;},u:()=>{downHeld=false;}}};Object.entries(map).forEach(([id,{d,u}])=>{const el=document.getElementById(id);el.addEventListener('pointerdown',e=>{e.preventDefault();d();el.classList.add('pressed');});['pointerup','pointerleave','pointercancel'].forEach(ev=>el.addEventListener(ev,()=>{u();el.classList.remove('pressed');}));});window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'){e.preventDefault();leftHeld=true;}if(e.key==='ArrowRight'){e.preventDefault();rightHeld=true;}if(e.key==='ArrowUp'){e.preventDefault();upHeld=true;}if(e.key==='ArrowDown'){e.preventDefault();downHeld=true;}});window.addEventListener('keyup',e=>{if(e.key==='ArrowLeft')leftHeld=false;if(e.key==='ArrowRight')rightHeld=false;if(e.key==='ArrowUp')upHeld=false;if(e.key==='ArrowDown')downHeld=false;});}
setupControls();
function selectMode(mode){gameMode=mode;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('selected'));document.getElementById('mode-'+mode).classList.add('selected');document.getElementById('btn-start').disabled=false;}
function startSequence(){document.getElementById('home-screen').classList.add('hidden');document.getElementById('energy-bar').classList.remove('hidden');document.getElementById('controls').classList.remove('hidden');initGame();envBadge.innerText=getTheme(1).name;leftHeld=rightHeld=upHeld=downHeld=false;let c=3;countEl.style.display='block';const t=setInterval(()=>{countEl.innerText=c>0?c:'START!';if(c<0){clearInterval(t);countEl.style.display='none';gameActive=true;update();}c--;},1000);}
</script>
