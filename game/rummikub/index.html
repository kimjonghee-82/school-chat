<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>루미큐브</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  body {
    min-height:100vh;
    background:#0d1117;
    font-family:'Segoe UI', sans-serif;
    color:#fff;
    padding:16px;
  }
  a.back { color:#888; font-size:0.85rem; text-decoration:none; display:inline-block; margin-bottom:10px; }
  a.back:hover { color:#ccc; }
  h1 { text-align:center; font-size:1.4rem; margin-bottom:16px; }

  /* setup screen */
  #setup { max-width:460px; margin:30px auto; background:#161b22; border-radius:16px; padding:28px; }
  #setup h2 { margin-bottom:16px; font-size:1.1rem; }
  #setup label { display:block; margin:10px 0 4px; font-size:0.85rem; color:#8b949e; }
  #setup input, #setup select { width:100%; padding:8px 10px; border-radius:8px; border:1px solid #30363d; background:#0d1117; color:#fff; font-size:0.95rem; }
  #playerNames { display:flex; flex-direction:column; gap:8px; margin-top:8px; }
  #setup .modePane > button, #setup .onlinePane > button { margin-top:14px; width:100%; padding:12px; border:none; border-radius:10px; background:#4caf50; color:#fff; font-size:1rem; font-weight:600; cursor:pointer; }
  #setup .modePane > button:hover, #setup .onlinePane > button:hover { background:#43a047; }

  .modeTabs { display:flex; gap:6px; margin-bottom:18px; }
  .modeTabs button { flex:1; margin:0; padding:10px 6px; font-size:0.82rem; background:#21262d; color:#8b949e; border-radius:8px; }
  .modeTabs button.active { background:#388e3c; color:#fff; }
  .modePane { display:none; }
  .modePane.active { display:block; }
  .onlineSubTabs { display:flex; gap:6px; margin-bottom:12px; }
  .onlineSubTabs button { flex:1; margin:0; padding:8px; font-size:0.8rem; background:#21262d; color:#8b949e; border-radius:8px; }
  .onlineSubTabs button.active { background:#1565c0; color:#fff; }
  .onlinePane { display:none; }
  .onlinePane.active { display:block; }

  #lobby { display:none; max-width:420px; margin:30px auto; background:#161b22; border-radius:16px; padding:28px; text-align:center; }
  #lobby .code { font-size:2rem; font-weight:800; letter-spacing:4px; color:#ffd54f; margin:10px 0 18px; }
  #lobby ul { list-style:none; text-align:left; margin-bottom:16px; }
  #lobby li { padding:8px 12px; background:#0d1117; border-radius:8px; margin-bottom:6px; font-size:0.9rem; }
  #lobby li.empty { color:#6e7681; }
  #lobby button { padding:10px 18px; border:none; border-radius:8px; background:#4caf50; color:#fff; cursor:pointer; font-weight:700; }
  #lobby button:disabled { background:#30363d; cursor:not-allowed; }
  #lobby .hint { font-size:0.78rem; color:#8b949e; margin-top:10px; }

  /* game screen */
  #game { display:none; max-width:980px; margin:0 auto; }
  .topbar { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:10px; background:#161b22; padding:10px 14px; border-radius:12px; }
  .topbar .turn { font-weight:700; color:#ffd54f; }
  .topbar .pool { font-size:0.85rem; color:#8b949e; }
  .scores { font-size:0.78rem; color:#8b949e; }
  .waitNotice { text-align:center; font-size:0.85rem; color:#ffab40; margin-bottom:8px; min-height:18px; }
  #timerBar { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:8px; }
  #timerDisplay { font-size:1.4rem; font-weight:800; min-width:48px; text-align:center; }
  #timerDisplay.urgent { color:#ef5350; animation:pulse 0.5s ease-in-out infinite alternate; }
  #timerDisplay.ok { color:#66bb6a; }
  @keyframes pulse { from { opacity:1; } to { opacity:0.4; } }
  #btnAddTime { padding:6px 14px; border:none; border-radius:8px; background:#5c6bc0; color:#fff; font-size:0.8rem; font-weight:700; cursor:pointer; }
  #btnAddTime:hover { background:#3949ab; }
  #btnAddTime:disabled { background:#30363d; cursor:not-allowed; }

  #table {
    background:#10331f;
    border:2px solid #1d5c34;
    border-radius:14px;
    min-height:220px;
    padding:10px;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    grid-auto-rows:min-content;
    gap:8px;
    margin-bottom:14px;
  }
  @media (max-width:700px){
    #table { grid-template-columns:repeat(2, 1fr); }
  }
  .setRow {
    display:flex;
    flex-wrap:wrap;
    align-content:flex-start;
    gap:4px;
    background:rgba(255,255,255,0.04);
    border-radius:8px;
    padding:6px;
    min-height:48px;
    cursor:pointer;
  }
  .setRow.invalid { outline:2px solid #e53935; }
  .setRow.dragover { outline:2px dashed #42a5f5; }
  #newSetZone {
    border:2px dashed #2e7d32;
    border-radius:8px;
    min-height:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#6fbf73;
    font-size:0.8rem;
    cursor:pointer;
  }
  #newSetZone.dragover { outline:2px dashed #42a5f5; }

  .tile {
    width:42px; height:54px;
    background:#fdf6e3;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
    font-size:1.3rem;
    box-shadow:0 2px 3px rgba(0,0,0,0.4);
    cursor:grab;
    border:2px solid transparent;
  }
  .tile.selected { border-color:#42a5f5; transform:translateY(-4px); }
  .tile.locked { opacity:0.55; cursor:not-allowed; }
  .tile.dragging { opacity:0.3; }
  .tile.joker { font-size:1.5rem; }
  .c-red    { color:#c62828; }
  .c-blue   { color:#0d47a1; }
  .c-black  { color:#111111; }
  .c-orange { color:#f9a825; }
  /* 이전 턴 대비 테이블에 새로 등록/변경된 타일 깜박임 */
  .tile.changed-tile { animation: changedPulse 0.55s ease-in-out infinite alternate; }
  @keyframes changedPulse {
    from { box-shadow: 0 0 0 2px #ffeb3b, 0 2px 3px rgba(0,0,0,0.4); }
    to   { box-shadow: 0 0 0 6px #ff6f00, 0 2px 3px rgba(0,0,0,0.4); background:#fffde7; }
  }
  .backTile {
    width:30px; height:40px; background:#37474f; border-radius:5px; box-shadow:0 2px 3px rgba(0,0,0,0.4);
  }

  #rackWrap {
    background:#161b22;
    border-radius:14px;
    padding:12px;
  }
  #rackHeader { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  #rackHeader .name { font-weight:700; }
  #rackHeader .btns button {
    margin-left:6px; padding:6px 10px; font-size:0.75rem; border:none; border-radius:6px; background:#30363d; color:#fff; cursor:pointer;
  }
  #rackHeader .btns button:hover { background:#3d444d; }
  #rack {
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    min-height:56px;
    background:rgba(255,255,255,0.03);
    border-radius:8px;
    padding:8px;
    cursor:pointer;
  }
  #rack.dragover { outline:2px dashed #42a5f5; }

  .actions { display:flex; gap:10px; justify-content:center; margin-top:14px; flex-wrap:wrap; }
  .actions button {
    padding:12px 20px; border:none; border-radius:10px; font-size:0.9rem; font-weight:700; cursor:pointer;
  }
  .actions button:disabled { background:#30363d !important; cursor:not-allowed; }
  #btnEnd { background:#4caf50; color:#fff; }
  #btnEnd:hover { background:#43a047; }
  #btnUndo { background:#1565c0; color:#fff; }
  #btnUndo:hover { background:#0d47a1; }
  #btnDraw { background:#ef6c00; color:#fff; }
  #btnDraw:hover { background:#e65100; }
  #msg { text-align:center; min-height:20px; font-size:0.85rem; color:#ffab91; margin-top:8px; }

  #gameOver { display:none; max-width:480px; margin:40px auto; background:#161b22; border-radius:16px; padding:28px; text-align:center; }
  #gameOver h2 { margin-bottom:14px; color:#ffd54f; }
  #gameOver table { width:100%; border-collapse:collapse; margin:14px 0; }
  #gameOver td, #gameOver th { padding:6px 8px; border-bottom:1px solid #30363d; font-size:0.85rem; text-align:right; }
  #gameOver th:first-child, #gameOver td:first-child { text-align:left; }
  #gameOver button { margin-top:10px; padding:10px 18px; border:none; border-radius:8px; background:#4caf50; color:#fff; cursor:pointer; font-weight:700; }
</style>
</head>
<body>
<a class="back" href="../">← 게임 목록으로</a>
<h1>🀄 루미큐브</h1>

<div id="setup">
  <div class="modeTabs">
    <button id="tabAI" class="active">PC 인공지능</button>
    <button id="tabOnline">온라인(각자 PC)</button>
  </div>

  <div id="paneAI" class="modePane active">
    <h2>PC(인공지능)와 대결</h2>
    <label for="myNameAI">내 이름</label>
    <input id="myNameAI" value="나">
    <label for="numAI">상대 AI 수</label>
    <select id="numAI">
      <option value="1">1명</option>
      <option value="2" selected>2명</option>
      <option value="3">3명</option>
    </select>
    <button id="btnStartAI">게임 시작</button>
  </div>

  <div id="paneOnline" class="modePane">
    <h2>온라인 (각자 PC에서)</h2>
    <div class="onlineSubTabs">
      <button id="subCreate" class="active">방 만들기</button>
      <button id="subJoin">참가하기</button>
    </div>
    <div id="paneCreate" class="onlinePane active">
      <label for="myNameCreate">내 이름</label>
      <input id="myNameCreate" value="나">
      <label for="numPlayersOnline">전체 인원</label>
      <select id="numPlayersOnline">
        <option value="2">2명</option>
        <option value="3" selected>3명</option>
        <option value="4">4명</option>
      </select>
      <button id="btnCreateRoom">방 만들기</button>
    </div>
    <div id="paneJoin" class="onlinePane">
      <label for="myNameJoin">내 이름</label>
      <input id="myNameJoin" value="나">
      <label for="joinCode">방 코드 (4자리)</label>
      <input id="joinCode" maxlength="4" placeholder="예: 4821">
      <button id="btnJoinRoom">참가하기</button>
    </div>
  </div>
</div>

<div id="lobby">
  <h2>대기실</h2>
  <div class="code" id="lobbyCode"></div>
  <ul id="lobbySeats"></ul>
  <button id="btnHostStart" disabled>모두 입장하면 시작 가능</button>
  <div class="hint" id="lobbyHint">친구에게 방 코드를 알려주고 "참가하기"로 들어오게 하세요.</div>
</div>

<div id="game">
  <div class="topbar">
    <div class="turn" id="turnLabel"></div>
    <div class="pool" id="poolLabel"></div>
    <div class="scores" id="meldLabel"></div>
  </div>
  <div class="waitNotice" id="waitNotice"></div>
  <div id="timerBar">
    <div id="timerDisplay" class="ok">30</div>
    <button id="btnAddTime">+30초</button>
  </div>

  <div id="table"></div>
  <div id="newSetZone">+ 선택한 타일로 새 조합 만들기 (또는 타일을 끌어다 놓기)</div>

  <div id="rackWrap">
    <div id="rackHeader">
      <div class="name" id="rackName"></div>
      <div class="btns">
        <button id="sortNum">번호순</button>
        <button id="sortColor">색상순</button>
      </div>
    </div>
    <div id="rack"></div>
  </div>

  <div class="actions">
    <button id="btnEnd">턴 종료(등록)</button>
    <button id="btnUndo">한 단계 되돌리기</button>
    <button id="btnDraw">타일 뽑기 / 되돌리기</button>
  </div>
  <div id="msg"></div>
</div>

<div id="gameOver">
  <h2 id="winnerLine"></h2>
  <table id="scoreTable"></table>
  <button id="btnRestart">다시 시작</button>
</div>

<script>
const COLORS = ['red','blue','black','orange'];

// ---- firebase ----
let db = null;
try {
  const firebaseConfig = { databaseURL: "https://school-chat-7051e-default-rtdb.firebaseio.com/" };
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  db = firebase.database();
} catch(e){ console.error('Firebase init error', e); }

// ---- global state ----
let mode = 'ai';          // 'ai' | 'online'
let mySeat = null;        // for ai/online: which seat index is "me"
let roomCode = null, roomRef = null, isHost = false, lobbyData = null;
let gameStarted = false, gameOverShown = false;

let G = null;              // { players:[{name,rack,melded,isAI}], table:[[tile]], pool:[tile], current, winner }
let noProgressStreak = 0;  // 연속으로 아무것도 못한 턴 수 (교착 감지)
let tileSeq = 0;
let lockedIds = new Set();
let turnTableSnapshot = null, turnRackSnapshot = null;
let lastTurnOwner = -2;
let selected = null;       // {from:'rack'|'table', setIndex, tile}
let dragRef = null;
let sortMode = null;       // null | 'num' | 'color'
let changedTableIds = new Set(); // 이전 턴 대비 테이블에 새로 나타난 타일 id (깜박임용)
let prevTurnTableIds = new Set(); // 직전 턴 종료 시 테이블 타일 id
let changedTableTimer = null;
let undoStack = [];
let turnTimerInterval = null;
let turnTimeLeft = 30;
const TURN_BASE_TIME = 30;

function sortRack(rack){
  if (sortMode === 'num'){
    rack.sort((a,b) => {
      if (a.joker) return 1;
      if (b.joker) return -1;
      if (a.num !== b.num) return a.num - b.num;
      return COLORS.indexOf(a.color) - COLORS.indexOf(b.color);
    });
  } else if (sortMode === 'color'){
    rack.sort((a,b) => {
      if (a.joker) return 1;
      if (b.joker) return -1;
      if (a.color !== b.color) return COLORS.indexOf(a.color) - COLORS.indexOf(b.color);
      return a.num - b.num;
    });
  }
}

function uid(){ return 'T' + (tileSeq++) + '_' + Math.random().toString(36).slice(2,7); }

function buildDeck(){
  const deck = [];
  for (const color of COLORS){
    for (let n=1;n<=13;n++){
      deck.push({id:uid(), color, num:n});
      deck.push({id:uid(), color, num:n});
    }
  }
  deck.push({id:uid(), joker:true});
  deck.push({id:uid(), joker:true});
  for (let i=deck.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [deck[i],deck[j]] = [deck[j],deck[i]];
  }
  return deck;
}

// ============================================================
// SETUP SCREEN
// ============================================================
function showPane(tabId, paneMap){
  Object.keys(paneMap).forEach(id => {
    document.getElementById(id).classList.toggle('active', id === tabId);
  });
}
document.getElementById('tabAI').addEventListener('click', () => {
  ['tabAI','tabOnline'].forEach(id => document.getElementById(id).classList.toggle('active', id==='tabAI'));
  ['paneAI','paneOnline'].forEach(id => document.getElementById(id).classList.toggle('active', id==='paneAI'));
});
document.getElementById('tabOnline').addEventListener('click', () => {
  ['tabAI','tabOnline'].forEach(id => document.getElementById(id).classList.toggle('active', id==='tabOnline'));
  ['paneAI','paneOnline'].forEach(id => document.getElementById(id).classList.toggle('active', id==='paneOnline'));
});
document.getElementById('subCreate').addEventListener('click', () => {
  ['subCreate','subJoin'].forEach(id => document.getElementById(id).classList.toggle('active', id==='subCreate'));
  ['paneCreate','paneJoin'].forEach(id => document.getElementById(id).classList.toggle('active', id==='paneCreate'));
});
document.getElementById('subJoin').addEventListener('click', () => {
  ['subCreate','subJoin'].forEach(id => document.getElementById(id).classList.toggle('active', id==='subJoin'));
  ['paneCreate','paneJoin'].forEach(id => document.getElementById(id).classList.toggle('active', id==='paneJoin'));
});


document.getElementById('btnStartAI').addEventListener('click', () => {
  const myName = document.getElementById('myNameAI').value.trim() || '나';
  const numAI = parseInt(document.getElementById('numAI').value,10);
  const playersArr = [{name:myName, rack:[], melded:false, isAI:false}];
  for (let i=0;i<numAI;i++) playersArr.push({name:`AI ${i+1}`, rack:[], melded:false, isAI:true});
  const deck = buildDeck();
  for (let i=0;i<playersArr.length;i++){ playersArr[i].rack = deck.splice(0,14); }
  mode = 'ai';
  mySeat = 0;
  G = {players:playersArr, table:[], pool:deck, current:0, winner:null};
  enterGameScreen();
});

// ---- online: create / join ----
function genCode(){ return String(Math.floor(1000 + Math.random()*9000)); }

document.getElementById('btnCreateRoom').addEventListener('click', async () => {
  if (!db){ alert('온라인 기능을 사용할 수 없습니다.'); return; }
  const myName = document.getElementById('myNameCreate').value.trim() || '나';
  const numPlayers = parseInt(document.getElementById('numPlayersOnline').value,10);
  let code = genCode();
  for (let tries=0; tries<6; tries++){
    const snap = await db.ref('rummikub_rooms/'+code).once('value');
    if (!snap.exists()) break;
    code = genCode();
  }
  roomCode = code;
  isHost = true;
  mySeat = 0;
  const names = new Array(numPlayers).fill('');
  names[0] = myName;
  roomRef = db.ref('rummikub_rooms/'+code);
  await roomRef.set({ numPlayers, names, started:false, state:null, createdAt: Date.now() });
  listenRoom();
});

document.getElementById('btnJoinRoom').addEventListener('click', async () => {
  if (!db){ alert('온라인 기능을 사용할 수 없습니다.'); return; }
  const myName = document.getElementById('myNameJoin').value.trim() || '나';
  const code = document.getElementById('joinCode').value.trim();
  if (!code){ alert('방 코드를 입력하세요.'); return; }
  const ref = db.ref('rummikub_rooms/'+code);
  const snap = await ref.once('value');
  if (!snap.exists()){ alert('존재하지 않는 방 코드입니다.'); return; }
  const data = snap.val();
  if (data.started){ alert('이미 시작된 게임입니다.'); return; }
  const idx = data.names.findIndex(n => !n);
  if (idx < 0){ alert('방이 가득 찼습니다.'); return; }
  await ref.child('names/'+idx).set(myName);
  roomCode = code;
  roomRef = ref;
  mySeat = idx;
  isHost = false;
  listenRoom();
});

// Firebase는 빈 배열 []을 null로 저장하므로, 읽어온 state를 정규화
function normalizeState(state){
  if (!state) return state;
  state.table  = state.table  || [];
  state.pool   = state.pool   || [];
  // Firebase는 null 값을 키 삭제로 저장 → undefined로 돌아오므로 명시적으로 null 복원
  if (state.winner === undefined) state.winner = null;
  if (state.players){
    if (!Array.isArray(state.players))
      state.players = Object.values(state.players);
    state.players.forEach(p => { p.rack = p.rack || []; });
  }
  // table의 각 세트도 배열 보장
  state.table = state.table.map(set => Array.isArray(set) ? set : Object.values(set));
  return state;
}

function listenRoom(){
  document.getElementById('setup').style.display = 'none';
  document.getElementById('lobby').style.display = 'block';
  document.getElementById('lobbyCode').textContent = roomCode;
  document.getElementById('lobbyHint').textContent = isHost
    ? '친구에게 방 코드를 알려주고 "참가하기"로 들어오게 하세요.'
    : '방장이 시작하기를 누르면 게임이 시작됩니다.';
  roomRef.on('value', snap => {
    const data = snap.val();
    if (!data) return;
    // 누군가 방을 나갔을 때
    if (data.abandoned){
      clearTurnTimer();
      if (roomRef){ roomRef.off(); roomRef = null; }
      roomCode = null; isHost = false; mySeat = null; gameStarted = false; G = null;
      document.getElementById('game').style.display = 'none';
      document.getElementById('gameOver').style.display = 'none';
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('setup').style.display = 'block';
      alert('상대방이 게임을 나갔습니다. 처음으로 돌아갑니다.');
      return;
    }
    if (!data.started){
      lobbyData = data;
      renderLobby(data);
    } else if (!gameStarted){
      gameStarted = true;
      mode = 'online';
      G = normalizeState(data.state);
      lastTurnOwner = -2;
      gameOverShown = false;
      document.getElementById('lobby').style.display = 'none';
      enterGameScreen();
    } else {
      // 자기 턴이면 Firebase 전체 state로 덮어쓰지 않음 (로컬 상태 유지)
      if (!canAct()){
        G = normalizeState(data.state);
        render();
      }
    }
  });

  // 상대 턴 중 테이블 실시간 변화 감지
  roomRef.child('liveTable').on('value', snap => {
    if (!gameStarted || !G || canAct()) return; // 내 턴이면 무시
    const live = snap.val();
    if (live === null || live === undefined) return;
    const table = Array.isArray(live)
      ? live.map(set => Array.isArray(set) ? set : Object.values(set))
      : Object.values(live).map(set => Array.isArray(set) ? set : Object.values(set));
    G.table = table;
    renderTableOnly();
  });
}

// ============================================================
// CORE ENGINE
// ============================================================
function checkSet(tiles){
  if (tiles.length < 3) return {valid:false};
  const nonJokers = tiles.filter(t=>!t.joker);
  const L = tiles.length;

  let groupValid = false, groupValue = 0;
  if (L <= 4){
    if (nonJokers.length === 0){ groupValid = true; groupValue = 0; }
    else {
      const num = nonJokers[0].num;
      const sameNum = nonJokers.every(t=>t.num===num);
      const colorsSeen = new Set(nonJokers.map(t=>t.color));
      const noDupColor = colorsSeen.size === nonJokers.length;
      if (sameNum && noDupColor){ groupValid = true; groupValue = num * L; }
    }
  }

  let runValid = false, runValue = 0;
  if (nonJokers.length === 0){
    if (L >= 3 && L <= 13){ runValid = true; runValue = 0; }
  } else {
    const color = nonJokers[0].color;
    const sameColor = nonJokers.every(t=>t.color===color);
    const nums = nonJokers.map(t=>t.num);
    const noDupNum = new Set(nums).size === nums.length;
    if (sameColor && noDupNum){
      const minNum = Math.min(...nums);
      const maxNum = Math.max(...nums);
      const sMin = Math.max(1, maxNum - L + 1);
      const sMax = Math.min(minNum, 13 - L + 1);
      if (sMin <= sMax){
        const s = sMax;
        runValid = true;
        runValue = L*s + (L*(L-1))/2;
      }
    }
  }

  if (groupValid || runValid) return {valid:true, value: groupValid ? groupValue : runValue};
  return {valid:false};
}

function tableValid(){
  for (const set of G.table){
    if (set.length === 0) continue;
    if (!checkSet(set).valid) return false;
  }
  return true;
}

function deepCloneTable(t){ return t.map(set => set.map(tile => ({...tile}))); }
function tileValue(t){ return t.joker ? 30 : t.num; }

function rackOwnerIndex(){
  return mySeat;
}

function canAct(){
  if (!G || G.winner !== null) return false;
  if (mode === 'ai') return G.current === 0;
  if (mode === 'online') return G.current === mySeat;
  return false;
}

function maybeStartTurn(){
  if (!G) return;
  if (G.current !== lastTurnOwner){
    lastTurnOwner = G.current;
    selected = null;
    dragRef = null;
    lockedIds = G.players[G.current].melded ? new Set() : new Set(G.table.flat().map(t=>t.id));
    turnTableSnapshot = deepCloneTable(G.table);
    turnRackSnapshot = G.players[G.current].rack.map(t=>({...t}));
    undoStack = [];
    setMsg('');
    // 테이블에서 이전 턴 대비 새로 등록된 타일 감지 → 깜박임
    const curTableIds = new Set(G.table.flat().map(t => t.id));
    changedTableIds = new Set([...curTableIds].filter(id => !prevTurnTableIds.has(id)));
    prevTurnTableIds = curTableIds;
    if (changedTableTimer) clearTimeout(changedTableTimer);
    if (changedTableIds.size > 0){
      changedTableTimer = setTimeout(() => {
        changedTableIds = new Set();
        changedTableTimer = null;
        render();
      }, 5000);
    }
    if (canAct()) startTurnTimer();
  }
}

function startTurnTimer(){
  clearTurnTimer();
  turnTimeLeft = TURN_BASE_TIME;
  updateTimerDisplay();
  turnTimerInterval = setInterval(() => {
    turnTimeLeft--;
    updateTimerDisplay();
    if (turnTimeLeft <= 0) onTimerExpired();
  }, 1000);
}

function clearTurnTimer(){
  if (turnTimerInterval){ clearInterval(turnTimerInterval); turnTimerInterval = null; }
}

function updateTimerDisplay(){
  const disp = document.getElementById('timerDisplay');
  if (!disp) return;
  disp.textContent = turnTimeLeft;
  disp.className = turnTimeLeft <= 10 ? 'urgent' : 'ok';
}

function onTimerExpired(){
  clearTurnTimer();
  if (!G || G.winner !== null || !canAct()) return;
  const player = G.players[G.current];
  // 시간 초과 시 항상 이번 턴 변경 전체를 되돌림 (유효 여부 무관)
  G.table = deepCloneTable(turnTableSnapshot);
  player.rack = turnRackSnapshot.map(t => ({...t}));
  // 되돌렸으므로 타일을 낸 것이 없음 → 풀에서 강제 뽑기
  let drew = false;
  if (G.pool.length > 0){
    player.rack.push(G.pool.pop());
    drew = true;
  }
  setMsg('⏰ 시간 초과! 이번 턴 변경이 취소되고 타일을 뽑았습니다.');
  setTimeout(() => advanceTurn(drew), 1200);
}

function snapshotForUndo(){
  return { table: deepCloneTable(G.table), rack: G.players[G.current].rack.map(t=>({...t})) };
}

function setMsg(text){ const el = document.getElementById('msg'); if (el) el.textContent = text || ''; }

function syncPush(){
  if (mode === 'online' && roomRef){ roomRef.child('state').set(G); }
}

// 턴 진행 중 테이블 변화만 실시간으로 상대에게 전송 (rack/pool/winner 제외)

// ============================================================
function tileEl(tile, locked, faceDown, isNew){
  const el = document.createElement('div');
  if (faceDown){
    el.className = 'backTile';
    return el;
  }
  el.className = 'tile' + (tile.joker ? ' joker' : ' c-'+tile.color) + (locked ? ' locked' : '');
  if (isNew) el.classList.add('changed-tile');
  el.textContent = tile.joker ? '★' : tile.num;
  if (selected && selected.tile.id === tile.id) el.classList.add('selected');
  return el;
}

function render(){
  if (!G) return;
  maybeStartTurn();
  maybeHandleWinner();
  if (gameOverShown) return;
  // liveTable 뷰에서 숨겼을 수 있으므로 복원
  const newZone = document.getElementById('newSetZone');
  if (newZone) newZone.style.display = '';

  const player = G.players[G.current];
  const iAct = canAct();
  document.getElementById('turnLabel').textContent = `${player.name}의 차례` + (player.melded ? '' : ' (첫 등록 전: 30점 이상 필요)') + (player.isAI ? ' 🤖' : '');
  document.getElementById('poolLabel').textContent = `남은 타일: ${G.pool.length}개`;
  document.getElementById('meldLabel').textContent = G.players.map(p => `${p.name}:${p.melded?'등록완료':'미등록'}`).join('  ');
  document.getElementById('waitNotice').textContent = iAct ? '' :
    (player.isAI ? `${player.name}가 진행 중입니다...` : `${player.name}의 차례입니다. 잠시만 기다려주세요.`);
  const timerBar = document.getElementById('timerBar');
  const timerDisp = document.getElementById('timerDisplay');
  const btnAdd = document.getElementById('btnAddTime');
  if (iAct){
    timerBar.style.display = 'flex';
    timerDisp.textContent = turnTimeLeft;
    timerDisp.className = turnTimeLeft <= 10 ? 'urgent' : 'ok';
    btnAdd.disabled = false;
  } else {
    timerBar.style.display = 'none';
  }

  // table
  const tableDiv = document.getElementById('table');
  tableDiv.innerHTML = '';
  G.table.forEach((set, sIdx) => {
    const row = document.createElement('div');
    row.className = 'setRow';
    if (set.length > 0 && !checkSet(set).valid) row.classList.add('invalid');
    const rowLocked = !player.melded && set.some(t => lockedIds.has(t.id));
    set.forEach((tile) => {
      const locked = !iAct || (!player.melded && lockedIds.has(tile.id));
      const t = tileEl(tile, locked, false, changedTableIds.has(tile.id));
      t.draggable = !locked;
      t.addEventListener('click', (e) => {
        e.stopPropagation();
        if (locked) return;
        onTileClick('table', sIdx, tile);
      });
      t.addEventListener('dragstart', (e) => {
        if (locked){ e.preventDefault(); return; }
        dragRef = {from:'table', setIndex:sIdx, tile};
        t.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', tile.id);
      });
      t.addEventListener('dragend', () => { t.classList.remove('dragging'); dragRef = null; });
      t.addEventListener('dragover', (e) => { if (rowLocked || !iAct) return; e.preventDefault(); e.stopPropagation(); });
      t.addEventListener('drop', (e) => {
        e.preventDefault(); e.stopPropagation();
        if (!dragRef || rowLocked || !iAct) return;
        if (dragRef.tile.id === tile.id) return;
        performMove(dragRef, {type:'set', setIndex:sIdx, beforeTileId:tile.id});
        dragRef = null; selected = null; setMsg(''); render(); afterStateChange();
      });
      row.appendChild(t);
    });
    if (!rowLocked && iAct){
      row.addEventListener('click', (e) => { if (e.target === row) onRowClick(sIdx); });
      row.addEventListener('dragover', (e) => { e.preventDefault(); row.classList.add('dragover'); });
      row.addEventListener('dragleave', () => row.classList.remove('dragover'));
      row.addEventListener('drop', (e) => {
        e.preventDefault();
        row.classList.remove('dragover');
        if (!dragRef) return;
        performMove(dragRef, {type:'set', setIndex:sIdx});
        dragRef = null; selected = null; setMsg(''); render(); afterStateChange();
      });
    } else {
      row.style.cursor = 'not-allowed';
    }
    tableDiv.appendChild(row);
  });

  // rack
  const ownerIdx = rackOwnerIndex();
  const ownerPlayer = G.players[ownerIdx];
  const rackDiv = document.getElementById('rack');
  rackDiv.innerHTML = '';
  document.getElementById('rackName').textContent = `${ownerPlayer.name}의 받침대 (${ownerPlayer.rack.length}개)`;
  const rackInteractable = iAct && ownerIdx === G.current;
  ownerPlayer.rack.forEach(tile => {
    const t = tileEl(tile, false, false);
    t.draggable = rackInteractable;
    t.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!rackInteractable) return;
      onTileClick('rack', -1, tile);
    });
    t.addEventListener('dragstart', (e) => {
      if (!rackInteractable){ e.preventDefault(); return; }
      dragRef = {from:'rack', setIndex:-1, tile};
      t.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', tile.id);
    });
    t.addEventListener('dragend', () => { t.classList.remove('dragging'); dragRef = null; });
    rackDiv.appendChild(t);
  });
  rackDiv.onclick = (e) => { if (e.target === rackDiv && rackInteractable) onRackBgClick(); };
  rackDiv.addEventListener('dragover', (e) => { if (!rackInteractable) return; e.preventDefault(); rackDiv.classList.add('dragover'); });
  rackDiv.addEventListener('dragleave', () => rackDiv.classList.remove('dragover'));
  rackDiv.ondrop = (e) => {
    e.preventDefault();
    rackDiv.classList.remove('dragover');
    if (!dragRef || !rackInteractable) return;
    performMove(dragRef, {type:'rack'});
    dragRef = null; selected = null; setMsg(''); render(); afterStateChange();
  };

  const newSetZone = document.getElementById('newSetZone');
  newSetZone.ondragover = (e) => { if (!iAct) return; e.preventDefault(); newSetZone.classList.add('dragover'); };
  newSetZone.ondragleave = () => newSetZone.classList.remove('dragover');
  newSetZone.ondrop = (e) => {
    e.preventDefault();
    newSetZone.classList.remove('dragover');
    if (!dragRef || !iAct) return;
    performMove(dragRef, {type:'newset'});
    dragRef = null; selected = null; setMsg(''); render(); afterStateChange();
  };

  document.getElementById('btnEnd').disabled = !iAct;
  document.getElementById('btnDraw').disabled = !iAct;
  document.getElementById('btnUndo').disabled = !iAct || undoStack.length === 0;
}

// ============================================================
// MOVES (shared by click-select and drag & drop)
// ============================================================
function autoArrangeSet(set){
  if (!set || set.length < 3) return;
  const check = checkSet(set);
  if (!check.valid) return;
  const nonJokers = set.filter(t=>!t.joker);
  const jokers = set.filter(t=>t.joker);
  if (nonJokers.length === 0) return;
  const num = nonJokers[0].num;
  const sameNum = nonJokers.every(t=>t.num===num);
  const colorsSeen = new Set(nonJokers.map(t=>t.color));
  const isGroup = sameNum && colorsSeen.size === nonJokers.length;
  if (isGroup){
    nonJokers.sort((a,b) => COLORS.indexOf(a.color) - COLORS.indexOf(b.color));
    const arranged = nonJokers.concat(jokers);
    set.splice(0, set.length, ...arranged);
    return;
  }
  // run
  const color = nonJokers[0].color;
  const sameColor = nonJokers.every(t=>t.color===color);
  if (!sameColor) return;
  const L = set.length;
  const nums = nonJokers.map(t=>t.num);
  const minNum = Math.min(...nums);
  const maxNum = Math.max(...nums);
  const sMin = Math.max(1, maxNum - L + 1);
  const sMax = Math.min(minNum, 13 - L + 1);
  if (sMin > sMax) return;
  const start = sMax;
  const byNum = new Map(nonJokers.map(t=>[t.num, t]));
  const arranged = [];
  let jokerPool = jokers.slice();
  for (let n = start; n < start + L; n++){
    if (byNum.has(n)) arranged.push(byNum.get(n));
    else arranged.push(jokerPool.shift());
  }
  if (arranged.some(t=>!t)) return;
  set.splice(0, set.length, ...arranged);
}

function performMove(ref, dest, recordUndo){
  if (recordUndo !== false){
    undoStack.push(snapshotForUndo());
  }
  const owner = rackOwnerIndex();
  const tile = ref.tile;
  if (ref.from === 'rack'){
    const idx = G.players[owner].rack.findIndex(t=>t.id===tile.id);
    if (idx < 0) return;
    G.players[owner].rack.splice(idx,1);
  } else {
    const set = G.table[ref.setIndex];
    if (!set) return;
    const idx = set.findIndex(t=>t.id===tile.id);
    if (idx < 0) return;
    set.splice(idx,1);
  }
  if (dest.type === 'rack'){
    G.players[owner].rack.push(tile);
    sortRack(G.players[owner].rack);
  } else if (dest.type === 'newset'){
    G.table.push([tile]);
  } else if (dest.type === 'set'){
    const set = G.table[dest.setIndex];
    if (!set) return;
    if (dest.beforeTileId){
      const idx = set.findIndex(t=>t.id===dest.beforeTileId);
      set.splice(idx<0?set.length:idx, 0, tile);
    } else {
      set.push(tile);
    }
  }
  G.table = G.table.filter(s => s.length>0);
  G.table.forEach(autoArrangeSet);
}

function afterStateChange(){
  // 온라인 모드: 내 턴 중 테이블 변화를 실시간으로 상대방에게 전송
  if (mode === 'online') syncTableLive();
}

function onTileClick(from, setIndex, tile){
  if (!canAct()) return;
  if (!selected){
    selected = {from, setIndex, tile};
    setMsg('타일을 선택했습니다. 합치고 싶은 조합 줄을 클릭하거나, "새 조합 만들기"를 눌러 새 줄을 만드세요. (끌어다 놓기도 가능합니다)');
    render();
    return;
  }
  if (selected.tile.id === tile.id){
    selected = null;
    setMsg('');
    render();
    return;
  }
  if (from === 'table'){
    performMove(selected, {type:'set', setIndex, beforeTileId: tile.id});
  } else {
    performMove(selected, {type:'rack'});
  }
  selected = null;
  setMsg('');
  render();
}

function onRowClick(setIndex){
  if (!selected || !canAct()) return;
  performMove(selected, {type:'set', setIndex});
  selected = null;
  setMsg('');
  render();
}

function onRackBgClick(){
  if (!selected || !canAct()) return;
  performMove(selected, {type:'rack'});
  selected = null;
  setMsg('');
  render();
}

document.getElementById('newSetZone').addEventListener('click', (e) => {

document.getElementById('sortColor').addEventListener('click', () => {

// ============================================================
// END TURN / DRAW
// ============================================================
function newlyPlacedTiles(){
  const startIds = new Set(turnTableSnapshot.flat().map(t=>t.id));
  return G.table.flat().filter(t => !startIds.has(t.id));
}

document.getElementById('btnEnd').addEventListener('click', () => {
  if (!canAct()) return;
  if (!tableValid()){
    setMsg('유효하지 않은 조합이 있습니다. 모든 조합은 같은 숫자 3~4색 그룹이거나, 같은 색 3개 이상 연속 숫자여야 합니다.');
    return;
  }
  const player = G.players[G.current];
  const placedAny = player.rack.length < turnRackSnapshot.length;
  if (!placedAny && G.pool.length > 0){
    setMsg('타일을 내려놓지 않았다면 반드시 타일을 뽑아야 합니다. "타일 뽑기 / 되돌리기" 버튼을 눌러주세요.');
    return;
  }
  if (!player.melded){
    const placed = newlyPlacedTiles();
    if (placed.length === 0){
      setMsg('등록을 위해 타일을 테이블에 내려놓아야 합니다.');
      return;
    }
    let sum = 0;
    for (const set of G.table){
      if (set.every(t => placed.some(p=>p.id===t.id))){
        sum += checkSet(set).value;
      }
    }
    if (sum < 30){
      setMsg(`첫 등록은 30점 이상이어야 합니다. (현재 ${sum}점)`);
      return;
    }
    player.melded = true;
  }
  if (player.rack.length === 0){
    G.winner = G.current;
    noProgressStreak = 0;
    syncPush();
    render();
    return;
  }
  advanceTurn(true);  // 타일을 냈으므로 진행 있음
});

document.getElementById('btnDraw').addEventListener('click', () => {
  if (!canAct()) return;
  const player = G.players[G.current];
  // 테이블을 턴 시작 상태로 되돌리고, rack도 턴 시작 순서 그대로 복원
  G.table = deepCloneTable(turnTableSnapshot);
  player.rack = turnRackSnapshot.map(t => ({...t}));
  const drew = G.pool.length > 0;
  if (drew){
    // 새 타일은 기존 순서 뒤에 그대로 추가
    player.rack.push(G.pool.pop());
  } else {
    setMsg('풀에 타일이 없습니다. 되돌리기만 실행했습니다.');
  }
  advanceTurn(drew);
});

document.getElementById('btnUndo').addEventListener('click', () => {
  if (!canAct()) return;
  if (undoStack.length === 0){
    setMsg('되돌릴 동작이 없습니다.');
    return;
  }
  const prev = undoStack.pop();
  G.table = prev.table;
  G.players[G.current].rack = prev.rack;
  selected = null;
  dragRef = null;
  setMsg('');
  render();
});


document.getElementById('btnAddTime').addEventListener('click', () => {
  if (!canAct()) return;
  turnTimeLeft += 30;
  updateTimerDisplay();
});

function advanceTurn(madeProgress){
  clearTurnTimer();
  // 턴 종료 시 liveTable 임시 데이터 삭제
  if (mode === 'online' && roomRef) roomRef.child('liveTable').remove();
  if (madeProgress) noProgressStreak = 0;
  else noProgressStreak++;
  // 모든 플레이어가 연속으로 아무것도 못 했으면 교착 → 게임 종료
  if (noProgressStreak >= G.players.length){
    endGameByDeadlock();
    return;
  }
  G.current = (G.current + 1) % G.players.length;
  syncPush();
  render();
  if (mode === 'ai' && G.players[G.current] && G.players[G.current].isAI){
    setTimeout(aiTakeTurn, 800);
  }
}

function endGameByDeadlock(){
  // 타일이 가장 적은 플레이어가 승자
  let minTiles = Infinity, winnerIdx = 0;
  G.players.forEach((p, i) => {
    if (p.rack.length < minTiles){ minTiles = p.rack.length; winnerIdx = i; }
  });
  G.winner = winnerIdx;
  syncPush();
  render();
}

// ============================================================
// AI BOT
// ============================================================
function findMeldSets(rack, threshold){
  const avail = rack.filter(t=>!t.joker).map(t=>({...t}));
  const used = new Set();
  const sets = [];
  for (let n=1;n<=13;n++){
    const byColor = {};
    avail.filter(t=>t.num===n && !used.has(t.id)).forEach(t=>{ if(!byColor[t.color]) byColor[t.color]=t; });
    const colors = Object.keys(byColor);
    if (colors.length>=3){
      const set = colors.map(c=>byColor[c]);
      set.forEach(t=>used.add(t.id));
      sets.push(set);
    }
  }
  for (const color of COLORS){
    const cands = avail.filter(t=>t.color===color && !used.has(t.id)).sort((a,b)=>a.num-b.num);
    let i=0;
    while (i<cands.length){
      let j=i;
      while (j+1<cands.length && cands[j+1].num===cands[j].num+1) j++;
      const runLen = j-i+1;
      if (runLen>=3){
        const set = cands.slice(i,j+1);
        set.forEach(t=>used.add(t.id));
        sets.push(set);
      }
      i=j+1;
    }
  }
  if (sets.length===0) return null;
  const total = sets.reduce((s,set)=>s+checkSet(set).value,0);
  if (total < threshold) return null;
  return sets;
}

function aiTakeTurn(){
  if (!G || G.winner !== null) return;
  const idx = G.current;
  const p = G.players[idx];
  if (!p || !p.isAI) return;
  maybeStartTurn();

  const sets = findMeldSets(p.rack, p.melded ? 0 : 30);
  let madeProgress = false;
  if (sets){
    sets.forEach(set=>{
      set.forEach(t=>{
        const i = p.rack.findIndex(r=>r.id===t.id);
        if (i>=0) p.rack.splice(i,1);
      });
      G.table.push(set);
    });
    if (!p.melded) p.melded = true;
    G.table = G.table.filter(s=>s.length>0);
    madeProgress = true;
  } else {
    if (G.pool.length > 0){ p.rack.push(G.pool.pop()); madeProgress = true; }
  }

  if (p.rack.length === 0){
    G.winner = idx;
    noProgressStreak = 0;
    render();
    return;
  }
  advanceTurn(madeProgress);
}

// ============================================================
// GAME OVER
// ============================================================
function maybeHandleWinner(){
  if (G && G.winner !== null && G.winner !== undefined && !gameOverShown){
    gameOverShown = true;
    endGame(G.winner);
  }
}

function endGame(winnerIdx){
  document.getElementById('game').style.display = 'none';
  const go = document.getElementById('gameOver');
  go.style.display = 'block';
  document.getElementById('winnerLine').textContent = `🏆 ${G.players[winnerIdx].name} 승리! (루미큐브!)`;
  let winnerScore = 0;
  const rows = G.players.map((p, i) => {
    if (i === winnerIdx) return null;
    const minus = p.rack.reduce((s,t)=>s+tileValue(t),0);
    winnerScore += minus;
    return {name:p.name, score:-minus};
  });
  const tbl = document.getElementById('scoreTable');
  let html = '<tr><th>플레이어</th><th>점수</th></tr>';
  html += `<tr><td>${G.players[winnerIdx].name}</td><td>+${winnerScore}</td></tr>`;
  rows.forEach(r => { if (r) html += `<tr><td>${r.name}</td><td>${r.score}</td></tr>`; });
  tbl.innerHTML = html;
}
