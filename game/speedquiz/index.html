<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스피드퀴즈</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:#0d1117;
  font-family:'Segoe UI',sans-serif;
  gap:32px;
  padding:40px 20px;
}
h1 { color:#fff; font-size:2rem; }
.sub { color:#8b949e; font-size:0.95rem; }
.cards { display:flex; gap:24px; flex-wrap:wrap; justify-content:center; }
a.card {
  text-decoration:none;
  background:#161b22;
  border-radius:20px;
  padding:48px 56px;
  text-align:center;
  color:#fff;
  transition:transform 0.15s, box-shadow 0.15s;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}
a.card.teacher { border:2px solid #4caf50; }
a.card.teacher:hover { transform:translateY(-4px); box-shadow:0 8px 30px rgba(76,175,80,0.3); }
a.card.student { border:2px solid #5c6bc0; }
a.card.student:hover { transform:translateY(-4px); box-shadow:0 8px 30px rgba(92,107,192,0.3); }
.card .icon { font-size:3.5rem; margin-bottom:16px; }
.card .name { font-size:1.2rem; font-weight:700; margin-bottom:6px; }
.card .desc { font-size:0.85rem; color:#8b949e; }
.back { color:#8b949e; font-size:0.85rem; text-decoration:none; }
.back:hover { color:#ccc; }

.upload-section {
  background:#161b22;
  border:2px dashed #30363d;
  border-radius:16px;
  padding:24px 32px;
  text-align:center;
  width:100%;
  max-width:480px;
  transition:border-color 0.2s;
}
.upload-section:hover { border-color:#8b949e; }
.btn-upload {
  background:transparent;
  border:2px solid #e3b341;
  color:#e3b341;
  padding:12px 28px;
  border-radius:10px;
  font-size:1rem;
  font-weight:600;
  cursor:pointer;
  transition:all 0.15s;
}
.btn-upload:hover { background:#e3b341; color:#0d1117; }
.upload-hint { color:#8b949e; font-size:0.82rem; margin-top:10px; }
.upload-progress { margin-top:14px; display:none; }
.progress-bar-bg {
  height:8px; background:#30363d; border-radius:4px; overflow:hidden; margin-bottom:8px;
}
.progress-bar-fill {
  height:100%; background:linear-gradient(90deg,#e3b341,#f0c060);
  border-radius:4px; width:0%; transition:width 0.3s;
}
.progress-msg { color:#8b949e; font-size:0.85rem; }
.upload-result { margin-top:12px; font-size:0.85rem; display:none; }
.upload-result.success { color:#4caf50; }
.upload-result.error { color:#f47067; }

.book-list { margin-top:16px; text-align:left; max-height:200px; overflow-y:auto; }
.book-list-title {
  color:#8b949e; font-size:0.75rem; text-transform:uppercase;
  letter-spacing:1px; margin-bottom:8px;
}
.book-item-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 10px; background:#0d1117; border-radius:8px;
  margin-bottom:6px; font-size:0.85rem; color:#e6edf3;
}
.book-item-row .book-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.book-item-row .book-date { color:#8b949e; font-size:0.75rem; margin-left:8px; white-space:nowrap; }
.btn-del-book {
  background:transparent; border:none; color:#f47067; cursor:pointer;
  font-size:1rem; padding:2px 6px; border-radius:4px; margin-left:6px; opacity:0.6;
}
.btn-del-book:hover { opacity:1; background:#2a1a1a; }
</style>
</head>
<body>
<a class="back" href="../">← 게임 목록</a>
<div style="text-align:center">
  <h1>⚡ 스피드퀴즈</h1>
  <p class="sub">교과서 기반 AI 문제 생성 실시간 퀴즈</p>
</div>
<div class="cards">
  <a class="card teacher" href="teacher.html">
    <div class="icon">👩‍🏫</div>
    <div class="name">교사로 접속</div>
    <div class="desc">룸 생성 및 게임 관리</div>
  </a>
  <a class="card student" href="student.html">
    <div class="icon">🧑‍🎓</div>
    <div class="name">학생으로 접속</div>
    <div class="desc">룸코드로 참여</div>
  </a>
</div>

<div class="upload-section">
  <button class="btn-upload" onclick="document.getElementById('pdfInput').click()">
    📚 교과서 업로드
  </button>
  <input type="file" id="pdfInput" accept=".pdf,.txt" style="display:none" onchange="handleUpload(this)">
  <p class="upload-hint">PDF 또는 텍스트 파일 • Firebase에 저장 후 교사 설정에서 페이지 범위를 지정하세요</p>

  <div class="upload-progress" id="uploadProgress">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <p class="progress-msg" id="progressMsg">준비 중...</p>
  </div>

  <div class="upload-result" id="uploadResult"></div>

  <div class="book-list" id="bookList" style="display:none">
    <p class="book-list-title">📖 업로드된 교과서</p>
    <div id="bookListItems"></div>
  </div>
</div>

<script>
const PDFJS_VER = '3.11.174';
let FB_URL = '';

async function initFirebase() {
  try {
    const r = await fetch('./config.json');
    const c = await r.json();
    FB_URL = (c.firebaseUrl || '').replace(/\/$/, '');
  } catch {}
}

async function loadBookList() {
  if (!FB_URL) return;
  try {
    const r = await fetch(`${FB_URL}/books.json`);
    const data = await r.json();
    if (!data) { document.getElementById('bookList').style.display = 'none'; return; }
    const books = Object.entries(data).sort((a, b) => (b[1].uploadedAt || 0) - (a[1].uploadedAt || 0));
    if (!books.length) { document.getElementById('bookList').style.display = 'none'; return; }
    document.getElementById('bookList').style.display = 'block';
    document.getElementById('bookListItems').innerHTML = books.map(([id, b]) => `
      <div class="book-item-row">
        <span class="book-name" title="${esc(b.name)}">${esc(b.name)}</span>
        <span class="book-date">${b.pageCount ? b.pageCount+'p' : ''} ${formatDate(b.uploadedAt)}</span>
        <button class="btn-del-book" onclick="deleteBook('${id}', '${esc(b.name)}')" title="삭제">🗑</button>
      </div>
    `).join('');
  } catch {}
}

async function deleteBook(id, name) {
  if (!confirm(`"${name}" 교과서를 삭제할까요?`)) return;
  await fetch(`${FB_URL}/books/${id}.json`, { method: 'DELETE' });
  loadBookList();
}

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setProgress(pct, msg) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressMsg').textContent = msg;
}

function showResult(msg, type) {
  const el = document.getElementById('uploadResult');
  el.textContent = msg;
  el.className = 'upload-result ' + type;
  el.style.display = 'block';
}

async function loadPdfJs() {
  if (window.pdfjsLib) return;
  await new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${PDFJS_VER}/pdf.min.js`;
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
  window.pdfjsLib.GlobalWorkerOptions.workerSrc =
    `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${PDFJS_VER}/pdf.worker.min.js`;
}

async function compressPdf(originalBuf) {
  // Render each page to JPEG canvas and rebuild as a new PDF using jsPDF
  await loadJsPdf();
  await loadPdfJs();
  const pdf = await pdfjsLib.getDocument({ data: originalBuf.slice(0) }).promise;
  const pageCount = pdf.numPages;
  const firstPage = await pdf.getPage(1);
  const vp0 = firstPage.getViewport({ scale: 1 });
  // Use landscape/portrait based on first page
  const isLandscape = vp0.width > vp0.height;
  const doc = new window.jspdf.jsPDF({ orientation: isLandscape ? 'l' : 'p', unit: 'pt', format: 'a4' });
  const A4_W = isLandscape ? 841.89 : 595.28;
  const A4_H = isLandscape ? 595.28 : 841.89;

  for (let p = 1; p <= pageCount; p++) {
    setProgress(10 + Math.round((p - 1) / pageCount * 50), `PDF 압축 중... ${p}/${pageCount}페이지`);
    const page = await pdf.getPage(p);
    const scale = Math.min(A4_W / page.getViewport({ scale: 1 }).width, 1.2);
    const viewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    const imgData = canvas.toDataURL('image/jpeg', 0.75);
    if (p > 1) doc.addPage();
    doc.addImage(imgData, 'JPEG', 0, 0, A4_W, A4_H);
  }
  const compressed = doc.output('arraybuffer');
  return { buf: compressed, pageCount };
}

async function loadJsPdf() {
  if (window.jspdf) return;
  await new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

async function bufToB64(buf) {
  const bytes = new Uint8Array(buf);
  let binary = '';
  const chunkSize = 8192;
  for (let i = 0; i < bytes.length; i += chunkSize) {
    binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
  }
  return btoa(binary);
}

async function handleUpload(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';

  if (!FB_URL) return showResult('⚠️ Firebase URL을 불러올 수 없습니다.', 'error');

  const isPdf = file.name.toLowerCase().endsWith('.pdf');
  const isTxt = file.name.toLowerCase().endsWith('.txt');
  if (!isPdf && !isTxt) return showResult('❌ PDF 또는 TXT 파일만 가능합니다.', 'error');

  const originalMb = file.size / 1024 / 1024;

  document.getElementById('uploadProgress').style.display = 'block';
  document.getElementById('uploadResult').style.display = 'none';
  setProgress(5, '파일 읽는 중...');

  try {
    const bookName = file.name.replace(/\.[^.]+$/, '');
    const bookId = 'book_' + Date.now();

    if (isPdf) {
      setProgress(10, 'PDF 불러오는 중...');
      const originalBuf = await file.arrayBuffer();

      let finalBuf, pageCount;
      if (originalMb > 3) {
        setProgress(10, `PDF 압축 중... (원본 ${originalMb.toFixed(1)}MB)`);
        ({ buf: finalBuf, pageCount } = await compressPdf(originalBuf));
      } else {
        await loadPdfJs();
        const pdf = await pdfjsLib.getDocument({ data: originalBuf.slice(0) }).promise;
        pageCount = pdf.numPages;
        finalBuf = originalBuf;
        setProgress(60, 'Base64 변환 중...');
      }

      const finalMb = finalBuf.byteLength / 1024 / 1024;
      setProgress(62, `Base64 변환 중... (${finalMb.toFixed(1)}MB)`);
      const b64 = await bufToB64(finalBuf);

      setProgress(75, 'Firebase에 저장 중...');
      await fetch(`${FB_URL}/books/${bookId}.json`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: bookName, uploadedAt: Date.now(), pageCount, type: 'pdf', pdfSize: Math.round(finalMb * 10) / 10 })
      });

      const chunkMb = 500000;
      const chunks = Math.ceil(b64.length / chunkMb);
      for (let i = 0; i < chunks; i++) {
        const chunk = b64.slice(i * chunkMb, (i + 1) * chunkMb);
        await fetch(`${FB_URL}/books/${bookId}/pdf/c${i}.json`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(chunk)
        });
        setProgress(75 + Math.round((i + 1) / chunks * 23), `Firebase 저장 중... ${i+1}/${chunks}`);
      }
      await fetch(`${FB_URL}/books/${bookId}/pdf/chunks.json`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(chunks)
      });

      setProgress(100, '완료!');
      const sizeMsg = originalMb > 3 ? ` (${originalMb.toFixed(1)}MB → ${finalMb.toFixed(1)}MB 압축)` : ` (${finalMb.toFixed(1)}MB)`;
      showResult(`✅ "${bookName}" (${pageCount}페이지${sizeMsg}) 업로드 완료\n교사 설정에서 페이지 범위를 지정하고 문제를 생성하세요.`, 'success');
    } else {
      setProgress(50, '텍스트 읽는 중...');
      const text = await file.text();
      setProgress(80, 'Firebase에 저장 중...');
      await fetch(`${FB_URL}/books/${bookId}.json`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: bookName, text, uploadedAt: Date.now(), pageCount: 0, type: 'text' })
      });
      setProgress(100, '완료!');
      showResult(`✅ "${bookName}" 업로드 완료`, 'success');
    }
    loadBookList();
  } catch (e) {
    showResult('❌ 오류: ' + e.message, 'error');
  }

  setTimeout(() => { document.getElementById('uploadProgress').style.display = 'none'; }, 1500);
}

initFirebase().then(loadBookList);
</script>
</body>
</html>
