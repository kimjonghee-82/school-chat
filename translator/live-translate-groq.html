<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실시간 번역 테스트 (Groq Whisper)</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #1a1a1a; color: #eee; height: 100vh; display: flex; flex-direction: column;
  }
  header {
    padding: 14px 18px; background: #242424; border-bottom: 1px solid #3a3a3a;
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  header h1 { font-size: 1.05rem; margin: 0; flex: 1; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #555; }
  .dot.active { background: #4caf50; box-shadow: 0 0 0 0 rgba(76,175,80,.5); animation: pulse 1.5s infinite; }
  .dot.busy { background: #ffb300; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(76,175,80,.5); } 70% { box-shadow: 0 0 0 8px rgba(76,175,80,0); } 100% { box-shadow: 0 0 0 0 rgba(76,175,80,0); } }
  .key-row { padding: 10px 18px; background: #202020; border-bottom: 1px solid #3a3a3a; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .key-row input { flex: 1; padding: 8px 10px; border-radius: 6px; border: 1px solid #444; background: #2b2b2b; color: #eee; font-size: .85rem; }
  .key-row select { padding: 8px 10px; border-radius: 6px; border: 1px solid #444; background: #2b2b2b; color: #eee; font-size: .85rem; }
  main { flex: 1; display: flex; overflow: hidden; }
  .col { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .col + .col { border-left: 1px solid #3a3a3a; }
  .col-label { padding: 8px 16px; font-size: .72rem; color: #999; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #2e2e2e; flex-shrink: 0; }
  .col-content { flex: 1; overflow-y: auto; padding: 16px; font-size: 1.05rem; line-height: 1.8; }
  .para { margin-bottom: 1.5em; }
  .para:last-child { margin-bottom: 0; }
  .para.interim { color: #888; font-style: italic; }
  footer { padding: 12px 18px; background: #242424; border-top: 1px solid #3a3a3a; display: flex; gap: 8px; flex-shrink: 0; }
  button { padding: 10px 18px; border-radius: 8px; border: none; font-size: .9rem; cursor: pointer; font-weight: 600; }
  .btn-start { background: #4caf50; color: #fff; }
  .btn-stop  { background: #e53935; color: #fff; }
  .btn-clear { background: #444; color: #eee; }
  .status { font-size: .78rem; color: #999; align-self: center; margin-left: auto; }
</style>
</head>
<body>

<header>
  <h1>🎙 실시간 번역 테스트 — Groq Whisper</h1>
  <div class="dot" id="dot"></div>
</header>

<div class="key-row">
  <input type="password" id="apiKey" placeholder="Groq API 키 (gsk_...)">
  <select id="targetLang">
    <option value="ru">🇷🇺 러시아어</option>
    <option value="mn">🇲🇳 몽골어</option>
    <option value="kk">🇰🇿 카자흐어</option>
    <option value="en">🇺🇸 영어</option>
    <option value="vi">🇻🇳 베트남어</option>
  </select>
</div>

<main>
  <div class="col">
    <div class="col-label">🌐 번역 결과</div>
    <div class="col-content" id="trContent"><span style="color:#777">번역이 여기에 표시됩니다...</span></div>
  </div>
  <div class="col">
    <div class="col-label">🇰🇷 인식된 한국어 (Whisper)</div>
    <div class="col-content" id="koContent"><span style="color:#777">말씀하세요...</span></div>
  </div>
</main>

<footer>
  <button class="btn-start" id="btnStart" onclick="start()">▶ 시작</button>
  <button class="btn-stop" id="btnStop" onclick="stop()" style="display:none">⏹ 중지</button>
  <button class="btn-clear" onclick="clearAll()">🗑 지우기</button>
  <span class="status" id="status"></span>
</footer>

<script>
const GTRANSLATE_CODES = { ru:'ru', mn:'mn', kk:'kk', en:'en', vi:'vi' };
const CHUNK_MS = 4000; // 4초 단위로 잘라서 Whisper에 전송

let mediaStream = null;
let recorder = null;
let active = false;
let paras = []; // {ko, tr}
let chunkSeq = 0;
let translateCache = new Map();

function setDot(state) {
  document.getElementById('dot').className = 'dot' + (state ? ' ' + state : '');
}
function setStatus(t) { document.getElementById('status').textContent = t || ''; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderKo() {
  const el = document.getElementById('koContent');
  el.innerHTML = paras.map(p => `<div class="para">${esc(p.ko)}</div>`).join('') || '<span style="color:#777">말씀하세요...</span>';
  el.scrollTop = el.scrollHeight;
}
function renderTr() {
  const el = document.getElementById('trContent');
  el.innerHTML = paras.map(p => `<div class="para">${esc(p.tr)}</div>`).join('') || '<span style="color:#777">번역이 여기에 표시됩니다...</span>';
  el.scrollTop = el.scrollHeight;
}
function clearAll() { paras = []; renderKo(); renderTr(); }

async function googleTranslate(text, lc) {
  const key = lc + '|' + text;
  if (translateCache.has(key)) return translateCache.get(key);
  const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=ko&tl=${lc}&dt=t&q=${encodeURIComponent(text)}`;
  const r = await fetch(url);
  const d = await r.json();
  const result = d[0].map(s => s[0]).join('');
  translateCache.set(key, result);
  return result;
}

// Whisper가 무음/저음량 구간에서 자주 만들어내는 환각(hallucination) 문구 목록
const HALLUCINATION_PHRASES = [
  '시청해주셔서 감사합니다', '시청해 주셔서 감사합니다', '구독과 좋아요', '구독 좋아요',
  '다음 영상에서 만나요', '다음 시간에 만나요', '영상 시청해주셔서', 'MBC 뉴스', 'KBS 뉴스',
  'SBS 뉴스', '자막 제공', '자막제공', '이 영상은', '오늘도 시청해주셔서',
  '감사합니다', '고맙습니다', '수고하셨습니다'
];
function isLikelyHallucination(text) {
  const t = text.replace(/\s/g, '');
  if (t.length < 3) return true;
  return HALLUCINATION_PHRASES.some(p => t === p.replace(/\s/g, ''));
}

// 오디오 블롭의 평균 음량(RMS)을 계산해 무음 여부 판단
async function isSilent(blob, threshold = 0.01) {
  try {
    const arrayBuf = await blob.arrayBuffer();
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const audioBuf = await ctx.decodeAudioData(arrayBuf.slice(0));
    const data = audioBuf.getChannelData(0);
    let sum = 0;
    for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
    const rms = Math.sqrt(sum / data.length);
    ctx.close();
    return rms < threshold;
  } catch {
    return false; // 디코딩 실패 시 일단 보내본다
  }
}

async function transcribeChunk(blob, apiKey) {
  const fd = new FormData();
  fd.append('file', blob, 'chunk.webm');
  fd.append('model', 'whisper-large-v3');
  fd.append('language', 'ko');
  fd.append('response_format', 'json');
  fd.append('temperature', '0');
  const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${apiKey}` },
    body: fd
  });
  if (!res.ok) {
    const t = await res.text();
    throw new Error(`Whisper API 오류 (${res.status}): ${t.slice(0,200)}`);
  }
  const data = await res.json();
  return (data.text || '').trim();
}

async function processChunk(blob) {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { setStatus('Groq API 키를 입력하세요'); return; }
  const seq = ++chunkSeq;
  if (await isSilent(blob)) { return; } // 무음 구간은 API 호출 없이 건너뜀 (환각 방지 + 비용 절약)
  setDot('busy'); setStatus(`인식 중... (#${seq})`);
  try {
    const koText = await transcribeChunk(blob, apiKey);
    if (!koText || koText.length < 2 || isLikelyHallucination(koText)) { setDot(active ? 'active' : ''); setStatus(''); return; }
    const lc = GTRANSLATE_CODES[document.getElementById('targetLang').value] || 'en';
    const tr = await googleTranslate(koText, lc);
    paras.push({ ko: koText, tr });
    renderKo(); renderTr();
  } catch (e) {
    setStatus('오류: ' + e.message);
    console.error(e);
  } finally {
    setDot(active ? 'active' : '');
  }
}

function startRecorderLoop() {
  if (!mediaStream || !active) return;
  recorder = new MediaRecorder(mediaStream, { mimeType: 'audio/webm' });
  let chunks = [];
  recorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data); };
  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: 'audio/webm' });
    if (blob.size > 1000) processChunk(blob); // 너무 작은(거의 무음) 조각은 건너뜀
    if (active) startRecorderLoop(); // 다음 조각 녹음 시작 (약간의 텀이 생기지만 Whisper 정확도가 훨씬 높음)
  };
  recorder.start();
  setTimeout(() => { if (recorder && recorder.state === 'recording') recorder.stop(); }, CHUNK_MS);
}

async function start() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('Groq API 키를 입력하세요.'); return; }
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
  } catch (e) {
    alert('마이크 권한이 필요합니다: ' + e.message);
    return;
  }
  active = true;
  setDot('active');
  document.getElementById('btnStart').style.display = 'none';
  document.getElementById('btnStop').style.display = '';
  startRecorderLoop();
}

function stop() {
  active = false;
  if (recorder && recorder.state === 'recording') { try { recorder.stop(); } catch {} }
  recorder = null;
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  setDot('');
  setStatus('');
  document.getElementById('btnStart').style.display = '';
  document.getElementById('btnStop').style.display = 'none';
}
</script>

</body>
</html>
