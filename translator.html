<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>교과서 번역기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #5c6bc0;
  --bg: #1e1e2e;
  --card: #2a2a3e;
  --text: #e0e0f0;
  --sub: #9090b0;
  --border: #3a3a5e;
  --accent: #7c83e0;
}

html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Segoe UI','Apple SD Gothic Neo',sans-serif; }

/* ── Header ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 52px;
  background: rgba(30,30,46,0.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 10px;
}
.header-title { font-size: 1rem; font-weight: 700; color: var(--text); flex: 1; display: flex; align-items: center; gap: 8px; }
.header-title span { font-size: 1.2rem; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--card); color: var(--text); cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
.icon-btn:hover { background: var(--border); }
.icon-btn.active { background: var(--primary); border-color: var(--primary); }


/* ── Main viewer ── */
.viewer {
  position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  touch-action: none;
}

/* ── Empty slot ── */
.empty-slot {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 100%; height: 100%;
}
.add-btn {
  width: 160px; height: 200px;
  border: 2.5px dashed #4a4a70;
  border-radius: 20px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; color: var(--sub); gap: 10px;
  background: rgba(255,255,255,.03);
  transition: border-color .2s, background .2s, transform .2s;
  user-select: none;
}
.add-btn:hover { border-color: var(--accent); background: rgba(124,131,224,.08); transform: scale(1.03); }
.add-btn .plus { font-size: 2.8rem; color: var(--accent); line-height: 1; }
.add-btn .label { font-size: .85rem; color: var(--sub); }

/* Upload menu */
.upload-menu {
  display: none; position: fixed; z-index: 300;
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  padding: 8px; box-shadow: 0 8px 32px rgba(0,0,0,.5);
  flex-direction: column; gap: 4px; min-width: 180px;
}
.upload-menu.visible { display: flex; }
.upload-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 10px; cursor: pointer;
  font-size: .88rem; color: var(--text); transition: background .15s;
}
.upload-item:hover { background: var(--border); }
.upload-item .icon { font-size: 1.2rem; width: 24px; text-align: center; }

/* Canvas viewer */
.canvas-wrap {
  position: absolute; inset: 0;
  overflow: hidden;
  display: none;
  cursor: grab;
}
.canvas-wrap.visible { display: block; }
.canvas-wrap.mode-select { cursor: crosshair; }
.canvas-wrap.grabbing { cursor: grabbing; }
#viewerCanvas { position: absolute; transform-origin: 0 0; display: block; }
#selCanvas { position: absolute; top: 0; left: 0; pointer-events: none; }

/* ── Nav arrows ── */
.nav-arrow {
  position: fixed; top: 50%; transform: translateY(-50%);
  width: 44px; height: 80px;
  background: rgba(92,107,192,.18);
  border: 1px solid rgba(92,107,192,.3);
  border-radius: 0 12px 12px 0;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: rgba(255,255,255,.7); font-size: 1.3rem;
  transition: background .2s, color .2s;
  z-index: 150; user-select: none;
  backdrop-filter: blur(4px);
}
.nav-arrow:hover { background: rgba(92,107,192,.4); color: white; }
.nav-arrow.right { right: 0; border-radius: 12px 0 0 12px; }
.nav-arrow.left { left: 0; }
.nav-arrow.hidden { display: none; }

/* Page indicator */
.page-indicator {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(30,30,46,.85); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 14px; font-size: .78rem; color: var(--sub);
  backdrop-filter: blur(6px); z-index: 150; pointer-events: none;
}

/* Zoom controls */
.zoom-bar {
  position: fixed; bottom: 16px; right: 16px;
  display: flex; gap: 4px; align-items: center;
  background: rgba(30,30,46,.85); border: 1px solid var(--border);
  border-radius: 12px; padding: 5px 8px;
  backdrop-filter: blur(6px); z-index: 150;
}
.zoom-bar.hidden { display: none; }
.z-btn {
  width: 28px; height: 28px; border-radius: 6px; border: none;
  background: var(--border); color: var(--text); cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
}
.z-btn:hover { background: var(--primary); }
.z-label { font-size: .75rem; color: var(--sub); min-width: 38px; text-align: center; }

/* (translate-fab removed) */
.translate-fab {
  display: none !important;
  position: fixed; bottom: 16px; left: 16px;
  background: #fb8c00; color: white; border: none; border-radius: 12px;
  padding: 10px 18px; font-size: .85rem; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 16px rgba(251,140,0,.4);
  display: none; align-items: center; gap: 6px;
  z-index: 150; transition: filter .15s, transform .1s;
}
.translate-fab:hover { filter: brightness(1.1); transform: translateY(-1px); }
.translate-fab.visible { display: flex; }

/* ── Settings modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
  z-index: 500; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.visible { display: flex; }
.modal {
  background: var(--card); border: 1px solid var(--border); border-radius: 20px;
  padding: 24px; width: 90%; max-width: 400px;
  box-shadow: 0 8px 40px rgba(0,0,0,.5);
}
.modal h2 { font-size: 1rem; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
.modal label { font-size: .82rem; color: var(--sub); display: block; margin-bottom: 6px; }
.modal input {
  width: 100%; padding: 10px 14px; background: var(--bg);
  border: 1.5px solid var(--border); border-radius: 10px;
  color: var(--text); font-size: .88rem; outline: none; margin-bottom: 14px;
}
.modal input:focus { border-color: var(--primary); }
.modal-hint { font-size: .78rem; color: var(--sub); line-height: 1.6; margin-bottom: 16px; }
.modal-hint a { color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.btn { padding: 9px 18px; border: none; border-radius: 10px; cursor: pointer; font-size: .85rem; font-weight: 600; }
.btn-primary { background: var(--primary); color: white; }
.btn-ghost { background: var(--border); color: var(--text); }
.status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.chip { padding: 4px 10px; border-radius: 20px; font-size: .72rem; font-weight: 600; }
.chip.ok { background: rgba(67,160,71,.2); color: #81c784; }
.chip.no { background: rgba(229,57,53,.2); color: #ef9a9a; }

/* Scan toggle in settings */
.toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.toggle-row label { font-size: .85rem; }
.toggle { position: relative; width: 42px; height: 22px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #4a4a70; border-radius: 22px; cursor: pointer; transition: background .2s; }
.toggle-slider::before { content: ''; position: absolute; width: 16px; height: 16px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: transform .2s; }
.toggle input:checked + .toggle-slider { background: var(--primary); }
.toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

/* Translation popup */
.trans-popup {
  display: none; position: fixed; z-index: 400;
  background: var(--card); border: 1px solid var(--primary);
  border-radius: 14px; padding: 14px 16px; max-width: 300px; min-width: 180px;
  box-shadow: 0 6px 28px rgba(0,0,0,.5);
}
.trans-popup.visible { display: block; }
.trans-popup .pop-close { position: absolute; top: 8px; right: 10px; background: none; border: none; cursor: pointer; color: var(--sub); font-size: 1rem; }
.trans-popup .pop-lang { font-size: .68rem; font-weight: 700; color: var(--sub); text-transform: uppercase; margin-bottom: 4px; }
.trans-popup .pop-kor { font-size: .82rem; color: var(--text); margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 8px; line-height: 1.6; }
.trans-popup .pop-rus { font-size: .9rem; color: var(--accent); font-weight: 600; line-height: 1.6; margin-bottom: 10px; }
.pop-loading { font-size: .8rem; color: var(--sub); text-align: center; padding: 6px 0; }
.pop-apply {
  width: 100%; padding: 8px; background: var(--primary); color: white;
  border: none; border-radius: 8px; cursor: pointer; font-size: .82rem; font-weight: 600;
  display: none; margin-top: 4px;
}
.pop-apply:hover { filter: brightness(1.1); }
.pop-apply.visible { display: block; }
.pop-undo { width:100%; padding:6px; background:var(--border); color:var(--text); border:none; border-radius:8px; cursor:pointer; font-size:.78rem; display:none; margin-top:4px; }
.pop-undo:hover { background: #e53935; color: white; }
.pop-undo.visible { display:block; }

/* Results panel (unused) */
.results-panel {
  display: none !important; position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
  background: var(--card); border-top: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 16px; max-height: 45vh; overflow-y: auto;
  box-shadow: 0 -4px 24px rgba(0,0,0,.4);
}
.results-panel.visible { display: block; }
.results-panel .drag-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 14px; cursor: pointer; }
.results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media(max-width:500px) { .results-grid { grid-template-columns: 1fr; } }
.res-card { background: var(--bg); border-radius: 10px; padding: 12px; }
.res-card h4 { font-size: .78rem; color: var(--sub); margin-bottom: 8px; }
.res-card textarea { width: 100%; min-height: 120px; background: transparent; border: none; color: var(--text); font-size: .82rem; line-height: 1.6; resize: none; outline: none; }
.res-actions { display: flex; gap: 6px; margin-top: 6px; }
.btn-sm { padding: 5px 12px; font-size: .75rem; background: var(--border); color: var(--text); border: none; border-radius: 8px; cursor: pointer; }
.btn-sm:hover { background: var(--primary); color: white; }
.close-results { float: right; background: none; border: none; color: var(--sub); cursor: pointer; font-size: 1rem; }

/* Loading overlay */
.loading { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
.loading.visible { display: flex; }
.spinner { width: 44px; height: 44px; border: 4px solid rgba(255,255,255,.2); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { color: white; font-size: .9rem; font-weight: 600; }

/* Flip animation */
.flip-anim { animation: flip .3s ease; }
@keyframes flip { 0%{opacity:1;transform:perspective(600px) rotateY(0)} 50%{opacity:.2;transform:perspective(600px) rotateY(90deg)} 100%{opacity:1;transform:perspective(600px) rotateY(0)} }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-title">
    <span>📚</span> 교과서 번역기
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="btnDownload" title="현재 페이지 다운로드" onclick="downloadPage()" style="display:none">⬇️</button>
    <button class="icon-btn" title="설정" onclick="openSettings()">⚙️</button>
  </div>
</div>

<!-- Main viewer -->
<div class="viewer" id="viewer">
  <!-- Empty slot -->
  <div class="empty-slot" id="emptySlot">
    <div class="add-btn" id="addBtn" onclick="showUploadMenu(event)">
      <div class="plus">+</div>
      <div class="label">추가</div>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-wrap mode-select" id="canvasWrap">
    <canvas id="viewerCanvas"></canvas>
    <canvas id="selCanvas"></canvas>
    <div class="trans-popup" id="transPopup" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
      <button class="pop-close" onclick="closePopup()">✕</button>
      <div class="pop-lang">🇰🇷 한국어</div>
      <div class="pop-kor" id="popKor"></div>
      <div class="pop-lang">🇷🇺 러시아어</div>
      <div class="pop-rus" id="popRus"></div>
      <div class="pop-loading" id="popLoading" style="display:none">번역 중...</div>
      <button class="pop-apply" id="popApply" onclick="applyTranslationToImage()">✏️ 이미지에 러시아어 적용</button>
      <button class="pop-undo" id="popUndo" onclick="undoApply()">↩ 되돌리기</button>
    </div>
  </div>
</div>

<!-- Upload menu -->
<div class="upload-menu" id="uploadMenu">
  <div class="upload-item" onclick="triggerCamera()"><span class="icon">📸</span> 카메라 촬영</div>
  <div class="upload-item" onclick="triggerFile()"><span class="icon">🖼️</span> 사진 선택</div>
  <div class="upload-item" onclick="triggerPdf()"><span class="icon">📄</span> PDF 선택</div>
</div>

<!-- Nav arrows -->
<div class="nav-arrow left hidden" id="navLeft" onclick="goPage(-1)">◀</div>
<div class="nav-arrow right" id="navRight" onclick="goPage(1)">▶</div>

<!-- Page indicator -->
<div class="page-indicator" id="pageIndicator" style="display:none">1 / 1</div>

<!-- Zoom bar -->
<div class="zoom-bar hidden" id="zoomBar">
  <button class="z-btn" onclick="zoomOut()">−</button>
  <span class="z-label" id="zoomLabel">100%</span>
  <button class="z-btn" onclick="zoomIn()">+</button>
  <button class="z-btn" onclick="resetZoom()" title="맞춤">⊙</button>
</div>


<!-- Settings modal -->
<div class="modal-overlay" id="settingsModal" onclick="closeSettingsOutside(event)">
  <div class="modal">
    <h2>⚙️ 설정</h2>
    <div class="status-row">
      <span style="font-size:.85rem">API 키 상태:</span>
      <span class="chip no" id="apiChip">미설정</span>
    </div>
    <label>Groq API 키 (<a href="https://console.groq.com/keys" target="_blank">무료 발급</a>)</label>
    <input type="password" id="apiInput" placeholder="gsk_...">
    <div class="toggle-row">
      <label>🔲 스캔 보정 (문서처럼 평평하게)</label>
      <label class="toggle">
        <input type="checkbox" id="scanToggle" checked onchange="onScanToggle()">
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="modal-hint">
      Groq API는 완전 무료입니다. 카드 등록 불필요.<br>
      하루 14,400회 번역 가능합니다.
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeSettings()">닫기</button>
      <button class="btn btn-primary" onclick="saveApiKey()">저장</button>
    </div>
  </div>
</div>

<!-- Hidden inputs -->
<input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)">
<input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handleFiles(this.files)">
<input type="file" id="pdfInput" accept="application/pdf" onchange="handlePdf(this.files[0])">

<!-- Loading -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <p id="loadingText">처리 중...</p>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── State ──
const slots = [null]; // each slot: null (empty) or page data object
let currentSlot = 0;
let zoom = 1, panX = 0, panY = 0;
let isPanning = false, panStart = {x:0,y:0};
let lastPinchDist = null;
let viewMode = 'select';
let isSelecting = false, selStart = {x:0,y:0}, selEnd = {x:0,y:0};

const canvas = document.getElementById('viewerCanvas');
const ctx = canvas.getContext('2d');
const selCanvas = document.getElementById('selCanvas');
const selCtx = selCanvas.getContext('2d');

// ── Init ──
window.onload = () => {
  const k = localStorage.getItem('gemini_api_key');
  if (k) { document.getElementById('apiInput').value = k; updateApiChip(true); }
  initViewer();
  renderSlot();
};

// ── Settings ──
function openSettings() { document.getElementById('settingsModal').classList.add('visible'); }
function closeSettings() { document.getElementById('settingsModal').classList.remove('visible'); }
function closeSettingsOutside(e) { if (e.target === document.getElementById('settingsModal')) closeSettings(); }

function saveApiKey() {
  const k = document.getElementById('apiInput').value.trim();
  if (!k) return;
  localStorage.setItem('gemini_api_key', k);
  updateApiChip(true);
  closeSettings();
}
function updateApiChip(ok) {
  const el = document.getElementById('apiChip');
  el.textContent = ok ? '저장됨 ✓' : '미설정';
  el.className = 'chip ' + (ok ? 'ok' : 'no');
}
function onScanToggle() { if (slots[currentSlot]) renderCurrentPage(); }

// ── Upload menu ──
function showUploadMenu(e) {
  const menu = document.getElementById('uploadMenu');
  const btn = document.getElementById('addBtn').getBoundingClientRect();
  menu.style.top = (btn.top - menu.offsetHeight - 8) + 'px';
  menu.style.left = (btn.left + btn.width/2 - 90) + 'px';
  menu.classList.add('visible');
  e.stopPropagation();
}
document.addEventListener('click', () => document.getElementById('uploadMenu').classList.remove('visible'));

function triggerCamera() { document.getElementById('uploadMenu').classList.remove('visible'); document.getElementById('cameraInput').click(); }
function triggerFile() { document.getElementById('uploadMenu').classList.remove('visible'); document.getElementById('fileInput').click(); }
function triggerPdf() { document.getElementById('uploadMenu').classList.remove('visible'); document.getElementById('pdfInput').click(); }

// ── File handling ──
function handleFiles(files) {
  if (!files?.length) return;
  Array.from(files).forEach(f => {
    if (!f.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => addImageToCurrentSlot(e.target.result);
    reader.readAsDataURL(f);
  });
}

async function handlePdf(file) {
  if (!file) return;
  showLoading('PDF 변환 중...');
  try {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: buf}).promise;
    for (let i = 1; i <= pdf.numPages; i++) {
      document.getElementById('loadingText').textContent = `PDF 변환 중... (${i}/${pdf.numPages})`;
      const page = await pdf.getPage(i);
      const vp = page.getViewport({scale: 2});
      const c = document.createElement('canvas'); c.width = vp.width; c.height = vp.height;
      await page.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
      if (i === 1) {
        addImageToCurrentSlot(c.toDataURL('image/jpeg', 0.92));
      } else {
        // Add new slots for extra pages
        addNewSlotWithImage(c.toDataURL('image/jpeg', 0.92));
      }
    }
  } catch(e) { alert('PDF 오류: ' + e.message); }
  finally { hideLoading(); }
}

function addImageToCurrentSlot(dataUrl) {
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = img.naturalWidth; c.height = img.naturalHeight;
    c.getContext('2d').drawImage(img, 0, 0);
    const original = c.getContext('2d').getImageData(0, 0, c.width, c.height);
    const processed = scanEffect(original, c.width, c.height);
    slots[currentSlot] = {original, processed, width: c.width, height: c.height};
    renderSlot(true);
    updateNav();
  };
  img.src = dataUrl;
}

function addNewSlotWithImage(dataUrl) {
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = img.naturalWidth; c.height = img.naturalHeight;
    c.getContext('2d').drawImage(img, 0, 0);
    const original = c.getContext('2d').getImageData(0, 0, c.width, c.height);
    const processed = scanEffect(original, c.width, c.height);
    // Insert before the trailing null (or at end)
    const insertIdx = slots[slots.length-1] === null ? slots.length - 1 : slots.length;
    slots.splice(insertIdx, 0, {original, processed, width: c.width, height: c.height});
    updateNav();
  };
  img.src = dataUrl;
}

// ── Scan effect ──
function scanEffect(imageData, w, h) {
  const src = imageData.data, out = new Uint8ClampedArray(src.length);
  for (let i = 0; i < src.length; i += 4) {
    const r=src[i],g=src[i+1],b=src[i+2];
    const avg=(r+g+b)/3;
    let nr=Math.min(255,r*1.3+15),ng=Math.min(255,g*1.3+15),nb=Math.min(255,b*1.3+15);
    nr=nr*.6+avg*.4; ng=ng*.6+avg*.4; nb=nb*.6+avg*.4;
    if(nr>200&&ng>200&&nb>200){const w2=Math.min(1,(Math.min(nr,ng,nb)-180)/40);nr+=(255-nr)*w2;ng+=(255-ng)*w2;nb+=(255-nb)*w2;}
    out[i]=Math.round(nr);out[i+1]=Math.round(ng);out[i+2]=Math.round(nb);out[i+3]=src[i+3];
  }
  return new ImageData(out, w, h);
}

// ── Navigation ──
function goPage(dir) {
  const next = currentSlot + dir;
  if (next < 0) return;

  if (dir === 1) {
    // Going right: ensure next slot exists
    if (next >= slots.length) slots.push(null);
  } else {
    if (next < 0) return;
  }

  // Flip animation
  document.getElementById('viewer').classList.add('flip-anim');
  document.getElementById('viewer').addEventListener('animationend', () =>
    document.getElementById('viewer').classList.remove('flip-anim'), {once: true});

  currentSlot = next;
  closePopup();
  closeResults();
  renderSlot(true);
  updateNav();
}

function updateNav() {
  document.getElementById('navLeft').classList.toggle('hidden', currentSlot <= 0);
  // Right arrow always visible (can always go to next page)
  document.getElementById('navRight').classList.remove('hidden');

  const totalFilled = slots.filter(s => s !== null).length;
  const indicator = document.getElementById('pageIndicator');
  if (totalFilled > 0) {
    indicator.style.display = 'block';
    // Show position among filled pages
    const filledBefore = slots.slice(0, currentSlot+1).filter(s=>s!==null).length;
    indicator.textContent = slots[currentSlot] ? `${filledBefore} / ${totalFilled}` : `${totalFilled + 1}페이지 추가`;
  } else {
    indicator.style.display = 'none';
  }
}

// ── Render current slot ──
function renderSlot(fitToView) {
  const page = slots[currentSlot];
  const emptySlot = document.getElementById('emptySlot');
  const canvasWrap = document.getElementById('canvasWrap');
  const zoomBar = document.getElementById('zoomBar');
  const dlBtn = document.getElementById('btnDownload');

  if (!page) {
    emptySlot.style.display = 'flex';
    canvasWrap.classList.remove('visible');
    zoomBar.classList.add('hidden');
    if (dlBtn) dlBtn.style.display = 'none';
    return;
  }

  emptySlot.style.display = 'none';
  canvasWrap.classList.add('visible');
  canvasWrap.className = 'canvas-wrap visible mode-select';
  zoomBar.classList.remove('hidden');
  if (dlBtn) dlBtn.style.display = '';

  // 레이아웃 정착 후 렌더링
  requestAnimationFrame(() => requestAnimationFrame(() => renderCurrentPage(fitToView)));
}

function renderCurrentPage(fitToView) {
  const page = slots[currentSlot];
  if (!page) return;
  const scanOn = document.getElementById('scanToggle').checked;
  canvas.width = page.width; canvas.height = page.height;
  ctx.putImageData(scanOn ? page.processed : page.original, 0, 0);

  const wrap = document.getElementById('canvasWrap');
  selCanvas.width = wrap.offsetWidth || window.innerWidth;
  selCanvas.height = wrap.offsetHeight || window.innerHeight;

  if (fitToView) {
    const ww = wrap.offsetWidth || window.innerWidth;
    const wh = wrap.offsetHeight || (window.innerHeight - 52);
    zoom = Math.min(ww / page.width, wh / page.height);
    panX = (ww - page.width * zoom) / 2;
    panY = (wh - page.height * zoom) / 2;
    clampPan();
  }
  applyTransform();
}

function applyTransform() {
  canvas.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  document.getElementById('zoomLabel').textContent = Math.round(zoom*100) + '%';
}

function clampPan() {
  const page = slots[currentSlot]; if (!page) return;
  const wrap = document.getElementById('canvasWrap');
  const ww = wrap.offsetWidth || window.innerWidth;
  const wh = wrap.offsetHeight || (window.innerHeight - 52);
  const pw = page.width * zoom, ph = page.height * zoom;
  // 이미지가 화면보다 작으면 중앙 고정, 크면 경계 내에서 이동
  if (pw <= ww) panX = (ww - pw) / 2;
  else panX = Math.max(Math.min(panX, 0), ww - pw);
  if (ph <= wh) panY = (wh - ph) / 2;
  else panY = Math.max(Math.min(panY, 0), wh - ph);
}

function zoomIn(){setZoom(zoom*1.25);}
function zoomOut(){setZoom(zoom/1.25);}
function resetZoom(){renderCurrentPage(true);}
function setZoom(nz,cx,cy){
  const prev=zoom; zoom=Math.max(0.2,Math.min(5,nz));
  if(cx!==undefined){panX=cx-(cx-panX)*zoom/prev;panY=cy-(cy-panY)*zoom/prev;clampPan();}
  applyTransform();
}

// 항상 영역 선택 모드
function setMode(m) {
  viewMode = 'select';
  const wrap = document.getElementById('canvasWrap');
  wrap.className = 'canvas-wrap visible mode-select';
  selCtx.clearRect(0,0,selCanvas.width,selCanvas.height);
  closePopup();
}

// ── Viewer interaction ──
function initViewer() {
  const wrap = document.getElementById('canvasWrap');

  wrap.addEventListener('mousedown', e => {
    if (viewMode==='pan') {
      isPanning=true; panStart={x:e.clientX-panX,y:e.clientY-panY};
      wrap.classList.add('grabbing');
    } else {
      isSelecting=true; selStart=imgPos(e); selEnd=selStart; closePopup();
    }
  });

  window.addEventListener('mousemove', e => {
    if (viewMode==='pan'&&isPanning) {
      panX=e.clientX-panStart.x; panY=e.clientY-panStart.y;
      // 확대됐을 때만 clamp (그냥 화면 맞춤 상태면 중앙 유지)
      const page=slots[currentSlot];
      if (page) {
        const wrap=document.getElementById('canvasWrap');
        const ww=wrap.offsetWidth||window.innerWidth, wh=wrap.offsetHeight||(window.innerHeight-52);
        if (page.width*zoom<=ww) panX=(ww-page.width*zoom)/2;
        if (page.height*zoom<=wh) panY=(wh-page.height*zoom)/2;
      }
      applyTransform();
    }
    else if (viewMode==='select'&&isSelecting) { selEnd=imgPos(e); drawSel(); }
  });

  window.addEventListener('mouseup', e => {
    document.getElementById('canvasWrap').classList.remove('grabbing');
    if (viewMode==='pan') { isPanning=false; }
    else if (viewMode==='select'&&isSelecting) {
      isSelecting=false; selEnd=imgPos(e); drawSel();
      const r=selRect();
      if(r.w>20&&r.h>20) translateSel(r, e.clientX, e.clientY);
      else selCtx.clearRect(0,0,selCanvas.width,selCanvas.height);
    }
  });

  wrap.addEventListener('touchstart', e=>{
    if(e.touches.length===1){
      if(viewMode==='pan'){isPanning=true;panStart={x:e.touches[0].clientX-panX,y:e.touches[0].clientY-panY};}
      else{isSelecting=true;selStart=imgPosTouch(e.touches[0]);selEnd=selStart;closePopup();}
    } else if(e.touches.length===2){lastPinchDist=pdist(e);}
    e.preventDefault();
  },{passive:false});

  wrap.addEventListener('touchmove', e=>{
    if(e.touches.length===1){
      if(viewMode==='pan'&&isPanning){panX=e.touches[0].clientX-panStart.x;panY=e.touches[0].clientY-panStart.y;clampPan();applyTransform();}
      else if(viewMode==='select'&&isSelecting){selEnd=imgPosTouch(e.touches[0]);drawSel();}
    } else if(e.touches.length===2&&lastPinchDist){const d=pdist(e);setZoom(zoom*(d/lastPinchDist));lastPinchDist=d;}
    e.preventDefault();
  },{passive:false});

  wrap.addEventListener('touchend', e=>{
    if(e.touches.length<2) lastPinchDist=null;
    if(e.touches.length===0){
      if(viewMode==='select'&&isSelecting){
        isSelecting=false;drawSel();
        const r=selRect();
        const px=selEnd.x*zoom+panX, py=selEnd.y*zoom+panY+52;
        if(r.w>20&&r.h>20) translateSel(r, px, py);
        else selCtx.clearRect(0,0,selCanvas.width,selCanvas.height);
      }
      isPanning=false;
    }
  });

  wrap.addEventListener('wheel', e=>{
    e.preventDefault(); setZoom(zoom+(e.deltaY>0?-0.15:0.15),e.clientX,e.clientY-52);
  },{passive:false});

  window.addEventListener('resize', ()=>{ if(slots[currentSlot]) renderCurrentPage(true); });
}

function imgPos(e) {
  const wrap=document.getElementById('canvasWrap').getBoundingClientRect();
  return {x:(e.clientX-wrap.left-panX)/zoom, y:(e.clientY-wrap.top-panY)/zoom};
}
function imgPosTouch(t) {
  const wrap=document.getElementById('canvasWrap').getBoundingClientRect();
  return {x:(t.clientX-wrap.left-panX)/zoom, y:(t.clientY-wrap.top-panY)/zoom};
}
function selRect() {
  return {x:Math.max(0,Math.min(selStart.x,selEnd.x)),y:Math.max(0,Math.min(selStart.y,selEnd.y)),w:Math.abs(selEnd.x-selStart.x),h:Math.abs(selEnd.y-selStart.y)};
}
function pdist(e){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;return Math.sqrt(dx*dx+dy*dy);}

function drawSel() {
  const wrap=document.getElementById('canvasWrap');
  selCanvas.width=wrap.offsetWidth; selCanvas.height=wrap.offsetHeight;
  selCtx.clearRect(0,0,selCanvas.width,selCanvas.height);
  const sx=selStart.x*zoom+panX, sy=selStart.y*zoom+panY;
  const ex=selEnd.x*zoom+panX, ey=selEnd.y*zoom+panY;
  const x=Math.min(sx,ex),y=Math.min(sy,ey),w=Math.abs(ex-sx),h=Math.abs(ey-sy);
  selCtx.fillStyle='rgba(124,131,224,.15)';
  selCtx.fillRect(x,y,w,h);
  selCtx.strokeStyle='#7c83e0';
  selCtx.lineWidth=2;
  selCtx.setLineDash([6,3]);
  selCtx.strokeRect(x,y,w,h);
}

// ── Area translate ──
let lastSelRect = null; // 마지막 선택 영역 저장
let beforeApplyData = null; // 되돌리기용 원본 데이터

async function translateSel(rect, popClientX, popClientY) {
  const apiKey = localStorage.getItem('gemini_api_key') || document.getElementById('apiInput').value.trim();
  if (!apiKey) { openSettings(); return; }
  const page = slots[currentSlot]; if (!page) return;

  lastSelRect = rect;
  const cx=Math.max(0,Math.round(rect.x)), cy=Math.max(0,Math.round(rect.y));
  const cw=Math.min(Math.round(rect.w),page.width-cx), ch=Math.min(Math.round(rect.h),page.height-cy);
  if(cw<=0||ch<=0) return;

  const popup=document.getElementById('transPopup');
  const pw=300, ph=220;
  let px=popClientX+14, py=popClientY+14;
  if(px+pw > window.innerWidth-8) px=popClientX-pw-14;
  if(py+ph > window.innerHeight-8) py=popClientY-ph-14;
  px=Math.max(8,px); py=Math.max(60,py);
  popup.style.left=px+'px'; popup.style.top=py+'px';
  document.getElementById('popKor').textContent='';
  document.getElementById('popRus').textContent='';
  document.getElementById('popLoading').style.display='block';
  document.getElementById('popApply').classList.remove('visible');
  document.getElementById('popUndo').classList.remove('visible');
  popup.classList.add('visible');

  try {
    const scanOn=document.getElementById('scanToggle').checked;
    const full=document.createElement('canvas'); full.width=page.width; full.height=page.height;
    full.getContext('2d').putImageData(scanOn?page.processed:page.original,0,0);
    const crop=document.createElement('canvas'); crop.width=cw; crop.height=ch;
    crop.getContext('2d').drawImage(full,cx,cy,cw,ch,0,0,cw,ch);
    const b64=crop.toDataURL('image/jpeg',.92).split(',')[1];

    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
      body:JSON.stringify({model:'meta-llama/llama-4-scout-17b-16e-instruct',max_tokens:1024,
        messages:[{role:'user',content:[
          {type:'text',text:'이 이미지에서 한국어를 인식하고 러시아어로 번역하세요.\n형식: [KOREAN](한국어)[/KOREAN][RUSSIAN](번역)[/RUSSIAN]'},
          {type:'image_url',image_url:{url:`data:image/jpeg;base64,${b64}`}}
        ]}]})
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(`[${res.status}] ${e.error?.message||''}`);}
    const json=await res.json();
    const text=json.choices?.[0]?.message?.content||'';
    const kor=(text.match(/\[KOREAN\]([\s\S]*?)\[\/KOREAN\]/)||[])[1]?.trim()||'인식 실패';
    const rus=(text.match(/\[RUSSIAN\]([\s\S]*?)\[\/RUSSIAN\]/)||[])[1]?.trim()||'번역 실패';
    document.getElementById('popKor').textContent=kor;
    document.getElementById('popRus').textContent=rus;
    if(kor !== '인식 실패') document.getElementById('popApply').classList.add('visible');
  } catch(e) {
    document.getElementById('popKor').textContent='오류: '+e.message;
  } finally {
    document.getElementById('popLoading').style.display='none';
  }
}

// ── Apply translation to image ──
function applyTranslationToImage() {
  const page = slots[currentSlot]; if (!page || !lastSelRect) return;
  const rus = document.getElementById('popRus').textContent;
  if (!rus || rus === '번역 실패') return;

  const cx=Math.max(0,Math.round(lastSelRect.x)), cy=Math.max(0,Math.round(lastSelRect.y));
  const cw=Math.min(Math.round(lastSelRect.w), page.width-cx);
  const ch=Math.min(Math.round(lastSelRect.h), page.height-cy);
  if(cw<=0||ch<=0) return;

  // 되돌리기용 백업
  beforeApplyData = {
    original: new ImageData(new Uint8ClampedArray(page.original.data), page.width, page.height),
    processed: new ImageData(new Uint8ClampedArray(page.processed.data), page.width, page.height)
  };

  // 배경색 감지 (선택 영역 상단 픽셀 평균)
  const tmpC = document.createElement('canvas');
  tmpC.width = page.width; tmpC.height = page.height;
  const tmpX = tmpC.getContext('2d');
  tmpX.putImageData(page.processed, 0, 0);
  const strip = tmpX.getImageData(cx, cy, cw, Math.min(4, ch));
  let r=0, g=0, b=0, n=strip.data.length/4;
  for(let i=0;i<strip.data.length;i+=4){r+=strip.data[i];g+=strip.data[i+1];b+=strip.data[i+2];}
  r=Math.round(r/n); g=Math.round(g/n); b=Math.round(b/n);
  const bright = (r+g+b)/3 > 128;
  const bgColor = bright ? `rgb(245,245,240)` : `rgb(30,30,46)`;
  const textColor = bright ? '#1a1a2e' : '#e8e8f8';

  function drawOnCanvas(srcImageData) {
    const c = document.createElement('canvas');
    c.width = page.width; c.height = page.height;
    const x = c.getContext('2d');
    x.putImageData(srcImageData, 0, 0);

    // 배경 채우기 (한국어 지우기)
    x.fillStyle = bgColor;
    x.fillRect(cx, cy, cw, ch);

    // 러시아어 텍스트 렌더링
    const pad = 6;
    const maxW = cw - pad*2;
    let fontSize = Math.min(Math.floor(ch * 0.45), 32);

    function wrapText(sz) {
      x.font = `bold ${sz}px 'Segoe UI', Arial, sans-serif`;
      const words = rus.split(' ');
      const lines = [];
      let line = '';
      for(const w of words) {
        const test = line ? line+' '+w : w;
        if(x.measureText(test).width > maxW && line) { lines.push(line); line=w; }
        else line=test;
      }
      if(line) lines.push(line);
      return lines;
    }

    let lines = wrapText(fontSize);
    while(lines.length * fontSize * 1.35 > ch - pad*2 && fontSize > 9) {
      fontSize--;
      lines = wrapText(fontSize);
    }

    const lineH = fontSize * 1.35;
    const totalH = lines.length * lineH;
    const startY = cy + Math.max(pad, (ch - totalH) / 2);

    x.fillStyle = textColor;
    x.textBaseline = 'top';
    lines.forEach((l, i) => x.fillText(l, cx+pad, startY + i*lineH));

    return x.getImageData(0, 0, page.width, page.height);
  }

  // 두 이미지 모두 교체
  const newOriginal = drawOnCanvas(page.original);
  const newProcessed = drawOnCanvas(page.processed);
  slots[currentSlot] = { original: newOriginal, processed: newProcessed, width: page.width, height: page.height };

  renderCurrentPage();
  document.getElementById('popApply').classList.remove('visible');
  document.getElementById('popUndo').classList.add('visible');
}

function undoApply() {
  const page = slots[currentSlot]; if (!page || !beforeApplyData) return;
  slots[currentSlot] = { original: beforeApplyData.original, processed: beforeApplyData.processed, width: page.width, height: page.height };
  beforeApplyData = null;
  renderCurrentPage();
  document.getElementById('popUndo').classList.remove('visible');
  document.getElementById('popApply').classList.add('visible');
}

function closePopup() {
  document.getElementById('transPopup').classList.remove('visible');
  selCtx.clearRect(0,0,selCanvas.width,selCanvas.height);
}

// ── Download current page ──
function downloadPage() {
  const page = slots[currentSlot]; if (!page) return;
  const scanOn = document.getElementById('scanToggle').checked;
  const tmp = document.createElement('canvas');
  tmp.width = page.width; tmp.height = page.height;
  tmp.getContext('2d').putImageData(scanOn ? page.processed : page.original, 0, 0);
  const a = document.createElement('a');
  a.href = tmp.toDataURL('image/png');
  a.download = `page_${currentSlot + 1}.png`;
  a.click();
}

function showLoading(t){document.getElementById('loadingText').textContent=t;document.getElementById('loading').classList.add('visible');}
function hideLoading(){document.getElementById('loading').classList.remove('visible');}

// ── Drag & drop ──
document.addEventListener('dragover', e=>e.preventDefault());
document.addEventListener('drop', e=>{
  e.preventDefault();
  const file=e.dataTransfer.files[0]; if(!file) return;
  if(file.type==='application/pdf') handlePdf(file);
  else handleFiles(e.dataTransfer.files);
});
