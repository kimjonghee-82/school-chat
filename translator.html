<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>교과서 번역기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #5c6bc0;
  --bg: #1e1e2e;
  --card: #2a2a3e;
  --text: #e0e0f0;
  --sub: #9090b0;
  --border: #3a3a5e;
  --accent: #7c83e0;
}

html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Segoe UI','Apple SD Gothic Neo',sans-serif; }

/* ══════════════════════════════
   LIBRARY SCREEN
══════════════════════════════ */
#libraryScreen {
  position: fixed; inset: 0;
  background: linear-gradient(160deg, #f5f0e8 0%, #ede4d0 50%, #f0ead8 100%);
  display: flex; flex-direction: column;
  overflow-y: auto;
  z-index: 1000;
}

.lib-header {
  padding: 20px 24px 12px;
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(180deg, #c8a96e 0%, #a87e3c 100%);
  box-shadow: 0 3px 10px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,220,120,.3);
  border-bottom: 2px solid #8a6220;
  flex-shrink: 0;
}
.lib-header h1 {
  font-size: 1.4rem; font-weight: 800;
  color: #fff8ee;
  text-shadow: 0 1px 4px rgba(0,0,0,.35);
  letter-spacing: .5px;
}
.lib-header-sub { font-size: .75rem; color: rgba(255,240,210,.75); margin-top: 2px; }

.bookshelf-container {
  flex: 1;
  padding: 24px 20px 40px;
  overflow-y: auto;
}

/* 선반 */
.shelf {
  position: relative;
  margin-bottom: 0;
  padding-bottom: 22px; /* 선반 두께 공간 */
}
.shelf-books {
  display: flex;
  flex-wrap: nowrap;
  gap: 10px;
  align-items: flex-end;
  padding: 20px 16px 6px;
  background: linear-gradient(180deg, rgba(240,228,210,.7) 0%, rgba(220,205,180,.8) 100%);
  border-radius: 4px 4px 0 0;
  min-height: 260px;
  overflow: hidden;
}
/* 선반 ledge */
.shelf::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 22px;
  background: linear-gradient(180deg, #c8a96e 0%, #a87e3c 60%, #8a6220 100%);
  border-radius: 0 0 6px 6px;
  box-shadow: 0 6px 18px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,200,80,.18);
}

/* 책 */
.book-item {
  flex-shrink: 0;
  width: calc((100vw - 100px) / 5);
  max-width: 200px; min-width: 90px;
  display: flex; flex-direction: column; align-items: center;
  cursor: pointer;
  user-select: none;
  transition: transform .22s cubic-bezier(.34,1.56,.64,1), filter .2s;
  position: relative;
}
.book-item:hover { transform: translateY(-10px); filter: drop-shadow(0 12px 20px rgba(0,0,0,.7)); }

.book-cover {
  width: 88%;
  aspect-ratio: 5 / 7;
  border-radius: 3px 8px 8px 3px;
  overflow: hidden;
  background: linear-gradient(135deg, #3a3a6a 0%, #2a2a4e 100%);
  box-shadow: -3px 0 0 rgba(0,0,0,.4), 2px 0 6px rgba(0,0,0,.5), inset -3px 0 6px rgba(0,0,0,.3);
  position: relative;
  flex-shrink: 0;
}
/* 세로 모드: 5권 맞게 축소 */
@media (orientation: portrait) {
  .book-item { width: calc((100vw - 50px) / 5); max-width: 130px; min-width: 56px; }
}
.book-cover img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: top;
  display: block;
  position: absolute; top: 0; left: 0;
}
.book-cover-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem;
  background: linear-gradient(135deg, #4a4a8a, #2e2e5e);
}
/* 책 등(spine) 효과 */
.book-cover::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 6px;
  background: linear-gradient(90deg, rgba(0,0,0,.5) 0%, rgba(0,0,0,.15) 100%);
  z-index: 1;
}
.book-title {
  font-size: .72rem; color: #5a3510;
  text-align: center; margin-top: 7px;
  width: 90%;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  text-shadow: 0 1px 3px rgba(0,0,0,.7);
}

/* + 버튼 책 */
.book-add {
  flex-shrink: 0;
  width: 80px; height: 112px;
  border: 2.5px dashed rgba(245,222,179,.35);
  border-radius: 4px 8px 8px 4px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer;
  color: rgba(245,222,179,.6);
  background: rgba(255,255,255,.04);
  transition: border-color .2s, background .2s, transform .22s;
  gap: 6px;
}
.book-add:hover { border-color: #f5deb3; background: rgba(245,222,179,.1); transform: translateY(-6px); }
.book-add .plus { font-size: 2rem; line-height: 1; }
.book-add .label { font-size: .65rem; }

/* 삭제 오버레이 */
.book-delete-overlay {
  position: absolute; inset: 0;
  background: rgba(220,50,50,.85);
  border-radius: 3px 8px 8px 3px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem;
  opacity: 0; pointer-events: none;
  transition: opacity .15s;
}
.book-item.confirm-delete .book-delete-overlay { opacity: 1; pointer-events: auto; }

/* 삭제 확인 팝업 */
.delete-popup {
  display: none; position: fixed; z-index: 2000;
  background: #2a2a3e; border: 1px solid #5c3030;
  border-radius: 14px; padding: 20px 22px; min-width: 220px;
  box-shadow: 0 8px 32px rgba(0,0,0,.6);
  text-align: center;
}
.delete-popup.visible { display: block; }
.delete-popup p { font-size: .9rem; color: var(--text); margin-bottom: 14px; }
.delete-popup .del-actions { display: flex; gap: 10px; justify-content: center; }
.delete-popup .del-btn { padding: 8px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: .85rem; font-weight: 600; }
.del-confirm { background: #e53935; color: white; }
.del-cancel  { background: var(--border); color: var(--text); }

/* ══════════════════════════════
   TRANSLATOR SCREEN
══════════════════════════════ */
#translatorScreen { position: fixed; inset: 0; display: none; }

/* ── Header ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 52px;
  background: rgba(30,30,46,0.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 10px;
}
.header-title { font-size: 1rem; font-weight: 700; color: var(--text); flex: 1; display: flex; align-items: center; gap: 8px; }
.header-title span { font-size: 1.2rem; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--card); color: var(--text); cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
.icon-btn:hover { background: var(--border); }
.icon-btn.active { background: var(--primary); border-color: var(--primary); }

/* 뒤로가기 버튼 */
.back-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--card);
  color: #d4a55a; cursor: pointer; font-size: .85rem; font-weight: 600;
  transition: background .2s;
  white-space: nowrap;
}
.back-btn:hover { background: var(--border); }

/* ── Main viewer ── */
.viewer {
  position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  touch-action: none;
}

/* ── Empty slot ── */
.empty-slot {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 100%; height: 100%;
}
.add-btn {
  width: 160px; height: 200px;
  border: 2.5px dashed #4a4a70;
  border-radius: 20px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; color: var(--sub); gap: 10px;
  background: rgba(255,255,255,.03);
  transition: border-color .2s, background .2s, transform .2s;
  user-select: none;
}
.add-btn:hover { border-color: var(--accent); background: rgba(124,131,224,.08); transform: scale(1.03); }
.add-btn .plus { font-size: 2.8rem; color: var(--accent); line-height: 1; }
.add-btn .label { font-size: .85rem; color: var(--sub); }

/* Upload menu */
.upload-menu {
  display: none; position: fixed; z-index: 300;
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  padding: 8px; box-shadow: 0 8px 32px rgba(0,0,0,.5);
  flex-direction: column; gap: 4px; min-width: 180px;
}
.upload-menu.visible { display: flex; }
.upload-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 10px; cursor: pointer;
  font-size: .88rem; color: var(--text); transition: background .15s;
}
.upload-item:hover { background: var(--border); }
.upload-item .icon { font-size: 1.2rem; width: 24px; text-align: center; }

/* Canvas viewer */
.canvas-wrap {
  position: absolute; inset: 0;
  overflow: hidden;
  display: none;
  cursor: grab;
}
.canvas-wrap.visible { display: block; }
.canvas-wrap.mode-select { cursor: crosshair; }
.canvas-wrap.grabbing { cursor: grabbing; }
#viewerCanvas { position: absolute; transform-origin: 0 0; display: block; }
#viewerCanvas2 { position: absolute; transform-origin: 0 0; }
#selCanvas { position: absolute; top: 0; left: 0; pointer-events: none; }
.scan-filter { filter: contrast(1.18) brightness(1.06) saturate(0.85); }

/* ── Nav arrows ── */
.nav-arrow {
  position: fixed; top: 50%; transform: translateY(-50%);
  width: 44px; height: 80px;
  background: rgba(92,107,192,.18);
  border: 1px solid rgba(92,107,192,.3);
  border-radius: 0 12px 12px 0;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: rgba(255,255,255,.7); font-size: 1.3rem;
  transition: background .2s, color .2s;
  z-index: 150; user-select: none;
  backdrop-filter: blur(4px);
}
.nav-arrow:hover { background: rgba(92,107,192,.4); color: white; }
.nav-arrow.right { right: 0; border-radius: 12px 0 0 12px; }
.nav-arrow.left { left: 0; }
.nav-arrow.hidden { display: none; }

/* ── TOC Panel ── */
#tocToggle {
  position: fixed; top: 60px; left: 0; z-index: 160;
  width: 36px; height: 36px;
  background: rgba(92,107,192,.55);
  backdrop-filter: blur(6px);
  border: none; border-radius: 0 10px 10px 0;
  color: white; font-size: 1rem; cursor: pointer;
  display: none; align-items: center; justify-content: center;
  transition: background .15s;
}
#tocToggle.visible { display: flex; }
#tocToggle:hover { background: rgba(92,107,192,.85); }

#tocPanel {
  position: fixed; top: 52px; left: 0; bottom: 0; z-index: 155;
  width: 200px;
  background: rgba(26,26,42,.96);
  backdrop-filter: blur(10px);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transform: translateX(-100%);
  transition: transform .25s cubic-bezier(.4,0,.2,1);
  overflow: hidden;
}
#tocPanel.open { transform: translateX(0); }

.toc-header {
  padding: 12px 14px 8px;
  font-size: .78rem; font-weight: 700; color: var(--sub);
  text-transform: uppercase; letter-spacing: .05em;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.toc-close {
  background: none; border: none; color: var(--sub);
  cursor: pointer; font-size: 1rem; padding: 2px 4px;
}
.toc-close:hover { color: var(--text); }

#tocList {
  flex: 1; overflow-y: auto;
  padding: 6px 0;
}
#tocList::-webkit-scrollbar { width: 4px; }
#tocList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.toc-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 14px;
  cursor: pointer;
  transition: background .12s;
  border-left: 3px solid transparent;
}
.toc-item:hover { background: rgba(92,107,192,.15); }
.toc-item.active {
  background: rgba(92,107,192,.2);
  border-left-color: var(--primary);
}
.toc-thumb {
  width: 32px; height: 44px; flex-shrink: 0;
  background: var(--card); border-radius: 2px;
  overflow: hidden; border: 1px solid var(--border);
}
.toc-thumb img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
.toc-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: .6rem; color: var(--sub); }
.toc-page-num { font-size: .8rem; color: var(--text); }

/* Page indicator */
.page-indicator {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(30,30,46,.85); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 14px; font-size: .78rem; color: var(--sub);
  backdrop-filter: blur(6px); z-index: 150; pointer-events: none;
}

/* Zoom controls */
.zoom-bar {
  position: fixed; bottom: 16px; right: 16px;
  display: flex; gap: 4px; align-items: center;
  background: rgba(30,30,46,.85); border: 1px solid var(--border);
  border-radius: 12px; padding: 5px 8px;
  backdrop-filter: blur(6px); z-index: 150;
}
.zoom-bar.hidden { display: none; }
.z-btn {
  width: 28px; height: 28px; border-radius: 6px; border: none;
  background: var(--border); color: var(--text); cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
}
.z-btn:hover { background: var(--primary); }
.z-label { font-size: .75rem; color: var(--sub); min-width: 38px; text-align: center; }

.translate-fab {
  display: none !important;
  position: fixed; bottom: 16px; left: 16px;
  background: #fb8c00; color: white; border: none; border-radius: 12px;
  padding: 10px 18px; font-size: .85rem; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 16px rgba(251,140,0,.4);
  display: none; align-items: center; gap: 6px;
  z-index: 150; transition: filter .15s, transform .1s;
}
.translate-fab:hover { filter: brightness(1.1); transform: translateY(-1px); }
.translate-fab.visible { display: flex; }

/* ── Settings modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
  z-index: 500; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.visible { display: flex; }
.modal {
  background: var(--card); border: 1px solid var(--border); border-radius: 20px;
  padding: 24px; width: 90%; max-width: 400px;
  box-shadow: 0 8px 40px rgba(0,0,0,.5);
}
.modal h2 { font-size: 1rem; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
.modal label { font-size: .82rem; color: var(--sub); display: block; margin-bottom: 6px; }
.modal input {
  width: 100%; padding: 10px 14px; background: var(--bg);
  border: 1.5px solid var(--border); border-radius: 10px;
  color: var(--text); font-size: .88rem; outline: none; margin-bottom: 14px;
}
.modal input:focus { border-color: var(--primary); }
.modal-hint { font-size: .78rem; color: var(--sub); line-height: 1.6; margin-bottom: 16px; }
.page-layout-btn { padding: 6px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--sub); cursor: pointer; font-size: .85rem; transition: all .15s; }
.page-layout-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
.modal-hint a { color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.btn { padding: 9px 18px; border: none; border-radius: 10px; cursor: pointer; font-size: .85rem; font-weight: 600; }
.btn-primary { background: var(--primary); color: white; }
.btn-ghost { background: var(--border); color: var(--text); }
.status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.chip { padding: 4px 10px; border-radius: 20px; font-size: .72rem; font-weight: 600; }
.chip.ok { background: rgba(67,160,71,.2); color: #81c784; }
.chip.no { background: rgba(229,57,53,.2); color: #ef9a9a; }

/* Scan toggle in settings */
.toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.toggle-row label { font-size: .85rem; }
.toggle { position: relative; width: 42px; height: 22px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #4a4a70; border-radius: 22px; cursor: pointer; transition: background .2s; }
.toggle-slider::before { content: ''; position: absolute; width: 16px; height: 16px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: transform .2s; }
.toggle input:checked + .toggle-slider { background: var(--primary); }
.toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

/* Translation popup */
.trans-popup {
  display: none; position: fixed; z-index: 400;
  background: var(--card); border: 1px solid var(--primary);
  border-radius: 14px; padding: 14px 16px; max-width: 300px; min-width: 180px;
  box-shadow: 0 6px 28px rgba(0,0,0,.5);
}
.trans-popup.visible { display: block; }
.trans-popup .pop-close { position: absolute; top: 8px; right: 10px; background: none; border: none; cursor: pointer; color: var(--sub); font-size: 1rem; }
.trans-popup .pop-lang { font-size: .68rem; font-weight: 700; color: var(--sub); text-transform: uppercase; margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
.trans-popup .pop-kor { font-size: .82rem; color: var(--text); margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 8px; line-height: 1.6; }
.pop-tts {
  background: none; border: none; cursor: pointer; color: var(--sub);
  font-size: .95rem; padding: 0 2px; line-height: 1;
  transition: color .15s, transform .1s;
}
.pop-tts:hover { color: var(--accent); transform: scale(1.2); }
.pop-tts.speaking { color: #81c784; animation: pulse .6s ease infinite alternate; }
@keyframes pulse { from { opacity: 1; } to { opacity: .4; } }
.trans-popup .pop-rus { font-size: .9rem; color: var(--accent); font-weight: 600; line-height: 1.6; margin-bottom: 10px; }
.pop-loading { font-size: .8rem; color: var(--sub); text-align: center; padding: 6px 0; }
.pop-apply {
  width: 100%; padding: 8px; background: var(--primary); color: white;
  border: none; border-radius: 8px; cursor: pointer; font-size: .82rem; font-weight: 600;
  display: none; margin-top: 4px;
}
.pop-apply:hover { filter: brightness(1.1); }
.pop-apply.visible { display: block; }
.pop-undo { width:100%; padding:6px; background:var(--border); color:var(--text); border:none; border-radius:8px; cursor:pointer; font-size:.78rem; display:none; margin-top:4px; }
.pop-undo:hover { background: #e53935; color: white; }
.pop-undo.visible { display:block; }

/* Results panel (unused) */
.results-panel {
  display: none !important; position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
  background: var(--card); border-top: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 16px; max-height: 45vh; overflow-y: auto;
  box-shadow: 0 -4px 24px rgba(0,0,0,.4);
}
.results-panel.visible { display: block; }
.results-panel .drag-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 14px; cursor: pointer; }
.results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media(max-width:500px) { .results-grid { grid-template-columns: 1fr; } }
.res-card { background: var(--bg); border-radius: 10px; padding: 12px; }
.res-card h4 { font-size: .78rem; color: var(--sub); margin-bottom: 8px; }
.res-card textarea { width: 100%; min-height: 120px; background: transparent; border: none; color: var(--text); font-size: .82rem; line-height: 1.6; resize: none; outline: none; }
.res-actions { display: flex; gap: 6px; margin-top: 6px; }
.btn-sm { padding: 5px 12px; font-size: .75rem; background: var(--border); color: var(--text); border: none; border-radius: 8px; cursor: pointer; }
.btn-sm:hover { background: var(--primary); color: white; }
.close-results { float: right; background: none; border: none; color: var(--sub); cursor: pointer; font-size: 1rem; }

/* Loading overlay */
.loading { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
.loading.visible { display: flex; }
.spinner { width: 44px; height: 44px; border: 4px solid rgba(255,255,255,.2); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { color: white; font-size: .9rem; font-weight: 600; }

/* Flip animation */
.flip-anim { animation: flip .35s ease; }
@keyframes flip { 0%{opacity:1;transform:perspective(800px) rotateY(0)} 50%{opacity:.15;transform:perspective(800px) rotateY(90deg)} 100%{opacity:1;transform:perspective(800px) rotateY(0)} }
</style>
</head>
<body>

<!-- ══════════════════════════════
     LIBRARY SCREEN
══════════════════════════════ -->
<div id="libraryScreen">
  <div class="lib-header">
    <div>
      <h1>📚 나의 서재</h1>

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ══════════════════════════════
   IndexedDB (BookshelfDB)
══════════════════════════════ */
const DB_NAME = 'BookshelfDB';
const DB_STORE = 'books';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(DB_STORE)) {
        const store = d.createObjectStore(DB_STORE, {keyPath: 'id'});
        store.createIndex('addedAt', 'addedAt', {unique: false});
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror   = e => reject(e.target.error);
  });
}

function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).index('addedAt').getAll();
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

function dbPut(book) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    const req = tx.objectStore(DB_STORE).put(book);
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  });
}

function dbGet(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).get(id);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

function dbDelete(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    const req = tx.objectStore(DB_STORE).delete(id);
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  });
}

/* ══════════════════════════════
   Library UI
══════════════════════════════ */
let bookList = [];       // [{id, title, thumbnail, addedAt, pdfData}]
let deleteTargetId = null;
let currentBookId = null;
const BOOKS_PER_SHELF = 5;

async function initLibrary() {
  await openDB();
  bookList = await dbGetAll();
  renderBookshelf();
}

function renderBookshelf() {
  const container = document.getElementById('bookshelfContainer');
  container.innerHTML = '';

  // 전체 책 목록 + 마지막에 "+" 버튼 아이템
  const items = [...bookList, {_isAdd: true}];
  const booksPerShelf = BOOKS_PER_SHELF;
  const totalShelves = Math.ceil(items.length / booksPerShelf);

  for (let s = 0; s < totalShelves; s++) {
    const shelfEl = document.createElement('div');
    shelfEl.className = 'shelf';
    const booksEl = document.createElement('div');
    booksEl.className = 'shelf-books';

    const start = s * booksPerShelf;
    const end   = Math.min(start + booksPerShelf, items.length);

    for (let i = start; i < end; i++) {
      const item = items[i];
      if (item._isAdd) {
        const addEl = document.createElement('div');
        addEl.className = 'book-add';
        addEl.innerHTML = '<div class="plus">+</div><div class="label">추가</div>';
        addEl.onclick = () => document.getElementById('libPdfInput').click();
        booksEl.appendChild(addEl);
      } else {
        booksEl.appendChild(createBookEl(item));
      }
    }

    shelfEl.appendChild(booksEl);
    container.appendChild(shelfEl);
  }
}

function createBookEl(book) {
  const el = document.createElement('div');
  el.className = 'book-item';
  el.dataset.id = book.id;

  let coverHtml;
  if (book.thumbnail) {
    coverHtml = `<img src="${book.thumbnail}" alt="${book.title}">`;
  } else {
    coverHtml = `<div class="book-cover-placeholder">📄</div>`;
  }

  el.innerHTML = `
    <div class="book-cover">${coverHtml}<div class="book-delete-overlay">🗑️</div></div>
    <div class="book-title">${book.title}</div>
  `;

  // 클릭: 책 열기
  el.addEventListener('click', () => openBook(book.id));

  // 우클릭: 삭제 팝업
  el.addEventListener('contextmenu', e => {
    e.preventDefault();
    showDeletePopup(book.id, e.clientX, e.clientY);
  });

  // 길게 누르기 (터치)
  let longPressTimer = null;
  el.addEventListener('touchstart', e => {
    longPressTimer = setTimeout(() => {
      const t = e.touches[0];
      showDeletePopup(book.id, t.clientX, t.clientY);
    }, 600);
  });
  el.addEventListener('touchend',   () => clearTimeout(longPressTimer));
  el.addEventListener('touchmove',  () => clearTimeout(longPressTimer));

  return el;
}

function showDeletePopup(id, cx, cy) {
  deleteTargetId = id;
  const popup = document.getElementById('deletePopup');
  popup.style.left = Math.min(cx, window.innerWidth  - 240) + 'px';
  popup.style.top  = Math.min(cy, window.innerHeight - 120) + 'px';
  popup.classList.add('visible');
}

function cancelDelete() {
  deleteTargetId = null;
  document.getElementById('deletePopup').classList.remove('visible');
}

async function confirmDelete() {
  if (!deleteTargetId) return;
  await dbDelete(deleteTargetId);
  bookList = bookList.filter(b => b.id !== deleteTargetId);
  deleteTargetId = null;
  document.getElementById('deletePopup').classList.remove('visible');
  renderBookshelf();
}

// 삭제 팝업 바깥 클릭 닫기
document.addEventListener('click', e => {
  const popup = document.getElementById('deletePopup');
  if (popup.classList.contains('visible') && !popup.contains(e.target)) {
    cancelDelete();
  }
});

/* ══════════════════════════════
   서재에서 PDF 추가
══════════════════════════════ */
async function handleLibraryPdf(file) {
  if (!file) return;
  showLoading('PDF 처리 중...');
  try {
    const buf = await file.arrayBuffer();
    // 썸네일 생성 (1페이지)
    const pdf = await pdfjsLib.getDocument({data: buf.slice(0)}).promise;
    const page = await pdf.getPage(1);
    const vp = page.getViewport({scale: 0.5});
    const thumbCanvas = document.createElement('canvas');
    thumbCanvas.width  = vp.width;
    thumbCanvas.height = vp.height;
    await page.render({canvasContext: thumbCanvas.getContext('2d'), viewport: vp}).promise;
    const thumbnail = thumbCanvas.toDataURL('image/jpeg', 0.7);

    // 제목: 파일명에서 확장자 제거
    const title = file.name.replace(/\.pdf$/i, '');

    const book = {
      id: Date.now().toString(),
      title,
      thumbnail,
      pdfData: buf,
      addedAt: Date.now()
    };
    await dbPut(book);
    bookList.push(book);
    renderBookshelf();
  } catch(e) {
    alert('PDF 추가 오류: ' + e.message);
  } finally {
    hideLoading();
    // input 초기화 (같은 파일 재선택 허용)
    document.getElementById('libPdfInput').value = '';
  }
}

/* ══════════════════════════════
   책 열기 / 서재 복귀
══════════════════════════════ */
async function openBook(id) {
  document.getElementById('libraryScreen').style.display = 'none';
  document.getElementById('translatorScreen').style.display = 'block';
  currentBookId = id;
  try {
    const book = await dbGet(id);
    if (!book) return;
    await handlePdf(book.pdfData.slice(0));
    // 마지막으로 읽던 페이지 복원
    const savedPage = parseInt(localStorage.getItem(`book_page_${id}`) || '0');
    if (savedPage > 0 && savedPage < slots.length) {
      currentSlot = savedPage;
      if (slots[currentSlot]?.pdfRef) await renderPdfSlot(currentSlot, true);
      else { renderSlot(true); updateNav(); }
    }
  } catch(e) {
    alert('PDF 오류: ' + e.message);
  }
}

function saveCurrentPage() {
  if (currentBookId) localStorage.setItem(`book_page_${currentBookId}`, currentSlot);
}

function goToLibrary() {
  saveCurrentPage();
  document.getElementById('translatorScreen').style.display = 'none';
  document.getElementById('libraryScreen').style.display   = 'flex';
  // 번역기 상태 초기화
  slots.length = 0; slots.push(null);
  pdfDoc = null; currentSlot = 0; currentBookId = null;
  renderSlot(); updateNav();
}

/* ══════════════════════════════
   File handling
══════════════════════════════ */
function handleFiles(files) {
  if (!files?.length) return;
  pdfDoc = null;
  Array.from(files).forEach(f => {
    if (!f.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => addImageToCurrentSlot(e.target.result);
    reader.readAsDataURL(f);
  });
}

/**
 * handlePdf: File 객체 또는 ArrayBuffer 모두 수용
 */
async function handlePdf(fileOrBuf) {
  if (!fileOrBuf) return;
  showLoading('PDF 불러오는 중...');
  try {
    let buf;
    if (fileOrBuf instanceof ArrayBuffer) {
      buf = fileOrBuf;
    } else {
      buf = await fileOrBuf.arrayBuffer();
    }
    pdfDoc = await pdfjsLib.getDocument({data: buf}).promise;
    const n = pdfDoc.numPages;

    slots.length = 0;
    for (let i = 1; i <= n; i++) slots.push({pdfRef: pdfDoc, pageNum: i});
    currentSlot = 0;
    updateNav();

    await renderPdfSlot(0, true);
  } catch(e) { alert('PDF 오류: ' + e.message); }
  finally { hideLoading(); }
}

async function renderPdfSlot(idx, fitToView) {
  async function renderOne(i) {
    const slot = slots[i];
    if (!slot || !slot.pdfRef) return;
    showLoading(`페이지 렌더링 중... (${slot.pageNum}/${slot.pdfRef.numPages})`);
    const pdfPage = await slot.pdfRef.getPage(slot.pageNum);
    const scale = Math.min(2, 1600 / pdfPage.getViewport({scale:1}).width);
    const vp = pdfPage.getViewport({scale});
    const c = document.createElement('canvas'); c.width = vp.width; c.height = vp.height;
    await pdfPage.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
    const original = c.getContext('2d').getImageData(0, 0, c.width, c.height);
    slots[i] = {original, width: c.width, height: c.height};
  }
  try {
    await renderOne(idx);
    if (pageLayout === 2 && slots[idx+1]?.pdfRef) await renderOne(idx+1);
  } finally { hideLoading(); }
  renderSlot(fitToView);
  updateNav();
  // 인접 페이지 백그라운드 미리 렌더링
  prefetchAdjacent(idx);
}

async function prefetchAdjacent(idx) {
  const step = (pageLayout === 2) ? 2 : 1;
  for (const i of [idx + step, idx - step, idx + step*2]) {
    if (i < 0 || i >= slots.length) continue;
    if (slots[i]?.pdfRef) {
      const slot = slots[i];
      try {
        const pdfPage = await slot.pdfRef.getPage(slot.pageNum);
        const scale = Math.min(2, 1600 / pdfPage.getViewport({scale:1}).width);
        const vp = pdfPage.getViewport({scale});
        const c = document.createElement('canvas'); c.width = vp.width; c.height = vp.height;
        await pdfPage.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
        const original = c.getContext('2d').getImageData(0, 0, c.width, c.height);
        slots[i] = {original, width: c.width, height: c.height};
      } catch(_) {}
    }
  }
}

function addImageToCurrentSlot(dataUrl) {
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = img.naturalWidth; c.height = img.naturalHeight;
    c.getContext('2d').drawImage(img, 0, 0);
    const original = c.getContext('2d').getImageData(0, 0, c.width, c.height);
    slots[currentSlot] = {original, width: c.width, height: c.height};
    renderSlot(true);
    updateNav();
  };
  img.src = dataUrl;
}

function addNewSlotWithImage(dataUrl) {
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = img.naturalWidth; c.height = img.naturalHeight;
    c.getContext('2d').drawImage(img, 0, 0);
    const original = c.getContext('2d').getImageData(0, 0, c.width, c.height);
    const insertIdx = slots[slots.length-1] === null ? slots.length - 1 : slots.length;
    slots.splice(insertIdx, 0, {original, width: c.width, height: c.height});
    updateNav();
  };
  img.src = dataUrl;
}

function speakKorean() {
  const text = document.getElementById('popKor').textContent;

  ttsUtterance.pitch = 1.1;

  // 여성 목소리 선택

                || voices.find(v => v.lang.startsWith('ko'));

  ttsUtterance.onstart = () => setTtsIcon(true);
  ttsUtterance.onend   = () => setTtsIcon(false);
  ttsUtterance.onerror = () => setTtsIcon(false);
  ttsSynth.speak(ttsUtterance);
}

/* ══════════════════════════════
   Navigation
══════════════════════════════ */
function goPage(dir) {
  const step = (pageLayout === 2 && slots.length > 1) ? dir * 2 : dir;
  const next = currentSlot + step;
  if (next < 0) return;

  if (dir === 1) {
    if (next >= slots.length) {
      if (pdfDoc) return;
      slots.push(null);
    }
  }

  currentSlot = Math.max(0, Math.min(next, slots.length - 1));
  saveCurrentPage();
  closePopup();

  document.getElementById('viewer').classList.add('flip-anim');
  document.getElementById('viewer').addEventListener('animationend', () =>
    document.getElementById('viewer').classList.remove('flip-anim'), {once: true});

  if (slots[currentSlot]?.pdfRef) renderPdfSlot(currentSlot, true);
  else { renderSlot(true); updateNav(); }
}

function updateNav() {
  document.getElementById('navLeft').classList.toggle('hidden', currentSlot <= 0);
  const isLastSlot = currentSlot >= slots.length - 1;
  document.getElementById('navRight').classList.toggle('hidden', pdfDoc ? isLastSlot : false);

  const total = slots.length;
  const indicator = document.getElementById('pageIndicator');
  const tocBtn = document.getElementById('tocToggle');
  if (total > 0 && slots.some(s => s !== null)) {
    indicator.style.display = 'block';
    const cur = slots[currentSlot];
    indicator.textContent = !cur ? `${total + 1}페이지 추가` : `${currentSlot + 1} / ${total}`;
    // 2페이지 이상이면 목차 버튼 표시
    if (total > 1) tocBtn.classList.add('visible');
    else tocBtn.classList.remove('visible');
  } else {
    indicator.style.display = 'none';
    tocBtn.classList.remove('visible');
  }
  updateTocHighlight();
}

// ── TOC ──
function toggleToc() {
  document.getElementById('tocPanel').classList.toggle('open');
  renderToc();
}
function closeToc() {
  document.getElementById('tocPanel').classList.remove('open');
}

function renderToc() {
  const list = document.getElementById('tocList');
  list.innerHTML = '';
  slots.forEach((slot, idx) => {
    if (!slot) return;
    const item = document.createElement('div');
    item.className = 'toc-item' + (idx === currentSlot ? ' active' : '');
    item.dataset.idx = idx;

    // 썸네일
    const thumb = document.createElement('div');
    thumb.className = 'toc-thumb';
    if (!slot.pdfRef && slot.original) {
      // 이미 렌더된 페이지 — 썸네일 생성
      const tc = document.createElement('canvas');
      tc.width = slot.width; tc.height = slot.height;
      tc.getContext('2d').putImageData(slot.original, 0, 0);
      const img = document.createElement('img');
      img.src = tc.toDataURL('image/jpeg', 0.5);
      thumb.appendChild(img);
    } else {
      thumb.innerHTML = `<div class="toc-thumb-placeholder">${idx+1}</div>`;
    }

    const num = document.createElement('div');
    num.className = 'toc-page-num';
    num.textContent = `${idx + 1}페이지`;

    item.appendChild(thumb);
    item.appendChild(num);
    item.addEventListener('click', () => jumpToPage(idx));
    list.appendChild(item);
  });
}

function updateTocHighlight() {
  document.querySelectorAll('.toc-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.idx) === currentSlot);
  });
}

function jumpToPage(idx) {
  if (idx < 0 || idx >= slots.length) return;
  currentSlot = idx;
  saveCurrentPage();
  closePopup();
  if (slots[currentSlot]?.pdfRef) renderPdfSlot(currentSlot, true);
  else { renderSlot(true); updateNav(); }
  closeToc();
}

/* ══════════════════════════════
   Render
══════════════════════════════ */
function renderSlot(fitToView) {
  const page     = slots[currentSlot];
  const emptySlot = document.getElementById('emptySlot');
  const canvasWrap = document.getElementById('canvasWrap');
  const zoomBar  = document.getElementById('zoomBar');
  const dlBtn    = document.getElementById('btnDownload');

  if (!page) {
    emptySlot.style.display = 'flex';
    canvasWrap.classList.remove('visible');
    zoomBar.classList.add('hidden');
    if (dlBtn) dlBtn.style.display = 'none';
    return;
  }

  emptySlot.style.display = 'none';
  canvasWrap.classList.add('visible');
  canvasWrap.className = 'canvas-wrap visible mode-select';
  zoomBar.classList.remove('hidden');
  if (dlBtn) dlBtn.style.display = '';

  requestAnimationFrame(() => requestAnimationFrame(() => renderCurrentPage(fitToView)));
}

function getTwoPageMode() {
  if (pageLayout !== 2) return false;
  const nextPage = slots[currentSlot + 1];
  return nextPage && !nextPage.pdfRef;
}

function av() { return getTwoPageMode() ? (activePane===1 ? vR : vL) : vL; }

function fitView(v, page, areaW, areaH) {
  v.zoom = Math.min(areaW / page.width, areaH / page.height);
  v.panX = (areaW - page.width  * v.zoom) / 2;
  v.panY = (areaH - page.height * v.zoom) / 2;
}

function clampView(v, page, areaW, areaH) {
  const pw = page.width * v.zoom, ph = page.height * v.zoom;
  if (pw <= areaW) v.panX = (areaW - pw) / 2;
  else v.panX = Math.max(Math.min(v.panX, 0), areaW - pw);
  if (ph <= areaH) v.panY = (areaH - ph) / 2;
  else v.panY = Math.max(Math.min(v.panY, 0), areaH - ph);
}

function renderCurrentPage(fitToView) {
  const page = slots[currentSlot];
  if (!page) return;
  const scanOn = document.getElementById('scanToggle').checked;
  const wrap   = document.getElementById('canvasWrap');
  const ww     = wrap.offsetWidth  || window.innerWidth;
  const wh     = wrap.offsetHeight || (window.innerHeight - 52);

  selCanvas.width = ww; selCanvas.height = wh;

  const showTwo  = getTwoPageMode();
  const nextPage = showTwo ? slots[currentSlot + 1] : null;

  if (showTwo && nextPage) {
    const half = Math.floor(ww / 2);

    canvas.width = page.width; canvas.height = page.height;
    ctx.putImageData(page.original, 0, 0);
    canvas2.width = nextPage.width; canvas2.height = nextPage.height;
    ctx2.putImageData(nextPage.original, 0, 0);
    canvas2.style.display = 'block';

    applyScanFilter(canvas,  scanOn);
    applyScanFilter(canvas2, scanOn);

    if (fitToView) { fitView(vL, page, half, wh); fitView(vR, nextPage, half, wh); }

    canvas.style.transform  = `translate(${vL.panX}px,${vL.panY}px) scale(${vL.zoom})`;
    canvas2.style.transform = `translate(${half + vR.panX}px,${vR.panY}px) scale(${vR.zoom})`;
    canvas2.style.transformOrigin = '0 0';

    canvas.style.outline  = activePane===0 ? '2px solid rgba(124,131,224,0.6)' : 'none';
    canvas2.style.outline = activePane===1 ? '2px solid rgba(124,131,224,0.6)' : 'none';

    const v = av();
    document.getElementById('zoomLabel').textContent = Math.round(v.zoom*100) + '%';
  } else {
    canvas2.style.display = 'none';
    canvas.style.outline  = 'none';
    canvas.width = page.width; canvas.height = page.height;
    ctx.putImageData(page.original, 0, 0);
    applyScanFilter(canvas, scanOn);
    if (fitToView) fitView(vL, page, ww, wh);
    canvas.style.transform = `translate(${vL.panX}px,${vL.panY}px) scale(${vL.zoom})`;
    zoom = vL.zoom; panX = vL.panX; panY = vL.panY;
    document.getElementById('zoomLabel').textContent = Math.round(vL.zoom*100) + '%';
  }
}

function applyTransform() {
  const showTwo = getTwoPageMode();
  if (showTwo) {
    renderCurrentPage(false);
  } else {
    vL.zoom = zoom; vL.panX = panX; vL.panY = panY;
    canvas.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
    document.getElementById('zoomLabel').textContent = Math.round(zoom*100) + '%';
  }
}

function clampPan() {
  const page = slots[currentSlot]; if (!page) return;
  const wrap = document.getElementById('canvasWrap');
  const ww   = wrap.offsetWidth  || window.innerWidth;
  const wh   = wrap.offsetHeight || (window.innerHeight - 52);
  const showTwo = getTwoPageMode();
  if (showTwo) {
    const half = Math.floor(ww / 2);
    const nextPage = slots[currentSlot+1];
    clampView(vL, page, half, wh);
    if (nextPage) clampView(vR, nextPage, half, wh);
  } else {
    const pw = page.width * zoom, ph = page.height * zoom;
    if (pw <= ww) panX = (ww - pw) / 2;
    else panX = Math.max(Math.min(panX, 0), ww - pw);
    if (ph <= wh) panY = (wh - ph) / 2;
    else panY = Math.max(Math.min(panY, 0), wh - ph);
  }
}

function zoomIn()  { doZoom(av().zoom * 1.25); }
function zoomOut() { doZoom(av().zoom / 1.25); }
function resetZoom() { renderCurrentPage(true); }

function doZoom(nz, cx, cy) {
  const showTwo = getTwoPageMode();
  const wrap = document.getElementById('canvasWrap');
  const ww   = wrap.offsetWidth  || window.innerWidth;
  const wh   = wrap.offsetHeight || (window.innerHeight - 52);
  const half = Math.floor(ww / 2);

  if (showTwo) {
    const v    = av();
    const page = slots[currentSlot + (activePane===1?1:0)];
    if (!page) return;
    const areaW = half, areaH = wh;
    const prev  = v.zoom;
    v.zoom = Math.max(0.2, Math.min(5, nz));
    if (cx !== undefined) {
      const lx = activePane===1 ? cx - half : cx;
      v.panX = lx - (lx - v.panX) * v.zoom / prev;
      v.panY = cy - (cy - v.panY) * v.zoom / prev;
    }
    clampView(v, page, areaW, areaH);
    renderCurrentPage(false);
  } else {
    const prev = zoom;
    zoom = Math.max(0.2, Math.min(5, nz));
    if (cx !== undefined) { panX = cx-(cx-panX)*zoom/prev; panY = cy-(cy-panY)*zoom/prev; clampPan(); }
    applyTransform();
  }
}

function setZoom(nz, cx, cy) { doZoom(nz, cx, cy); }

function setMode(m) {
  viewMode = 'select';
  const wrap = document.getElementById('canvasWrap');
  wrap.className = 'canvas-wrap visible mode-select';
  selCtx.clearRect(0,0,selCanvas.width,selCanvas.height);
  closePopup();
}

/* ══════════════════════════════
   Viewer interaction
══════════════════════════════ */
function initViewer() {
  const wrap = document.getElementById('canvasWrap');

  function selectPane(clientX) {
    if (!getTwoPageMode()) { activePane=0; return; }
    const ww = wrap.offsetWidth || window.innerWidth;
    const newPane = clientX > ww/2 ? 1 : 0;
    if (newPane !== activePane) { activePane = newPane; renderCurrentPage(false); }
  }

  wrap.addEventListener('mousedown', e => {
    selectPane(e.clientX);
    const v = av();
    if (viewMode==='pan') {
      isPanning=true; panStart={x:e.clientX-v.panX, y:e.clientY-v.panY};
      wrap.classList.add('grabbing');
    } else {
      isSelecting=true;
      selStart=imgPos(e); selEnd=selStart;
      closePopup();
    }
  });

  window.addEventListener('mousemove', e => {
    if (viewMode==='pan' && isPanning) {
      const v = av();
      const wrap2 = document.getElementById('canvasWrap');
      const ww = wrap2.offsetWidth||window.innerWidth, wh = wrap2.offsetHeight||(window.innerHeight-52);
      const half = Math.floor(ww/2);
      if (getTwoPageMode()) {
        const page = slots[currentSlot + (activePane===1?1:0)];
        v.panX = e.clientX - panStart.x;
        v.panY = e.clientY - panStart.y;
        if (page) clampView(v, page, half, wh);
        renderCurrentPage(false);
      } else {
        panX=e.clientX-panStart.x; panY=e.clientY-panStart.y;
        const page=slots[currentSlot];
        if(page){if(page.width*zoom<=ww)panX=(ww-page.width*zoom)/2;if(page.height*zoom<=wh)panY=(wh-page.height*zoom)/2;}
        applyTransform();
      }
    }
    else if (viewMode==='select'&&isSelecting) { selEnd=imgPos(e); drawSel(); }
  });

  window.addEventListener('mouseup', e => {
    document.getElementById('canvasWrap').classList.remove('grabbing');
    if (viewMode==='pan') { isPanning=false; }
    else if (viewMode==='select'&&isSelecting) {
      isSelecting=false; selEnd=imgPos(e); drawSel();
      const r=selRect();
      if(r.w>10&&r.h>6) translateSel(r, e.clientX, e.clientY);
      else selCtx.clearRect(0,0,selCanvas.width,selCanvas.height);
    }
  });

  wrap.addEventListener('touchstart', e=>{
    if(e.touches.length===1){
      selectPane(e.touches[0].clientX);
      const v=av();
      if(viewMode==='pan'){isPanning=true;panStart={x:e.touches[0].clientX-v.panX,y:e.touches[0].clientY-v.panY};}
      else{isSelecting=true;selStart=imgPosTouch(e.touches[0]);selEnd=selStart;closePopup();}
    } else if(e.touches.length===2){lastPinchDist=pdist(e);}
    e.preventDefault();
  },{passive:false});

  wrap.addEventListener('touchmove', e=>{
    if(e.touches.length===1){
      if(viewMode==='pan'&&isPanning){
        const v=av();
        const wrap2=document.getElementById('canvasWrap');
        const ww=wrap2.offsetWidth||window.innerWidth,wh=wrap2.offsetHeight||(window.innerHeight-52);
        const half=Math.floor(ww/2);
        if(getTwoPageMode()){
          const page=slots[currentSlot+(activePane===1?1:0)];
          v.panX=e.touches[0].clientX-panStart.x;v.panY=e.touches[0].clientY-panStart.y;
          if(page)clampView(v,page,half,wh);
          renderCurrentPage(false);
        }else{panX=e.touches[0].clientX-panStart.x;panY=e.touches[0].clientY-panStart.y;clampPan();applyTransform();}
      }
      else if(viewMode==='select'&&isSelecting){ selEnd=imgPosTouch(e.touches[0]); drawSel(); }
    } else if(e.touches.length===2&&lastPinchDist){
      const d=pdist(e);
      const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
      const cy=(e.touches[0].clientY+e.touches[1].clientY)/2-52;
      doZoom(av().zoom*(d/lastPinchDist),cx,cy);
      lastPinchDist=d;
    }
    e.preventDefault();
  },{passive:false});

  wrap.addEventListener('touchend', e=>{
    if(e.touches.length<2) lastPinchDist=null;
    if(e.touches.length===0){
      if(viewMode==='select'&&isSelecting){
        isSelecting=false;
        const v=av();
        const px=selEnd.x*v.zoom+v.panX, py=selEnd.y*v.zoom+v.panY+52;
        drawSel();
        const r=selRect();
        if(r.w>10&&r.h>6) translateSel(r, px, py);
        else selCtx.clearRect(0,0,selCanvas.width,selCanvas.height);
      }
      isPanning=false;
    }
  });

  wrap.addEventListener('wheel', e=>{
    e.preventDefault();
    selectPane(e.clientX);
    const v=av(); doZoom(v.zoom+(e.deltaY>0?-0.15:0.15), e.clientX, e.clientY-52);
  },{passive:false});

  window.addEventListener('resize', ()=>{ if(slots[currentSlot]) renderCurrentPage(true); });
}

function imgPos(e) {
  const wrap=document.getElementById('canvasWrap').getBoundingClientRect();
  const v=av();
  const ww=wrap.width; const half=Math.floor(ww/2);
  const baseX = getTwoPageMode() && activePane===1 ? half : 0;
  return {x:(e.clientX-wrap.left-baseX-v.panX)/v.zoom, y:(e.clientY-wrap.top-v.panY)/v.zoom};
}
function imgPosTouch(t) {
  const wrap=document.getElementById('canvasWrap').getBoundingClientRect();
  const v=av();
  const ww=wrap.width; const half=Math.floor(ww/2);
  const baseX = getTwoPageMode() && activePane===1 ? half : 0;
  return {x:(t.clientX-wrap.left-baseX-v.panX)/v.zoom, y:(t.clientY-wrap.top-v.panY)/v.zoom};
}
function selRect() {
  return {x:Math.max(0,Math.min(selStart.x,selEnd.x)),y:Math.max(0,Math.min(selStart.y,selEnd.y)),w:Math.abs(selEnd.x-selStart.x),h:Math.abs(selEnd.y-selStart.y)};
}
function pdist(e){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;return Math.sqrt(dx*dx+dy*dy);}

function drawSel() {
  const wrap=document.getElementById('canvasWrap');
  selCanvas.width=wrap.offsetWidth; selCanvas.height=wrap.offsetHeight;
  selCtx.clearRect(0,0,selCanvas.width,selCanvas.height);
  const v=av();
  const ww=wrap.offsetWidth; const half=Math.floor(ww/2);
  const baseX = getTwoPageMode() && activePane===1 ? half : 0;

  const sx=selStart.x*v.zoom+v.panX+baseX, sy=selStart.y*v.zoom+v.panY;
  const ex=selEnd.x*v.zoom+v.panX+baseX,   ey=selEnd.y*v.zoom+v.panY;
  const x=Math.min(sx,ex),y=Math.min(sy,ey),w=Math.abs(ex-sx),h=Math.abs(ey-sy);
  selCtx.fillStyle='rgba(124,131,224,.15)';
  selCtx.fillRect(x,y,w,h);
  selCtx.strokeStyle='#7c83e0';
  selCtx.lineWidth=2;
  selCtx.setLineDash([6,3]);
  selCtx.strokeRect(x,y,w,h);
  selCtx.setLineDash([]);
}

/* 브라우저 텍스트 선택처럼 줄마다 개별 하이라이트 */

/* ══════════════════════════════
   Area translate
══════════════════════════════ */
let lastSelRect  = null;
let lastSelSlot  = 0;
let beforeApplyData = null;

async function translateSel(rect, popClientX, popClientY) {
  const apiKey = localStorage.getItem('gemini_api_key') || document.getElementById('apiInput').value.trim();
  if (!apiKey) { openSettings(); return; }
  lastSelSlot = (getTwoPageMode() && activePane===1) ? currentSlot+1 : currentSlot;
  const page = slots[lastSelSlot]; if (!page) return;

  lastSelRect = rect;
  const cx=Math.max(0,Math.round(rect.x)), cy=Math.max(0,Math.round(rect.y));
  const cw=Math.min(Math.round(rect.w),page.width-cx), ch=Math.min(Math.round(rect.h),page.height-cy);
  if(cw<=0||ch<=0) return;

  const popup=document.getElementById('transPopup');
  const pw=300, ph=220;
  let px=popClientX+14, py=popClientY+14;
  if(px+pw > window.innerWidth-8)  px=popClientX-pw-14;
  if(py+ph > window.innerHeight-8) py=popClientY-ph-14;
  px=Math.max(8,px); py=Math.max(60,py);
  popup.style.left=px+'px'; popup.style.top=py+'px';
  document.getElementById('popKor').textContent='';
  document.getElementById('popRus').textContent='';
  document.getElementById('popLoading').style.display='block';
  document.getElementById('popApply').classList.remove('visible');
  document.getElementById('popUndo').classList.remove('visible');
  popup.classList.add('visible');

  try {
    const full=document.createElement('canvas'); full.width=page.width; full.height=page.height;
    full.getContext('2d').putImageData(page.original,0,0);
    const crop=document.createElement('canvas'); crop.width=cw; crop.height=ch;
    crop.getContext('2d').drawImage(full,cx,cy,cw,ch,0,0,cw,ch);
    const b64=crop.toDataURL('image/jpeg',.92).split(',')[1];

    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
      body:JSON.stringify({model:'meta-llama/llama-4-scout-17b-16e-instruct',max_tokens:1024,
        messages:[{role:'user',content:[
          {type:'text',text:`이 이미지에서 한국어 텍스트를 정확히 인식한 후 ${LANG_FULL[targetLang]}로 번역하세요.\n반드시 아래 형식으로만 답하세요:\n[KOREAN]인식한 한국어[/KOREAN]\n[TRANSLATED]${LANG_FULL[targetLang]} 번역[/TRANSLATED]`},
          {type:'image_url',image_url:{url:`data:image/jpeg;base64,${b64}`}}
        ]}]})
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(`[${res.status}] ${e.error?.message||''}`);}
    const json=await res.json();
    const text=json.choices?.[0]?.message?.content||'';
    const kor=(text.match(/\[KOREAN\]([\s\S]*?)\[\/KOREAN\]/)||[])[1]?.trim()||'인식 실패';
    const rus=(text.match(/\[TRANSLATED\]([\s\S]*?)\[\/TRANSLATED\]/)||[])[1]?.trim()||'번역 실패';
    document.getElementById('popKor').textContent=kor;
    document.getElementById('popRus').textContent=rus;
    if(kor !== '인식 실패') document.getElementById('popApply').classList.add('visible');
  } catch(e) {
    document.getElementById('popKor').textContent='오류: '+e.message;
  } finally {
    document.getElementById('popLoading').style.display='none';
  }
}

/* ══════════════════════════════
   Apply translation to image
══════════════════════════════ */
function applyTranslationToImage() {
  const page = slots[lastSelSlot]; if (!page || !lastSelRect) return;
  const rus  = document.getElementById('popRus').textContent;
  if (!rus || rus === '번역 실패') return;

  const cx=Math.max(0,Math.round(lastSelRect.x)), cy=Math.max(0,Math.round(lastSelRect.y));
  const cw=Math.min(Math.round(lastSelRect.w), page.width-cx);
  const ch=Math.min(Math.round(lastSelRect.h), page.height-cy);
  if(cw<=0||ch<=0) return;

  beforeApplyData = {
    original: new ImageData(new Uint8ClampedArray(page.original.data), page.width, page.height)
  };

  const tmpC = document.createElement('canvas');
  tmpC.width = page.width; tmpC.height = page.height;
  const tmpX = tmpC.getContext('2d');
  tmpX.putImageData(page.original, 0, 0);
  const strip = tmpX.getImageData(cx, cy, cw, Math.min(4, ch));
  let r=0, g=0, b=0, n=strip.data.length/4;
  for(let i=0;i<strip.data.length;i+=4){r+=strip.data[i];g+=strip.data[i+1];b+=strip.data[i+2];}
  r=Math.round(r/n); g=Math.round(g/n); b=Math.round(b/n);
  const bright   = (r+g+b)/3 > 128;
  const bgColor  = bright ? `rgb(245,245,240)` : `rgb(30,30,46)`;
  const textColor = bright ? '#1a1a2e' : '#e8e8f8';

  // 선택 영역의 한글 글자 높이 추정
  function estimateTextHeight(imgData) {
    const d = imgData.data, W = imgData.width;
    const rowDark = [];
    for (let row = cy; row < cy + ch; row++) {
      let dark = 0;
      for (let col = cx; col < cx + cw; col++) {
        const i = (row * W + col) * 4;
        if ((d[i] + d[i+1] + d[i+2]) / 3 < 140) dark++;
      }
      rowDark.push(dark / cw > 0.04);
    }
    const heights = [];
    let inLine = false, lineStart = 0;
    for (let i = 0; i < rowDark.length; i++) {
      if (rowDark[i] && !inLine) { inLine = true; lineStart = i; }
      else if (!rowDark[i] && inLine) { inLine = false; heights.push(i - lineStart); }
    }
    if (inLine) heights.push(rowDark.length - lineStart);
    if (!heights.length) return null;
    heights.sort((a,b)=>a-b);
    return heights[Math.floor(heights.length * 0.7)];
  }

  const estimatedH = estimateTextHeight(page.original);

  function drawOnCanvas(srcImageData) {
    const c = document.createElement('canvas');
    c.width = page.width; c.height = page.height;
    const x = c.getContext('2d');
    x.putImageData(srcImageData, 0, 0);
    x.fillStyle = bgColor;
    x.fillRect(cx, cy, cw, ch);
    const pad   = 6;
    const maxW  = cw - pad*2;
    // 한글 글자 높이 기반 폰트 크기, 없으면 영역 비율
    let fontSize = estimatedH ? Math.max(10, Math.min(estimatedH, Math.floor(ch * 0.85)))
                              : Math.max(10, Math.min(Math.floor(ch * 0.45), 48));

    function wrapText(sz) {
      x.font = `bold ${sz}px 'Segoe UI', Arial, sans-serif`;
      const words = rus.split(' ');
      const lines = [];
      let line = '';
      for(const w of words) {
        const test = line ? line+' '+w : w;
        if(x.measureText(test).width > maxW && line) { lines.push(line); line=w; }
        else line=test;
      }
      if(line) lines.push(line);
      return lines;
    }

    let lines = wrapText(fontSize);
    while(lines.length * fontSize * 1.35 > ch - pad*2 && fontSize > 9) {
      fontSize--;
      lines = wrapText(fontSize);
    }

    const lineH  = fontSize * 1.35;
    const totalH = lines.length * lineH;
    const startY = cy + Math.max(pad, (ch - totalH) / 2);

    x.fillStyle    = textColor;
    x.textBaseline = 'top';
    lines.forEach((l, i) => x.fillText(l, cx+pad, startY + i*lineH));

    return x.getImageData(0, 0, page.width, page.height);
  }

  const newOriginal = drawOnCanvas(page.original);
  slots[lastSelSlot] = { original: newOriginal, width: page.width, height: page.height };

  renderCurrentPage();
  document.getElementById('popApply').classList.remove('visible');
  document.getElementById('popUndo').classList.add('visible');
}

function undoApply() {
  const page = slots[lastSelSlot]; if (!page || !beforeApplyData) return;
  slots[lastSelSlot] = { original: beforeApplyData.original, width: page.width, height: page.height };
  beforeApplyData = null;
  renderCurrentPage();
  document.getElementById('popUndo').classList.remove('visible');
  document.getElementById('popApply').classList.add('visible');
}



/* ══════════════════════════════
   Download
══════════════════════════════ */
function downloadPage() {
  const page = slots[currentSlot]; if (!page) return;
  const tmp = document.createElement('canvas');
  tmp.width = page.width; tmp.height = page.height;
  tmp.getContext('2d').putImageData(page.original, 0, 0);
  const a = document.createElement('a');
  a.href = tmp.toDataURL('image/png');
  a.download = `page_${currentSlot + 1}.png`;
  a.click();
}

function showLoading(t) { document.getElementById('loadingText').textContent=t; document.getElementById('loading').classList.add('visible'); }
function hideLoading()  { document.getElementById('loading').classList.remove('visible'); }

/* ══════════════════════════════
   Drag & drop
══════════════════════════════ */
document.addEventListener('dragover', e=>e.preventDefault());
document.addEventListener('drop', e=>{
  e.preventDefault();
  const file=e.dataTransfer.files[0]; if(!file) return;
  if(file.type==='application/pdf') handlePdf(file);
  else handleFiles(e.dataTransfer.files);
});
