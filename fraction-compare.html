<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>분수의 크기를 비교해 봅시다</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nanum Gothic', 'Apple SD Gothic Neo', sans-serif;
    background: #fafafa;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    color: #333;
    margin-bottom: 60px;
    letter-spacing: -0.5px;
  }

  .main-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
    width: 100%;
    max-width: 800px;
  }

  /* 분수 입력 영역 */
  .fraction-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .fraction-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .fraction-input {
    width: 80px;
    height: 70px;
    border: 2.5px solid #f0a070;
    border-radius: 12px;
    background: #fff8f5;
    font-size: 32px;
    font-weight: 700;
    text-align: center;
    color: #333;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    caret-color: transparent;
    user-select: none;
  }

  .fraction-input:focus,
  .fraction-input.active {
    border-color: #e06020;
    background: #fff3ee;
    box-shadow: 0 0 0 3px rgba(224,96,32,0.15);
  }

  .fraction-line {
    width: 90px;
    height: 3px;
    background: #888;
    margin: 6px 0;
    border-radius: 2px;
  }

  /* 비교 기호 영역 */
  .compare-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 80px;
    height: 80px;
  }

  .compare-symbol {
    font-size: 48px;
    font-weight: 700;
    color: #ccc;
  }

  /* 숫자패드 */
  .numpad {
    position: absolute;
    background: #fff;
    border: 1.5px solid #ddd;
    border-radius: 14px;
    padding: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s, transform 0.18s;
    transform: translateY(4px);
  }

  .numpad.visible {
    opacity: 1;
    pointer-events: all;
    transform: translateY(0);
  }

  /* 왼쪽 분수 패드: 오른쪽에 표시 */
  .fraction-wrapper:first-child .numpad {
    left: 100px;
    top: 0;
  }

  /* 오른쪽 분수 패드: 왼쪽에 표시 */
  .fraction-wrapper:last-child .numpad {
    right: 100px;
    top: 0;
  }

  .numpad-btn {
    width: 44px;
    height: 40px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    background: #f9f9f9;
    font-size: 18px;
    font-weight: 600;
    color: #333;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
  }

  .numpad-btn:hover {
    background: #f0e8ff;
    border-color: #b090e0;
  }

  .numpad-btn:active {
    background: #e0d0ff;
  }

  .numpad-btn.del {
    grid-column: span 2;
    font-size: 14px;
    background: #fff0f0;
    border-color: #f0b0b0;
    color: #c04040;
  }

  .numpad-btn.del:hover {
    background: #ffe0e0;
  }

  .numpad-btn.zero {
    /* 0 버튼 */
  }

  /* 레이블 */
  .fraction-label {
    font-size: 13px;
    color: #aaa;
    margin-top: 10px;
  }
</style>
</head>
<body>

<h1>분수의 크기를 비교해 봅시다.</h1>

<div class="main-area">

  <!-- 왼쪽 분수 -->
  <div class="fraction-wrapper" id="wrapper-left">
    <div class="fraction-box">
      <input class="fraction-input" id="num-left" type="text" inputmode="none" maxlength="2" placeholder="?" readonly>
      <div class="fraction-line"></div>
      <input class="fraction-input" id="den-left" type="text" inputmode="none" maxlength="2" placeholder="?" readonly>
    </div>
    <div class="fraction-label">첫 번째 분수</div>

    <div class="numpad" id="pad-left">
      <button class="numpad-btn" data-val="1">1</button>
      <button class="numpad-btn" data-val="2">2</button>
      <button class="numpad-btn" data-val="3">3</button>
      <button class="numpad-btn" data-val="4">4</button>
      <button class="numpad-btn" data-val="5">5</button>
      <button class="numpad-btn" data-val="6">6</button>
      <button class="numpad-btn" data-val="7">7</button>
      <button class="numpad-btn" data-val="8">8</button>
      <button class="numpad-btn" data-val="9">9</button>
      <button class="numpad-btn zero" data-val="0">0</button>
      <button class="numpad-btn del" data-val="del">← 지우기</button>
    </div>
  </div>

  <!-- 비교 기호 -->
  <div class="compare-area">
    <span class="compare-symbol" id="compare-symbol">?</span>
  </div>

  <!-- 오른쪽 분수 -->
  <div class="fraction-wrapper" id="wrapper-right">
    <div class="fraction-box">
      <input class="fraction-input" id="num-right" type="text" inputmode="none" maxlength="2" placeholder="?" readonly>
      <div class="fraction-line"></div>
      <input class="fraction-input" id="den-right" type="text" inputmode="none" maxlength="2" placeholder="?" readonly>
    </div>
    <div class="fraction-label">두 번째 분수</div>

    <div class="numpad" id="pad-right">
      <button class="numpad-btn" data-val="1">1</button>
      <button class="numpad-btn" data-val="2">2</button>
      <button class="numpad-btn" data-val="3">3</button>
      <button class="numpad-btn" data-val="4">4</button>
      <button class="numpad-btn" data-val="5">5</button>
      <button class="numpad-btn" data-val="6">6</button>
      <button class="numpad-btn" data-val="7">7</button>
      <button class="numpad-btn" data-val="8">8</button>
      <button class="numpad-btn" data-val="9">9</button>
      <button class="numpad-btn zero" data-val="0">0</button>
      <button class="numpad-btn del" data-val="del">← 지우기</button>
    </div>
  </div>

</div>

<script>
  const inputs = {
    'num-left':  document.getElementById('num-left'),
    'den-left':  document.getElementById('den-left'),
    'num-right': document.getElementById('num-right'),
    'den-right': document.getElementById('den-right'),
  };

  const pads = {
    left:  document.getElementById('pad-left'),
    right: document.getElementById('pad-right'),
  };

  const wrappers = {
    left:  document.getElementById('wrapper-left'),
    right: document.getElementById('wrapper-right'),
  };

  let activeInput = null;
  let padVisible = { left: false, right: false };
  let padTimer = { left: null, right: null };

  // 활성 입력칸 설정
  function setActive(inputEl) {
    Object.values(inputs).forEach(el => el.classList.remove('active'));
    if (inputEl) {
      inputEl.classList.add('active');
      inputEl.focus();
    }
    activeInput = inputEl;
  }

  // 패드 표시/숨김
  function showPad(side) {
    clearTimeout(padTimer[side]);
    pads[side].classList.add('visible');
    padVisible[side] = true;
  }

  function hidePad(side) {
    padTimer[side] = setTimeout(() => {
      pads[side].classList.remove('visible');
      padVisible[side] = false;
    }, 200);
  }

  // 입력칸 클릭 → 패드 표시
  ['num-left', 'den-left'].forEach(id => {
    inputs[id].addEventListener('click', () => {
      setActive(inputs[id]);
      showPad('left');
    });
  });
  ['num-right', 'den-right'].forEach(id => {
    inputs[id].addEventListener('click', () => {
      setActive(inputs[id]);
      showPad('right');
    });
  });

  // hover로 패드 표시 (마우스가 가까이 오면)
  ['left', 'right'].forEach(side => {
    wrappers[side].addEventListener('mouseenter', () => showPad(side));
    wrappers[side].addEventListener('mouseleave', () => hidePad(side));
    pads[side].addEventListener('mouseenter', () => {
      clearTimeout(padTimer[side]);
      padVisible[side] = true;
    });
    pads[side].addEventListener('mouseleave', () => hidePad(side));
  });

  // 패드 버튼 클릭
  document.querySelectorAll('.numpad-btn').forEach(btn => {
    btn.addEventListener('mousedown', e => {
      e.preventDefault(); // 포커스 이탈 방지

      const val = btn.dataset.val;
      const pad = btn.closest('.numpad');
      const side = pad.id === 'pad-left' ? 'left' : 'right';

      // 활성 입력칸이 없으면 해당 side 분자칸 자동 선택
      if (!activeInput || !activeInput.id.includes(side)) {
        setActive(inputs[`num-${side}`]);
      }

      if (!activeInput) return;

      if (val === 'del') {
        activeInput.value = activeInput.value.slice(0, -1);
      } else {
        if (activeInput.value.length < 2) {
          activeInput.value += val;
        }
      }

      updateCompare();
    });
  });

  // 키보드 입력
  document.addEventListener('keydown', e => {
    if (!activeInput) return;

    if (e.key >= '0' && e.key <= '9') {
      if (activeInput.value.length < 2) {
        activeInput.value += e.key;
        updateCompare();
      }
    } else if (e.key === 'Backspace') {
      activeInput.value = activeInput.value.slice(0, -1);
      updateCompare();
    } else if (e.key === 'Tab' || e.key === 'Enter' || e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      e.preventDefault();
      const order = ['num-left', 'den-left', 'num-right', 'den-right'];
      const idx = order.indexOf(activeInput.id);
      if (idx < order.length - 1) setActive(inputs[order[idx + 1]]);
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      const order = ['num-left', 'den-left', 'num-right', 'den-right'];
      const idx = order.indexOf(activeInput.id);
      if (idx > 0) setActive(inputs[order[idx - 1]]);
    }
  });

  // 비교 기호 업데이트
  function updateCompare() {
    const nl = parseInt(inputs['num-left'].value) || null;
    const dl = parseInt(inputs['den-left'].value) || null;
    const nr = parseInt(inputs['num-right'].value) || null;
    const dr = parseInt(inputs['den-right'].value) || null;

    const sym = document.getElementById('compare-symbol');

    if (nl && dl && nr && dr && dl !== 0 && dr !== 0) {
      const left  = nl / dl;
      const right = nr / dr;
      if (left > right)       { sym.textContent = '>'; sym.style.color = '#e06020'; }
      else if (left < right)  { sym.textContent = '<'; sym.style.color = '#4090e0'; }
      else                    { sym.textContent = '='; sym.style.color = '#40a060'; }
    } else {
      sym.textContent = '?';
      sym.style.color = '#ccc';
    }
  }

  // 외부 클릭 시 포커스 해제
  document.addEventListener('click', e => {
    const clickedInput = Object.values(inputs).some(el => el === e.target);
    const clickedPad   = e.target.closest('.numpad');
    if (!clickedInput && !clickedPad) {
      setActive(null);
    }
  });
</script>
</body>
</html>
