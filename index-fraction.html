<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>분수 학습</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nanum Gothic', 'Apple SD Gothic Neo', sans-serif;
  background: #f0f0f0; min-height: 100vh;
  display: flex; flex-direction: column;
}

/* ── 헤더 ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; background: white;
  border-bottom: 1px solid #e0e0e0; position: relative; z-index: 300;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.header h1 { font-size: 18px; font-weight: 700; color: #222; }

.count-selector { position: relative; }
.count-btn {
  width: 30px; height: 30px; border-radius: 50%;
  background: #e06020; color: white; font-size: 15px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: none; user-select: none;
}
.count-btn:hover { background: #c04010; }
.count-dropdown {
  position: absolute; top: calc(100% + 6px); left: 50%;
  transform: translateX(-50%);
  background: white; border: 1.5px solid #ddd;
  border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.15);
  overflow: hidden; display: none; z-index: 400; min-width: 60px;
}
.count-dropdown.open { display: block; }
.count-option {
  padding: 9px 20px; font-size: 15px; font-weight: 700;
  text-align: center; cursor: pointer; color: #444; transition: background .15s;
}
.count-option:hover { background: #fff0e8; color: #e06020; }
.count-option.active { color: #e06020; background: #fff5f0; }

.header-btns { display: flex; align-items: center; gap: 8px; }
.hbtn {
  padding: 5px 14px; border-radius: 20px; border: none;
  cursor: pointer; font-size: 12px; font-weight: 700; color: white;
}
.hbtn-sound { background: #4caf50; border-radius: 50%; width: 32px; height: 32px; padding: 0; font-size: 16px; }
.hbtn-help  { background: #4caf50; }
.hbtn-link  { background: #f06090; }
.hbtn-qr    { background: #5090d0; }

/* ── 뷰 탭 ── */
.view-tabs {
  display: flex; padding: 0 20px; background: white;
  border-bottom: 2px solid #e8e8e8; gap: 4px;
}
.vtab {
  padding: 9px 22px; font-size: 13px; font-weight: 700;
  color: #aaa; cursor: pointer; border-bottom: 3px solid transparent;
  transition: color .2s, border-color .2s; user-select: none;
}
.vtab.active { color: #e06020; border-bottom-color: #e06020; }

/* ── 메인 ── */
.main-wrap {
  flex: 1; display: flex; align-items: stretch;
  padding: 16px; gap: 8px; overflow: visible;
}

.frac-panel {
  flex: 1; min-width: 0; background: white;
  border: 2px dashed #c0c0c0; border-radius: 14px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px 10px 18px; position: relative; min-height: 300px;
}

/* 가운데 비교 열 */
.cmp-col {
  width: 200px; flex-shrink: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; overflow: visible; position: relative;
}

.cmp-viz-wrap {
  width: 90px; height: 90px;
  border: 2.5px solid #f0a060; border-radius: 50%; background: white;
  overflow: visible;
  transition: width .45s ease, height .45s ease, border-radius .45s ease;
  position: relative; z-index: 10; flex-shrink: 0;
}
.cmp-viz-wrap svg { width: 100%; height: 100%; }

.cmp-symbol {
  font-size: 20px; font-weight: 900;
  text-align: center; min-width: 50px; display: none;
  color: #555;
}

/* 퀴즈 드롭다운 */
.quiz-row { display: flex; align-items: center; justify-content: center; }
.quiz-dropdown { position: relative; }
.quiz-trigger {
  width: 60px; height: 60px; border-radius: 50%;
  background: white; border: 2.5px solid #ddd;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 900; color: #ccc;
  user-select: none; cursor: not-allowed;
  transition: border-color .2s, color .2s, box-shadow .2s;
}
.quiz-trigger.active {
  border-color: #f0a060; color: #e06020; cursor: pointer;
}
.quiz-trigger.active:hover { box-shadow: 0 0 0 3px rgba(224,96,32,.18); }
.quiz-options {
  position: absolute; top: calc(100% + 8px); left: 50%;
  transform: translateX(-50%);
  background: white; border: 1.5px solid #e0d0c0;
  border-radius: 14px; box-shadow: 0 6px 20px rgba(0,0,0,.13);
  display: none; z-index: 300; overflow: hidden; min-width: 70px;
}
.quiz-options.open { display: block; }
.quiz-option {
  padding: 11px 22px; font-size: 24px; font-weight: 900;
  color: #444; cursor: pointer; text-align: center;
  transition: background .12s;
}
.quiz-option:hover { background: #fff5f0; color: #e06020; }

/* O/X 피드백 오버레이 */
.quiz-feedback-overlay {
  position: fixed; inset: 0; z-index: 900;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; opacity: 0;
  transition: opacity .25s;
  background: rgba(255,255,255,0.55);
}
.quiz-feedback-overlay .feedback-mark {
  font-size: 220px; font-weight: 900; line-height: 1;
  filter: drop-shadow(0 8px 24px rgba(0,0,0,.18));
}
.quiz-feedback-overlay.show { opacity: 1; }

.btn-compare {
  padding: 10px 28px; background: white;
  border: 2.5px solid #f0a060; border-radius: 24px;
  font-size: 15px; font-weight: 700; color: #e06020; cursor: pointer;
  transition: background .2s, color .2s; white-space: nowrap;
}
.btn-compare:hover { background: #f0a060; color: white; }

/* 시각화 래퍼 */
.viz-wrap {
  display: flex; gap: 6px;
  align-items: center; justify-content: center;
  flex-wrap: nowrap;
}

/* 분수 입력 */
.frac-area {
  position: relative; display: flex;
  flex-direction: column; align-items: center; margin-top: 14px;
}
.frac-cell {
  width: 60px; height: 52px;
  border: 2.5px solid #f0a060; border-radius: 10px;
  background: #fff9f5; font-size: 26px; font-weight: 700;
  text-align: center; color: #333; outline: none; cursor: pointer;
  caret-color: transparent; user-select: none;
  transition: border-color .2s, box-shadow .2s;
  display: flex; align-items: center; justify-content: center;
}
.frac-cell.active {
  border-color: #e06020; box-shadow: 0 0 0 3px rgba(224,96,32,.18);
}
.frac-line { width: 76px; height: 2.5px; background: #555; margin: 4px 0; border-radius: 2px; }

/* 숫자패드 */
.numpad {
  position: absolute; background: white;
  border: 1.5px solid #ddd; border-radius: 14px; padding: 8px;
  box-shadow: 0 8px 28px rgba(0,0,0,.15);
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 5px; z-index: 250;
  opacity: 0; pointer-events: none;
  transition: opacity .18s, transform .18s;
  transform: translateY(6px); top: 0;
}
.numpad.visible { opacity: 1; pointer-events: all; transform: translateY(0); }
.numpad.pad-right { left: calc(100% + 10px); }
.numpad.pad-left  { right: calc(100% + 10px); }

.np-btn {
  width: 40px; height: 38px;
  border: 1.5px solid #ddd; border-radius: 8px;
  background: #f9f9f9; font-size: 16px; font-weight: 600;
  color: #333; cursor: pointer; transition: background .1s;
  display: flex; align-items: center; justify-content: center;
}
.np-btn:hover { background: #f0e8ff; border-color: #b090e0; }
.np-btn:active { background: #e0d0ff; }
.np-btn.del {
  font-size: 16px;
  background: #fff0f0; border-color: #f0b0b0; color: #c04040;
  white-space: nowrap; overflow: hidden;
  padding: 0 4px; letter-spacing: -0.3px;
}
.np-btn.del:hover { background: #ffe0e0; }

/* ── 푸터 ── */
.footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 28px; background: white; border-top: 1px solid #e8e8e8;
}
.btn-reset {
  width: 38px; height: 38px; border-radius: 50%;
  background: #f0a060; border: none; cursor: pointer;
  font-size: 18px; color: white;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
.btn-reset:hover { background: #e08040; }
.btn-quiz {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 18px; background: #f5f5f5; border: none;
  border-radius: 24px; font-size: 14px; font-weight: 700;
  color: #444; cursor: pointer; transition: background .2s;
}
.btn-quiz:hover { background: #e8e8e8; }
.btn-quiz-arrow {
  width: 30px; height: 30px; border-radius: 50%;
  background: #e06020; color: white; border: none;
  font-size: 15px; cursor: pointer; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}

.ghost-el {
  position: fixed; pointer-events: none; z-index: 500; opacity: .7;
  transition: left .5s ease, top .5s ease, width .5s ease, height .5s ease, opacity .5s ease;
}

/* Top-level tabs */
.top-tabs {
  display: flex; gap: 0; align-items: flex-end;
}
.top-tab {
  padding: 6px 20px; font-size: 14px; font-weight: 700;
  color: #999; cursor: pointer; border-bottom: 3px solid transparent;
  transition: color .2s, border-color .2s; white-space: nowrap; user-select: none;
}
.top-tab.active { color: #e06020; border-bottom-color: #e06020; }

/* Concept tab layout */
#page-concept {
  flex: 1; display: none; flex-direction: column;
  background: #f5f0e8; position: relative;
}
.concept-mode-btn {
  position: absolute; top: 14px; left: 18px; z-index: 10;
  padding: 7px 18px; border-radius: 20px; border: 2px solid #e06020;
  background: white; color: #e06020; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: background .2s, color .2s;
  display: flex; align-items: center; gap: 6px;
}
.concept-mode-btn:hover { background: #e06020; color: white; }
.concept-body {
  flex: 1; display: flex; align-items: center; justify-content: center;
  gap: 160px; padding: 24px 40px; overflow: visible;
}
.concept-left {
  display: flex; flex-direction: column; align-items: center; gap: 24px;
  flex-shrink: 0;
}
.pizza-wrap {
  width: 420px; height: 420px;
  display: flex; align-items: center; justify-content: center;
  overflow: visible;
}
.pizza-wrap svg { overflow: visible; }
/* 막대 모드 */
.bar-wrap {
  width: 480px; display: flex; flex-direction: column; align-items: center;
  gap: 0;
}
.bar-track {
  width: 100%; height: 90px; display: flex; border-radius: 12px; overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,.12);
}
.bar-seg {
  flex: 1; border-right: 2px solid rgba(255,255,255,0.6);
  background: #7ecef4; transition: background .3s;
}
.bar-seg:last-child { border-right: none; }
.bar-seg.bar-highlight {
  background: #f4a13e;
  animation: barSparkle 0.9s ease-in-out infinite;
}
@keyframes barSparkle {
  0%,100% { opacity: 1; filter: brightness(1); }
  40%      { opacity: 0.4; filter: brightness(1.3); }
}
.concept-input-row {
  display: flex; align-items: center; gap: 12px;
}
/* 숫자 spinner 화살표 제거 */
.concept-input::-webkit-inner-spin-button,
.concept-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.concept-input[type=number] { -moz-appearance: textfield; }
.concept-input {
  width: 70px; height: 70px; border: 2.5px solid #f0a060;
  border-radius: 12px; font-size: 32px; font-weight: 700;
  text-align: center; color: #333; outline: none;
  background: #fff9f5;
}
.concept-input:focus { border-color: #e06020; box-shadow: 0 0 0 3px rgba(224,96,32,.18); }
.concept-명 {
  font-size: 24px; font-weight: 700; color: #333;
}
.concept-right {
  display: flex; align-items: center; justify-content: center;
  min-width: 220px;
}
#concept-frac-display {
  display: flex; flex-direction: column; align-items: center;
  min-height: 220px; justify-content: center;
}
.cfd-num, .cfd-den {
  font-size: 110px; font-weight: 900; color: #e06020; line-height: 1;
}
.cfd-line {
  width: 180px; height: 7px; background: #e06020; border-radius: 4px; margin: 10px 0;
}
/* 분수 등장 애니메이션 */
@keyframes fracAppear {
  from { opacity: 0; transform: scale(0.7) translateY(20px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.cfd-animate { animation: fracAppear 0.5s cubic-bezier(.34,1.56,.64,1) both; }
.cfd-box {
  width: 200px; height: 230px;
  border: 4px dashed #f0a060; border-radius: 16px;
  background: #fff9f5; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, border-color 0.2s;
}
.cfd-box:hover { background: #ffe8d6; border-color: #e06020; }

/* 하이라이트 슬라이스 반짝임 */
@keyframes sparkle {
  0%,100% { opacity: 1; }
  40%      { opacity: 0.25; }
}
.pizza-sparkle { animation: sparkle 0.9s ease-in-out infinite; }

.concept-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 28px; background: white; border-top: 1px solid #e8e8e8;
}
.btn-confirm {
  padding: 10px 32px; background: #e06020; border: none;
  border-radius: 24px; font-size: 15px; font-weight: 700;
  color: white; cursor: pointer; transition: background .2s;
}
.btn-confirm:hover { background: #c04010; }

/* page-compare uses existing flex layout */
#page-compare { flex: 1; display: flex; flex-direction: column; }

/* ── 로그인 화면 ── */
#login-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(135deg, #fff5ee 0%, #ffe0c8 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 32px;
}
.login-title {
  font-size: 28px; font-weight: 900; color: #e06020;
  letter-spacing: -0.5px;
}
.login-subtitle {
  font-size: 14px; color: #888; margin-top: -20px;
}
.login-role-row {
  display: flex; gap: 20px;
}
.login-role-btn {
  width: 140px; height: 140px; border-radius: 20px; border: 3px solid #f0a060;
  background: white; cursor: pointer; font-size: 15px; font-weight: 700;
  color: #444; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  transition: all .2s; box-shadow: 0 4px 16px rgba(224,96,32,.1);
}
.login-role-btn:hover { border-color: #e06020; background: #fff5f0; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(224,96,32,.2); }
.login-role-btn .role-icon { font-size: 42px; }
.login-pw-box {
  display: none; flex-direction: column; align-items: center; gap: 14px;
  background: white; padding: 28px 36px; border-radius: 20px;
  box-shadow: 0 4px 24px rgba(0,0,0,.1);
}
.login-pw-box.show { display: flex; }
.login-pw-title { font-size: 15px; font-weight: 700; color: #555; }
.login-pw-input {
  width: 180px; height: 50px; border: 2px solid #f0a060; border-radius: 12px;
  font-size: 22px; text-align: center; outline: none; letter-spacing: 6px;
  color: #333;
}
.login-pw-input:focus { border-color: #e06020; box-shadow: 0 0 0 3px rgba(224,96,32,.15); }
.login-pw-save-row {
  display: flex; align-items: center; gap: 8px; font-size: 13px; color: #888; cursor: pointer;
}
.login-pw-save-row input { cursor: pointer; accent-color: #e06020; }
.login-submit-btn {
  width: 180px; height: 44px; background: #e06020; border: none;
  border-radius: 22px; color: white; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: background .2s;
}
.login-submit-btn:hover { background: #c04010; }
.login-back-btn {
  background: none; border: none; color: #aaa; font-size: 13px;
  cursor: pointer; text-decoration: underline;
}
.login-student-box {
  display: none; flex-direction: column; align-items: center; gap: 14px;
  background: white; padding: 28px 36px; border-radius: 20px;
  box-shadow: 0 4px 24px rgba(0,0,0,.1);
}
.login-student-box.show { display: flex; }
.login-field-label { font-size: 13px; font-weight: 700; color: #888; align-self: flex-start; }
.login-text-input {
  width: 220px; height: 48px; border: 2px solid #f0a060; border-radius: 12px;
  font-size: 17px; text-align: center; outline: none; color: #333;
}
.login-text-input:focus { border-color: #e06020; box-shadow: 0 0 0 3px rgba(224,96,32,.15); }
.login-error { font-size: 13px; color: #e05050; display: none; }
.login-error.show { display: block; }

/* ── 분수 게임 탭 ── */
#page-game { flex: 1; display: none; flex-direction: column; }

/* 교사용 레이아웃 */
#game-teacher-view { flex: 1; display: flex; flex-direction: column; }

/* 상단 방코드 바 (세로 1/10) */
.game-topbar {
  flex: 1; background: #1a1a2e; display: flex;
  align-items: center; justify-content: center;
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.game-room-code-label {
  font-size: 15px; font-weight: 700; color: rgba(255,255,255,.6);
  letter-spacing: 1px; display: flex; align-items: center; gap: 14px;
}
.game-room-code-label span {
  color: #ffd580; letter-spacing: 8px; font-size: 26px; font-weight: 900;
}

/* 하단 9:1 분할 영역 (세로 9/10) */
.game-main-row { flex: 9; display: flex; flex-direction: row; }

/* 분수 입력 영역 (9/10 가로) */
.game-frac-area {
  flex: 9; background: #f5f0e8;
  display: flex; align-items: center; justify-content: center;
}

/* 분수 입력 박스 (이미지처럼) */
.game-frac-widget {
  display: flex; flex-direction: column; align-items: center; gap: 0;
}
.game-frac-cell {
  width: 180px; height: 160px;
  border: 3px solid #f0a060; border-radius: 20px;
  background: #fff5ee;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.game-frac-cell input {
  width: 100%; height: 100%;
  background: transparent; border: none; outline: none;
  font-size: 96px; font-weight: 900;
  text-align: center; line-height: 1;
  color: #fff5ee;           /* 입력 전 배경과 동일 → 보이지 않음 */
  caret-color: #aaa;
  border-radius: 18px;
}
.game-frac-cell input::placeholder { color: #c8a88a; font-weight: 700; font-size: 72px; }
.game-frac-divider {
  width: 200px; height: 5px; background: #f0a060; border-radius: 3px;
  margin: 6px 0;
}

/* 학생 목록 패널 (1/10 가로) */
.game-roster {
  flex: 1; min-width: 110px;
  background: #12122a;
  border-left: 1px solid rgba(255,255,255,.08);
  display: flex; flex-direction: column;
}
.roster-title {
  font-size: 13px; font-weight: 700; color: rgba(255,255,255,.5);
  padding: 14px 12px 10px; border-bottom: 1px solid rgba(255,255,255,.07);
  letter-spacing: 1px; text-align: center;
}
.roster-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.roster-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; font-size: 12px; font-weight: 700; color: #e8e8f0;
  border-bottom: 1px solid rgba(255,255,255,.04);
  animation: rosterIn .3s ease;
}
@keyframes rosterIn {
  from { opacity: 0; transform: translateX(10px); }
  to   { opacity: 1; transform: translateX(0); }
}
.roster-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #4cff8a; flex-shrink: 0;
}
.roster-empty {
  font-size: 11px; color: rgba(255,255,255,.25); text-align: center;
  padding: 20px 8px; line-height: 1.6;
}

/* 학생 게임 화면 */
.student-game-wrap {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #1a1a2e; gap: 24px;
}
.student-waiting {
  font-size: 18px; font-weight: 700; color: rgba(255,255,255,.5);
}
.student-room-info {
  font-size: 13px; color: rgba(255,255,255,.3);
}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <div class="login-title">분수 학습</div>
  <div class="login-subtitle">역할을 선택해 주세요</div>
  <div class="login-role-row" id="login-role-row">
    <button class="login-role-btn" id="btn-teacher-role">
      <span class="role-icon">👩‍🏫</span>교사용
    </button>
    <button class="login-role-btn" id="btn-student-role">
      <span class="role-icon">🎒</span>학생용
    </button>
  </div>

  <!-- 교사 비밀번호 박스 -->
  <div class="login-pw-box" id="login-pw-box">

<script>
function buildPizzaSVG(n, split) {
  const S = 420, cx = 210, cy = 210, R = 195;
  const sauceR = R - 22, cheeseR = sauceR - 7;

  // 토핑 데이터 (pepperoni, herbs, cheese dots, corn)
  const pepps = [
    {x:270,y:115},{x:148,y:108},{x:305,y:210},{x:112,y:215},
    {x:250,y:305},{x:155,y:315},{x:298,y:148},{x:120,y:155},
    {x:210,y:130},{x:285,y:265},{x:132,y:270},{x:195,y:310},
  ];
  const herbs = [
    {x:240,y:158},{x:175,y:148},{x:300,y:188},{x:118,y:192},
    {x:228,y:270},{x:168,y:278},{x:260,y:120},{x:148,y:330},
    {x:305,y:245},{x:195,y:350},{x:320,y:175},{x:105,y:240},
  ];
  const dots = [
    {x:210,y:175},{x:250,y:155},{x:168,y:190},{x:290,y:225},
    {x:160,y:235},{x:230,y:248},{x:280,y:175},{x:142,y:175},
    {x:210,y:290},{x:270,y:295},{x:150,y:290},{x:195,y:220},
  ];
  const corn = [
    {x:230,y:200},{x:190,y:198},{x:258,y:232},{x:165,y:258},
    {x:250,y:280},{x:178,y:185},{x:215,y:248},
  ];

  function pizzaLayers(clip) {
    const cp = clip ? `clip-path="url(#${clip})"` : '';
    let t = `<g ${cp}>`;
    // 크러스트 (외곽 링 - 두 레이어로 질감)
    t += `<circle cx="${cx}" cy="${cy}" r="${R}" fill="#c8913a"/>`;
    t += `<circle cx="${cx}" cy="${cy}" r="${R-3}" fill="#e8b860"/>`;
    // 소스
    t += `<circle cx="${cx}" cy="${cy}" r="${sauceR}" fill="#bb2e0a"/>`;
    // 치즈
    t += `<circle cx="${cx}" cy="${cy}" r="${cheeseR}" fill="#f5b020"/>`;
    // 치즈 얼룩
    [{x:230,y:185,rx:22,ry:18},{x:178,y:230,rx:18,ry:14},{x:255,y:255,rx:16,ry:12},{x:162,y:172,rx:14,ry:11}].forEach(b=>{
      t += `<ellipse cx="${b.x}" cy="${b.y}" rx="${b.rx}" ry="${b.ry}" fill="#fcc840" opacity="0.55"/>`;
    });
    // 페퍼로니
    pepps.forEach(p => {
      t += `<ellipse cx="${p.x}" cy="${p.y}" rx="16" ry="15" fill="#9a1205"/>`;
      t += `<ellipse cx="${p.x}" cy="${p.y}" rx="13" ry="12" fill="#c01808"/>`;
      t += `<ellipse cx="${p.x-3}" cy="${p.y-3}" rx="6" ry="5" fill="#d83020" opacity="0.55"/>`;
      // 페퍼로니 하이라이트
      t += `<ellipse cx="${p.x-4}" cy="${p.y-4}" rx="3" ry="2" fill="rgba(255,200,180,0.4)"/>`;
    });
    // 허브 (바질)
    herbs.forEach(h => {
      const rot = (h.x * 11 + h.y * 7) % 80 - 40;
      t += `<ellipse cx="${h.x}" cy="${h.y}" rx="7" ry="4" fill="#2d7018" transform="rotate(${rot} ${h.x} ${h.y})"/>`;
      t += `<ellipse cx="${h.x}" cy="${h.y}" rx="5" ry="2.5" fill="#4a9828" opacity="0.7" transform="rotate(${rot} ${h.x} ${h.y})"/>`;
    });
    // 옥수수
    corn.forEach(c => {
      t += `<circle cx="${c.x}" cy="${c.y}" r="5" fill="#f0d020"/>`;
      t += `<circle cx="${c.x}" cy="${c.y}" r="3" fill="#f8e060"/>`;
    });
    // 치즈 기포
    dots.forEach(d => {
      t += `<circle cx="${d.x}" cy="${d.y}" r="6" fill="rgba(255,255,240,0.6)"/>`;
    });
    t += `</g>`;
    return t;
  }

  // 크러스트 외곽선 (테두리 질감)
  function crustBorder() {
    let b = '';
    for (let i=0; i<36; i++) {
      const a = i/36 * 2*Math.PI;
      const r1 = R - 2, r2 = R + 1;
      const bx = cx + r1*Math.cos(a), by = cy + r1*Math.sin(a);
      b += `<circle cx="${bx.toFixed(1)}" cy="${by.toFixed(1)}" r="3.5" fill="#b07830" opacity="0.4"/>`;
    }
    return b;
  }

  if (!split || n < 2) {
    return `<svg viewBox="0 0 ${S} ${S}" width="${S}" height="${S}" style="overflow:visible">
      ${pizzaLayers('')}
      ${crustBorder()}
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#7a4008" stroke-width="3.5"/>
    </svg>`;
  }

  let defs = '<defs>';
  let slices = '';

  for (let i = 0; i < n; i++) {
    const a0 = (i/n)*2*Math.PI - Math.PI/2;
    const a1 = ((i+1)/n)*2*Math.PI - Math.PI/2;
    const x0 = cx + R*Math.cos(a0), y0 = cy + R*Math.sin(a0);
    const x1 = cx + R*Math.cos(a1), y1 = cy + R*Math.sin(a1);
    const lg = (1/n > 0.5) ? 1 : 0;
    const sectorD = n === 1
      ? `M ${cx} ${cy} m -${R} 0 a ${R} ${R} 0 1 1 ${R*2} 0 a ${R} ${R} 0 1 1 -${R*2} 0 Z`
      : `M ${cx} ${cy} L ${x0.toFixed(2)} ${y0.toFixed(2)} A ${R} ${R} 0 ${lg} 1 ${x1.toFixed(2)} ${y1.toFixed(2)} Z`;

    defs += `<clipPath id="cp-${i}"><path d="${sectorD}"/></clipPath>`;

    const midA = (a0 + a1) / 2;
    const offset = 22;
    const dx = (Math.cos(midA) * offset).toFixed(1);
    const dy = (Math.sin(midA) * offset).toFixed(1);

    const isHighlight = (i === 0);
    slices += `<g style="transform:translate(${dx}px,${dy}px);transition:transform 0.55s cubic-bezier(.34,1.56,.64,1)">`;
    slices += pizzaLayers(`cp-${i}`);
    // 크러스트 테두리
    slices += `<path d="${sectorD}" fill="none" stroke="#7a4008" stroke-width="3"/>`;
    // 하이라이트 슬라이스: 반짝이는 황금 오버레이
    if (isHighlight) {
      slices += `<path class="pizza-sparkle" d="${sectorD}" fill="rgba(255,230,50,0.45)" stroke="none"/>`;
      // 테두리 강조선
      slices += `<path d="${sectorD}" fill="none" stroke="#ffcc00" stroke-width="3" opacity="0.8"/>`;
    }
    slices += `</g>`;
  }

  defs += '</defs>';
  return `<svg viewBox="0 0 ${S} ${S}" width="${S}" height="${S}" style="overflow:visible">${defs}${slices}</svg>`;
}

const COLORS = ['#e05050','#3aaa30','#3070e0','#9040d0','#e09020'];

const state = {
  count: 2,
  fractions: Array.from({length:5}, () => ({num:'', den:''})),
  active: null,
  viewMode: 'circle',
  compared: false,
  correctSym: null,
  quizAnswered: false,
};

// ── SVG 기본 ─────────────────────────────────────────────
// transparentEmpty=true: 빈 슬라이스를 투명으로 처리 (비교 오버레이용)
function makePieSVG(num, den, color, size, alpha, transparentEmpty) {
  alpha = (alpha === undefined) ? 1 : alpha;
  const cx = size/2, cy = size/2, r = size/2 - 4;
  if (!den || den < 1) {
    return `<svg viewBox="0 0 ${size} ${size}" opacity="${alpha}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="white" stroke="#ccc" stroke-width="1.5"/></svg>`;
  }
  const n = Math.min(Math.max(0, num||0), den);
  let p = '';
  for (let i = 0; i < den; i++) {
    const a0 = (i/den)*2*Math.PI - Math.PI/2;
    const a1 = ((i+1)/den)*2*Math.PI - Math.PI/2;
    const x0 = cx + r*Math.cos(a0), y0 = cy + r*Math.sin(a0);
    const x1 = cx + r*Math.cos(a1), y1 = cy + r*Math.sin(a1);
    const lg = (a1-a0 > Math.PI) ? 1 : 0;
    const d = den===1
      ? `M ${cx} ${cy} m -${r} 0 a ${r} ${r} 0 1 1 ${r*2} 0 a ${r} ${r} 0 1 1 -${r*2} 0 Z`
      : `M ${cx} ${cy} L ${x0} ${y0} A ${r} ${r} 0 ${lg} 1 ${x1} ${y1} Z`;
    const emptyFill = transparentEmpty ? 'none' : 'white';
    p += `<path d="${d}" fill="${i<n ? color : emptyFill}" stroke="#555" stroke-width="1" stroke-dasharray="4 2"/>`;
  }
  p += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#333" stroke-width="2"/>`;
  return `<svg viewBox="0 0 ${size} ${size}" opacity="${alpha}">${p}</svg>`;
}

function makeBarSVG(num, den, color, w, h) {
  if (!den || den < 1) {
    return `<svg viewBox="0 0 ${w} ${h}"><rect x="2" y="2" width="${w-4}" height="${h-4}" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1.5"/></svg>`;
  }
  const n = Math.min(Math.max(0, num||0), den);
  const sw = (w-4)/den; let r = '';
  for (let i = 0; i < den; i++) {
    r += `<rect x="${2+i*sw}" y="2" width="${sw-1}" height="${h-4}" rx="3" fill="${i<n ? color : '#f0f0f0'}" stroke="#bbb" stroke-width="0.5"/>`;
  }
  r += `<rect x="2" y="2" width="${w-4}" height="${h-4}" rx="6" fill="none" stroke="#666" stroke-width="2"/>`;
  return `<svg viewBox="0 0 ${w} ${h}">${r}</svg>`;
}

// ── 가분수 처리: 원/막대를 여러 개로 분리 ─────────────────
function renderFracViz(vizEl, num, den, color, sz) {
  vizEl.innerHTML = '';
  vizEl.style.display = 'flex';
  vizEl.style.gap = '6px';
  vizEl.style.alignItems = 'center';
  vizEl.style.justifyContent = 'center';
  vizEl.style.flexWrap = 'nowrap';

  const n = parseInt(num)||0, d = parseInt(den)||0;
  const barH = Math.round(sz * 0.44);

  if (!d) {
    // 분모 없음: 빈 원/막대 하나
    const div = document.createElement('div');
    div.style.cssText = `width:${sz}px;height:${state.viewMode==='circle'?sz:barH}px;flex-shrink:0;`;
    div.innerHTML = state.viewMode==='circle' ? makePieSVG(0,0,color,sz) : makeBarSVG(0,0,color,sz,barH);
    vizEl.appendChild(div);
    return;
  }

  if (n <= d) {
    // 진분수 또는 1: 원/막대 하나
    const div = document.createElement('div');
    div.style.cssText = `width:${sz}px;height:${state.viewMode==='circle'?sz:barH}px;flex-shrink:0;`;
    div.innerHTML = state.viewMode==='circle' ? makePieSVG(n,d,color,sz) : makeBarSVG(n,d,color,sz,barH);
    vizEl.appendChild(div);
  } else {
    // 가분수: 온원 여러 개 + 나머지 원
    const whole = Math.floor(n/d);
    const rem   = n % d;
    const total = whole + (rem > 0 ? 1 : 0);
    // 공간에 맞게 크기 축소
    const smallSz = Math.max(Math.floor((sz * 2.2) / total - 6), 50);
    const smallBarH = Math.round(smallSz * 0.44);

    for (let i = 0; i < whole; i++) {
      const div = document.createElement('div');
      div.style.cssText = `width:${smallSz}px;height:${state.viewMode==='circle'?smallSz:smallBarH}px;flex-shrink:0;`;
      div.innerHTML = state.viewMode==='circle'
        ? makePieSVG(d,d,color,smallSz)
        : makeBarSVG(d,d,color,smallSz,smallBarH);
      vizEl.appendChild(div);
    }
    if (rem > 0) {
      const div = document.createElement('div');
      div.style.cssText = `width:${smallSz}px;height:${state.viewMode==='circle'?smallSz:smallBarH}px;flex-shrink:0;`;
      div.innerHTML = state.viewMode==='circle'
        ? makePieSVG(rem,d,color,smallSz)
        : makeBarSVG(rem,d,color,smallSz,smallBarH);
      vizEl.appendChild(div);
    }
  }
}

// ── 레이어드 파이 SVG: overlapDeg 각도 기준으로 sector 분리 ───
// 0~overlapDeg: 반투명(이전 분수와 겹침), overlapDeg~valueDeg: 원색(새 영역)
// 슬라이스 단위가 아닌 연속 sector 방식이라 분모 크기와 무관하게 정확함
function makeLayeredPieSVG(num, den, color, size, overlapDeg) {
  const cx = size/2, cy = size/2, r = size/2 - 4;
  if (!den || den < 1) {
    return `<svg viewBox="0 0 ${size} ${size}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="white" stroke="#ccc" stroke-width="1.5"/></svg>`;
  }
  const n = Math.min(Math.max(0, num||0), den);
  const valueDeg = (n / den) * 360;

  // sector(startDeg, endDeg, fillOpacity): 부채꼴 경로 생성
  function sector(sd, ed, fo) {
    if (ed - sd < 0.01) return '';
    const full = ed - sd >= 359.99;
    const a0 = (sd - 90) * Math.PI/180, a1 = (ed - 90) * Math.PI/180;
    const x0=cx+r*Math.cos(a0), y0=cy+r*Math.sin(a0);
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const lg = ed - sd > 180 ? 1 : 0;
    const d = full
      ? `M ${cx} ${cy} m -${r} 0 a ${r} ${r} 0 1 1 ${r*2} 0 a ${r} ${r} 0 1 1 -${r*2} 0 Z`
      : `M ${cx} ${cy} L ${x0} ${y0} A ${r} ${r} 0 ${lg} 1 ${x1} ${y1} Z`;
    return `<path d="${d}" fill="${color}" fill-opacity="${fo}"/>`;
  }

  let p = '';
  // 겹치는 영역 (반투명)
  const overlapEnd = Math.min(overlapDeg, valueDeg);
  if (overlapEnd > 0.01) p += sector(0, overlapEnd, 0.52);
  // 새 영역 (원색)
  if (valueDeg > overlapDeg + 0.01) p += sector(overlapDeg, valueDeg, 1.0);

  // 분모 구분선 (슬라이스 경계)
  for (let i = 0; i < den; i++) {
    const a = ((i / den) * 360 - 90) * Math.PI / 180;
    const x = cx + r*Math.cos(a), y = cy + r*Math.sin(a);
    p += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#555" stroke-width="1" stroke-dasharray="4 2"/>`;
  }
  p += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#333" stroke-width="2"/>`;
  return `<svg viewBox="0 0 ${size} ${size}">${p}</svg>`;
}

// ── 드래그 헬퍼 ─────────────────────────────────────────
function attachDrag(el) {
  let dragging = false, sx = 0, sy = 0;
  function onStart(cx, cy) { dragging=true; sx=cx; sy=cy; el.style.transition='none'; el.style.cursor='grabbing'; }
  function onMove(cx, cy) { if(!dragging) return; el.style.transform=`translate(${cx-sx}px,${cy-sy}px)`; }
  function onEnd() { if(!dragging) return; dragging=false; el.style.cursor='grab'; el.style.transition='transform 0.45s cubic-bezier(.34,1.56,.64,1)'; el.style.transform='translate(0,0)'; }
  el.addEventListener('mousedown', e => { e.preventDefault(); onStart(e.clientX, e.clientY); });
  el.addEventListener('touchstart', e => { e.preventDefault(); onStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
  const mmH = e => onMove(e.clientX, e.clientY);
  const muH = () => onEnd();
  const tmH = e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); };
  const tuH = () => onEnd();
  document.addEventListener('mousemove', mmH);
  document.addEventListener('mouseup', muH);
  document.addEventListener('touchmove', tmH, {passive:false});
  document.addEventListener('touchend', tuH);
  el._cleanup = () => {
    document.removeEventListener('mousemove', mmH);
    document.removeEventListener('mouseup', muH);
    document.removeEventListener('touchmove', tmH);
    document.removeEventListener('touchend', tuH);
  };
}

// ── 비교 뷰 렌더링 ───────────────────────────────────────
function renderCmpView() {
  const cmpWrap = document.getElementById('cmp-wrap');
  if (!cmpWrap) return;

  const fracs = state.fractions.slice(0, state.count);
  const parsed = fracs.map((f, i) => {
    const n = parseInt(f.num)||0, d = parseInt(f.den)||0;
    const whole = d>0 ? Math.floor(n/d) : 0;
    const rem   = d>0 ? n%d : 0;
    return { num:n, den:d, color:COLORS[i], whole, rem,
             circles: whole + (rem>0?1:0) || 1,
             val: d>0 ? n/d : 0 };
  });
  const hasImproper = parsed.some(f => f.den>0 && f.num>f.den);

  if (state.viewMode === 'circle') {
    if (!hasImproper) {
      // ── 진분수: 레이어드 SVG 겹치기 + 드래그 시 원색 복귀 ──
      const sz = 260;
      cmpWrap.style.cssText = `width:${sz}px;height:${sz}px;border-radius:50%;overflow:visible;position:relative;background:white;border:2px solid #ddd;`;
      cmpWrap.innerHTML = '';

      // 오름차순 정렬: 작은 분수 먼저 그려 겹침 영역 파악
      const sorted = [...parsed].sort((a,b) => a.val-b.val);
      let overlapDeg = 0;
      sorted.forEach((f, layerIdx) => {
        const myOverlapDeg = overlapDeg;
        const thisDeg = f.den>0 ? (f.num/f.den)*360 : 0;

        const div = document.createElement('div');
        div.style.cssText = `position:absolute;top:0;left:0;width:${sz}px;height:${sz}px;cursor:grab;user-select:none;-webkit-user-select:none;z-index:${layerIdx+1};transition:transform 0.45s cubic-bezier(.34,1.56,.64,1);`;
        div.innerHTML = makeLayeredPieSVG(f.num, f.den, f.color, sz, myOverlapDeg);

        let dragging = false, dsx = 0, dsy = 0;
        function onDStart(cx,cy){ dragging=true; dsx=cx; dsy=cy; div.style.transition='none'; div.style.cursor='grabbing'; div.innerHTML=makeLayeredPieSVG(f.num,f.den,f.color,sz,0); }
        function onDMove(cx,cy){ if(!dragging) return; div.style.transform=`translate(${cx-dsx}px,${cy-dsy}px)`; }
        function onDEnd(){ if(!dragging) return; dragging=false; div.style.cursor='grab'; div.style.transition='transform 0.45s cubic-bezier(.34,1.56,.64,1)'; div.style.transform='translate(0,0)'; setTimeout(()=>{ div.innerHTML=makeLayeredPieSVG(f.num,f.den,f.color,sz,myOverlapDeg); },460); }

        div.addEventListener('mousedown', e=>{ e.preventDefault(); onDStart(e.clientX,e.clientY); });
        div.addEventListener('touchstart', e=>{ e.preventDefault(); onDStart(e.touches[0].clientX,e.touches[0].clientY); },{passive:false});
        const mmH=e=>onDMove(e.clientX,e.clientY), muH=()=>onDEnd();
        const tmH=e=>{ e.preventDefault(); onDMove(e.touches[0].clientX,e.touches[0].clientY); }, tuH=()=>onDEnd();
        document.addEventListener('mousemove',mmH); document.addEventListener('mouseup',muH);
        document.addEventListener('touchmove',tmH,{passive:false}); document.addEventListener('touchend',tuH);
        div._cleanup=()=>{ document.removeEventListener('mousemove',mmH); document.removeEventListener('mouseup',muH); document.removeEventListener('touchmove',tmH); document.removeEventListener('touchend',tuH); };

        cmpWrap.appendChild(div);
        overlapDeg = Math.max(overlapDeg, thisDeg);
      });

    } else {
      // ── 가분수 포함: 분수별 행(온원 + 나머지 원) ──
      const maxC  = Math.max(...parsed.map(f => f.circles));
      const circSz = Math.min(110, Math.max(48, Math.floor(300/maxC - 8)));
      const rowH  = circSz + 6;
      const gapY  = 12;
      const totalH = state.count*rowH + (state.count-1)*gapY;
      const totalW = Math.max(280, maxC*(circSz+8) + 8);

      cmpWrap.style.cssText = `width:${totalW}px;height:${totalH}px;border-radius:12px;overflow:visible;position:relative;background:white;border:2px solid #ddd;`;
      cmpWrap.innerHTML = '';

      parsed.forEach((f, i) => {
        const y = i*(rowH+gapY);
        const rowDiv = document.createElement('div');
        rowDiv.style.cssText = `position:absolute;left:6px;top:${y}px;display:flex;gap:6px;align-items:center;cursor:grab;user-select:none;-webkit-user-select:none;transition:transform 0.45s cubic-bezier(.34,1.56,.64,1);`;

        // 온원
        for (let w=0; w<f.whole; w++) {
          const cd = document.createElement('div');
          cd.style.cssText = `width:${circSz}px;height:${circSz}px;flex-shrink:0;`;
          cd.innerHTML = makePieSVG(f.den, f.den, f.color, circSz, 1, false);
          rowDiv.appendChild(cd);
        }
        // 나머지 원
        if (f.rem > 0) {
          const cd = document.createElement('div');
          cd.style.cssText = `width:${circSz}px;height:${circSz}px;flex-shrink:0;`;
          cd.innerHTML = makePieSVG(f.rem, f.den, f.color, circSz, 1, false);
          rowDiv.appendChild(cd);
        }
        // 진분수(whole=0, rem=0인 경우 포함)
        if (f.whole===0 && f.rem===0) {
          const cd = document.createElement('div');
          cd.style.cssText = `width:${circSz}px;height:${circSz}px;flex-shrink:0;`;
          cd.innerHTML = makePieSVG(f.num, f.den, f.color, circSz, 1, false);
          rowDiv.appendChild(cd);
        }

        attachDrag(rowDiv);
        cmpWrap.appendChild(rowDiv);
      });

      const hint = document.createElement('div');
      hint.style.cssText = `position:absolute;bottom:-24px;left:0;font-size:11px;color:#aaa;white-space:nowrap;pointer-events:none;`;
      hint.textContent = '행을 드래그해서 이동 · 놓으면 복귀';
      cmpWrap.appendChild(hint);
    }

  } else {
    // ── 막대 ──
    const rowH = 52, gap = 8;

    if (!hasImproper) {
      // 진분수: 가로 한 줄 막대
      const bw = 300;
      const totalH = state.count*rowH + (state.count-1)*gap;
      cmpWrap.style.cssText = `width:${bw}px;height:${totalH}px;border-radius:12px;overflow:visible;background:transparent;border:none;position:relative;`;
      cmpWrap.innerHTML = '';

      parsed.forEach((f, i) => {
        const div = document.createElement('div');
        div.style.cssText = `position:absolute;left:0;top:${i*(rowH+gap)}px;width:${bw}px;height:${rowH}px;`;
        div.innerHTML = makeBarSVG(f.num, f.den, f.color, bw, rowH);
        cmpWrap.appendChild(div);
      });

    } else {
      // 가분수 포함: 단위 막대 여러 개로 표시
      const maxC   = Math.max(...parsed.map(f => f.circles));
      const unitW  = Math.min(220, Math.max(60, Math.floor(440/maxC - 4)));
      const gapX   = 4;
      const totalW = maxC*(unitW+gapX) - gapX;
      const totalH = state.count*rowH + (state.count-1)*gap;

      cmpWrap.style.cssText = `width:${totalW}px;height:${totalH}px;border-radius:12px;overflow:visible;background:transparent;border:none;position:relative;`;
      cmpWrap.innerHTML = '';

      parsed.forEach((f, i) => {
        const rowDiv = document.createElement('div');
        rowDiv.style.cssText = `position:absolute;left:0;top:${i*(rowH+gap)}px;display:flex;gap:${gapX}px;align-items:center;`;

        if (f.whole===0 && f.rem===0) {
          // 진분수: 단위 너비 하나로 표시
          const bd = document.createElement('div');
          bd.style.cssText = `width:${unitW}px;height:${rowH}px;flex-shrink:0;`;
          bd.innerHTML = makeBarSVG(f.num, f.den, f.color, unitW, rowH);
          rowDiv.appendChild(bd);
        } else {
          // 온원 막대
          for (let w=0; w<f.whole; w++) {
            const bd = document.createElement('div');
            bd.style.cssText = `width:${unitW}px;height:${rowH}px;flex-shrink:0;`;
            bd.innerHTML = makeBarSVG(f.den, f.den, f.color, unitW, rowH);
            rowDiv.appendChild(bd);
          }
          // 나머지 막대
          if (f.rem > 0) {
            const bd = document.createElement('div');
            bd.style.cssText = `width:${unitW}px;height:${rowH}px;flex-shrink:0;`;
            bd.innerHTML = makeBarSVG(f.rem, f.den, f.color, unitW, rowH);
            rowDiv.appendChild(bd);
          }
        }

        cmpWrap.appendChild(rowDiv);
      });
    }
  }
}

function cleanupCmpListeners() {
  const cmpWrap = document.getElementById('cmp-wrap');
  if (!cmpWrap) return;
  cmpWrap.querySelectorAll('*').forEach(d => { if (d._cleanup) d._cleanup(); });
}

// ── vizSize ───────────────────────────────────────────────
function vizSize(count) {
  if (count<=2) return 200;
  if (count===3) return 170;
  if (count===4) return 150;
  return 130;
}

// ── 패널 빌드 ────────────────────────────────────────────
let padTimers = {};

function buildMain() {
  const wrap = document.getElementById('main-wrap');
  wrap.innerHTML = ''; padTimers = {};
  const n = state.count;
  const cmpPos = Math.floor(n/2);
  for (let i = 0; i <= n; i++) {
    if (i === cmpPos) wrap.appendChild(buildCmpCol());
    if (i < n) wrap.appendChild(buildFracPanel(i));
  }
  renderAll();
  attachPadEvents();
}

function buildCmpCol() {
  const col = document.createElement('div');
  col.className = 'cmp-col'; col.id = 'cmp-col';

  const vizWrap = document.createElement('div');
  vizWrap.className = 'cmp-viz-wrap'; vizWrap.id = 'cmp-wrap';

  // 퀴즈 원형 드롭다운 (2개 분수용)
  const quizRow = document.createElement('div');
  quizRow.className = 'quiz-row'; quizRow.id = 'quiz-row';
  const qDrop = document.createElement('div');
  qDrop.className = 'quiz-dropdown'; qDrop.id = 'quiz-dropdown';
  const qTrig = document.createElement('div');
  qTrig.className = 'quiz-trigger'; qTrig.id = 'quiz-trigger';
  const qOpts = document.createElement('div');
  qOpts.className = 'quiz-options'; qOpts.id = 'quiz-options';
  ['<', '=', '>'].forEach(s => {
    const o = document.createElement('div');
    o.className = 'quiz-option'; o.textContent = s;
    o.addEventListener('click', e => { e.stopPropagation(); qOpts.classList.remove('open'); qTrig.textContent = s; onQuizClick(s); });
    qOpts.appendChild(o);
  });
  qTrig.addEventListener('click', () => { if (qTrig.classList.contains('active')) qOpts.classList.toggle('open'); });
  document.addEventListener('click', e => { if (!e.target.closest('#quiz-dropdown')) qOpts.classList.remove('open'); });
  qDrop.appendChild(qTrig); qDrop.appendChild(qOpts);
  quizRow.appendChild(qDrop);

  // 3개 이상 분수용 순위 결과 표시
  const sym = document.createElement('div');
  sym.className = 'cmp-symbol'; sym.id = 'cmp-sym';

  const btn = document.createElement('button');
  btn.className = 'btn-compare'; btn.id = 'btn-compare';
  btn.textContent = '비교하기';
  btn.addEventListener('click', doCompare);

  col.appendChild(vizWrap);
  col.appendChild(quizRow);
  col.appendChild(sym);
  col.appendChild(btn);
  return col;
}

function buildFracPanel(idx) {
  const sz = vizSize(state.count);
  const panel = document.createElement('div');
  panel.className = 'frac-panel'; panel.id = `panel-${idx}`;

  const vizWrap = document.createElement('div');
  vizWrap.className = 'viz-wrap'; vizWrap.id = `viz-${idx}`;

  const fracArea = document.createElement('div');
  fracArea.className = 'frac-area';

  const numCell = document.createElement('div');
  numCell.className = 'frac-cell'; numCell.id = `num-${idx}`; numCell.tabIndex = 0;
  numCell.textContent = state.fractions[idx].num || '?';

  const line = document.createElement('div'); line.className = 'frac-line';

  const denCell = document.createElement('div');
  denCell.className = 'frac-cell'; denCell.id = `den-${idx}`; denCell.tabIndex = 0;
  denCell.textContent = state.fractions[idx].den || '?';

  const cmpPos = Math.floor(state.count/2);
  const padSide = idx < cmpPos ? 'pad-right' : 'pad-left';
  const pad = document.createElement('div');
  pad.className = `numpad ${padSide}`; pad.id = `pad-${idx}`;
  pad.innerHTML = [1,2,3,4,5,6,7,8,9].map(v =>
    `<button class="np-btn" data-v="${v}" data-idx="${idx}">${v}</button>`
  ).join('') +
  `<button class="np-btn" data-v="0" data-idx="${idx}">0</button>` +
  `<div></div>` +
  `<button class="np-btn del" data-v="del" data-idx="${idx}">⌫</button>`;

  fracArea.appendChild(numCell);
  fracArea.appendChild(line);
  fracArea.appendChild(denCell);
  fracArea.appendChild(pad);
  panel.appendChild(vizWrap);
  panel.appendChild(fracArea);
  padTimers[idx] = null;
  return panel;
}

// ── 이벤트 ───────────────────────────────────────────────
function attachPadEvents() {
  for (let i = 0; i < state.count; i++) {
    const panel = document.getElementById(`panel-${i}`);
    const pad   = document.getElementById(`pad-${i}`);
    const numEl = document.getElementById(`num-${i}`);
    const denEl = document.getElementById(`den-${i}`);

    panel.addEventListener('mouseenter', () => showPad(i));
    panel.addEventListener('mouseleave', () => hidePad(i));
    pad.addEventListener('mouseenter',   () => clearTimeout(padTimers[i]));
    pad.addEventListener('mouseleave',   () => hidePad(i));
    numEl.addEventListener('click', () => { setActive(i,'num'); showPad(i); });
    denEl.addEventListener('click', () => { setActive(i,'den'); showPad(i); });

    pad.querySelectorAll('.np-btn').forEach(btn => {
      btn.addEventListener('mousedown', e => {
        e.preventDefault();
        const val = btn.dataset.v, fi = parseInt(btn.dataset.idx);
        if (!state.active || state.active.idx !== fi) setActive(fi,'num');
        const {part} = state.active;
        const f = state.fractions[fi];
        if (val==='del') f[part] = f[part].slice(0,-1);
        else if (f[part].length < 2) f[part] += val;
        state.compared = false; resetCmpWrap(); renderAll();
      });
    });
  }
}

function showPad(idx) {
  clearTimeout(padTimers[idx]);
  const p = document.getElementById(`pad-${idx}`);
  if (p) p.classList.add('visible');
}
function hidePad(idx) {
  padTimers[idx] = setTimeout(() => {
    const p = document.getElementById(`pad-${idx}`);
    if (p) p.classList.remove('visible');
  }, 220);
}
function setActive(idx, part) {
  document.querySelectorAll('.frac-cell.active').forEach(c => c.classList.remove('active'));
  const el = document.getElementById(`${part}-${idx}`);
  if (el) el.classList.add('active');
  state.active = {idx, part};
}
document.addEventListener('click', e => {
  if (!e.target.closest('.frac-cell') && !e.target.closest('.numpad')) {
    document.querySelectorAll('.frac-cell.active').forEach(c => c.classList.remove('active'));
    state.active = null;
  }
});
document.addEventListener('keydown', e => {
  if (!state.active) return;
  const {idx, part} = state.active;
  const f = state.fractions[idx];
  const order = [];
  for (let i = 0; i < state.count; i++) { order.push({i,p:'num'}); order.push({i,p:'den'}); }
  const cur = order.findIndex(o => o.i===idx && o.p===part);
  if (e.key>='0'&&e.key<='9') {
    if (f[part].length<2) { f[part]+=e.key; state.compared=false; resetCmpWrap(); renderAll(); }
  } else if (e.key==='Backspace') {
    f[part]=f[part].slice(0,-1); renderAll();
  } else if (['Tab','Enter','ArrowRight','ArrowDown'].includes(e.key)) {
    e.preventDefault();
    if (cur<order.length-1) { const nx=order[cur+1]; setActive(nx.i,nx.p); }
  } else if (['ArrowLeft','ArrowUp'].includes(e.key)) {
    e.preventDefault();
    if (cur>0) { const pv=order[cur-1]; setActive(pv.i,pv.p); }
  }
});

// ── 렌더링 ───────────────────────────────────────────────
function renderAll() {
  const sz = vizSize(state.count);
  for (let i = 0; i < state.count; i++) {
    const f = state.fractions[i];
    const vizEl = document.getElementById(`viz-${i}`);
    if (!vizEl) continue;
    renderFracViz(vizEl, f.num, f.den, COLORS[i], sz);
    const numEl = document.getElementById(`num-${i}`);
    const denEl = document.getElementById(`den-${i}`);
    if (numEl) numEl.textContent = f.num||'?';
    if (denEl) denEl.textContent = f.den||'?';
  }
  // 퀴즈 행 초기 가시성: 2개 분수일 때만 표시, 비교 전 비활성 상태
  const quizRow = document.getElementById('quiz-row');
  if (quizRow) quizRow.style.display = state.count === 2 ? 'flex' : 'none';
  if (state.compared) renderCmpView();
}

function resetCmpWrap() {
  cleanupCmpListeners();
  const cmpWrap = document.getElementById('cmp-wrap');
  const cmpSym  = document.getElementById('cmp-sym');
  const quizRow = document.getElementById('quiz-row');
  if (cmpWrap) {
    cmpWrap.style.width = '90px'; cmpWrap.style.height = '90px';
    cmpWrap.style.borderRadius = '50%'; cmpWrap.style.overflow = 'hidden';
    cmpWrap.style.background = 'white'; cmpWrap.style.border = '2.5px solid #f0a060';
    cmpWrap.innerHTML = '';
  }
  if (cmpSym) cmpSym.style.display = 'none';
  const qTrig = document.getElementById('quiz-trigger');
  const qOpts = document.getElementById('quiz-options');
  if (qTrig) { qTrig.textContent=''; qTrig.classList.remove('active'); }
  if (qOpts) qOpts.classList.remove('open');
  if (quizRow) quizRow.style.display = state.count === 2 ? 'flex' : 'none';
  state.correctSym = null;
  state.quizAnswered = false;
}

// ── 효과음 ───────────────────────────────────────────────
function playCorrectSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [[523,.0],[659,.12],[784,.24],[1047,.4]].forEach(([freq, t]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.28, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
      o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + 0.25);
    });
  } catch(e) {}
}
function playWrongSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sawtooth'; o.connect(g); g.connect(ctx.destination);
    o.frequency.setValueAtTime(320, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + 0.45);
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    o.start(); o.stop(ctx.currentTime + 0.5);
  } catch(e) {}
}

// ── 퀴즈 클릭 ────────────────────────────────────────────
function onQuizClick(sym) {
  if (!state.compared || state.quizAnswered || !state.correctSym) return;
  state.quizAnswered = true;

  const correct = sym === state.correctSym;
  if (correct) playCorrectSound(); else playWrongSound();

  // O/X 피드백 오버레이
  let overlay = document.getElementById('quiz-feedback-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'quiz-feedback-overlay';
    overlay.className = 'quiz-feedback-overlay';
    const mark = document.createElement('div');
    mark.className = 'feedback-mark';
    overlay.appendChild(mark);
    document.body.appendChild(overlay);
  }
  const mark = overlay.querySelector('.feedback-mark');
  if (correct) { mark.textContent = 'O'; mark.style.color = '#e06020'; }
  else         { mark.textContent = 'X'; mark.style.color = '#d02020'; }

  requestAnimationFrame(() => {
    overlay.classList.add('show');
    setTimeout(() => {
      overlay.classList.remove('show');
      // O/X 후 드롭다운 다시 활성화 (재시도 가능)
      setTimeout(() => {
        state.quizAnswered = false;
        const qTrig = document.getElementById('quiz-trigger');
        if (qTrig) qTrig.classList.add('active');
      }, 300);
    }, 1200);
  });
}

// ── 비교하기 ─────────────────────────────────────────────
function doCompare() {
  const fracs = state.fractions.slice(0, state.count);
  if (!fracs.every(f => f.num && f.den && parseInt(f.den)!==0)) {
    alert('모든 분수를 입력해 주세요!'); return;
  }
  spawnGhosts(() => {
    state.compared = true;
    state.quizAnswered = false;
    renderCmpView();

    const cmpSym  = document.getElementById('cmp-sym');
    const quizRow = document.getElementById('quiz-row');

    if (state.count === 2) {
      // 퀴즈 모드: 드롭다운 활성화
      const lv = parseInt(fracs[0].num)/parseInt(fracs[0].den);
      const rv = parseInt(fracs[1].num)/parseInt(fracs[1].den);
      state.correctSym = lv>rv ? '>' : lv<rv ? '<' : '=';

      if (quizRow) quizRow.style.display = 'flex';
      const qTrig = document.getElementById('quiz-trigger');
      if (qTrig) { qTrig.textContent=''; qTrig.classList.add('active'); }
      if (cmpSym) cmpSym.style.display = 'none';
    } else {
      // 3개 이상: 순위 결과 표시
      state.correctSym = null;
      if (quizRow) quizRow.style.display = 'none';
      if (cmpSym) {
        const sorted = fracs
          .map((f,i) => ({val: parseInt(f.num)/parseInt(f.den), idx: i+1}))
          .sort((a,b) => b.val - a.val);
        cmpSym.textContent = sorted.map(s => s.idx+'번').join(' > ');
        cmpSym.style.color = '#555';
        cmpSym.style.fontSize = state.count>3 ? '14px' : '20px';
        cmpSym.style.display = 'block';
      }
    }
  });
}

function spawnGhosts(onDone) {
  const cmpWrap = document.getElementById('cmp-wrap');
  if (!cmpWrap) { onDone(); return; }
  const cmpRect = cmpWrap.getBoundingClientRect();
  const tcx = cmpRect.left + cmpRect.width/2;
  const tcy = cmpRect.top  + cmpRect.height/2;

  const ghosts = [];
  for (let i = 0; i < state.count; i++) {
    const vizEl = document.getElementById(`viz-${i}`);
    if (!vizEl) continue;
    const r = vizEl.getBoundingClientRect();
    const g = document.createElement('div');
    g.className = 'ghost-el';
    g.style.cssText = `left:${r.left}px;top:${r.top}px;width:${r.width}px;height:${r.height}px;`;
    g.innerHTML = vizEl.innerHTML;
    document.body.appendChild(g);
    ghosts.push(g);
  }
  requestAnimationFrame(() => requestAnimationFrame(() => {
    ghosts.forEach(g => {
      g.style.left = (tcx-50)+'px'; g.style.top = (tcy-50)+'px';
      g.style.width = '100px'; g.style.height = '100px'; g.style.opacity = '0';
    });
  }));
  setTimeout(() => { ghosts.forEach(g => g.remove()); onDone(); }, 560);
}

// ── 분수 개념 익히기 ──────────────────────────────────────
const conceptState = {
  count: 0,
  split: false,
  mode: 'pizza', // 'pizza' | 'bar'
};

function initConcept() {
  conceptState.count = 0;
  conceptState.split = false;
  document.getElementById('concept-input').value = '';
  const el = document.getElementById('concept-frac-display');
  if (el) el.innerHTML = '';
  if (conceptState.mode === 'pizza') {
    renderPizza(0, false);
  } else {
    renderBar(0, false);
  }
}

function renderPizza(n, split) {
  const wrap = document.getElementById('pizza-wrap');
  wrap.innerHTML = buildPizzaSVG(n, split);
}

function renderBar(n, highlighted) {
  const track = document.getElementById('bar-track');
  if (!track) return;
  if (n <= 0) { track.innerHTML = '<div class="bar-seg"></div>'; return; }
  let html = '';
  for (let i = 0; i < n; i++) {
    html += `<div class="bar-seg${i === 0 && highlighted ? ' bar-highlight' : ''}"></div>`;
  }
  track.innerHTML = html;
}

function setConceptMode(mode) {
  conceptState.mode = mode;
  const pizzaWrap = document.getElementById('pizza-wrap');
  const barWrap = document.getElementById('bar-wrap');
  const modeBtn = document.getElementById('concept-mode-btn');
  if (mode === 'pizza') {
    pizzaWrap.style.display = '';
    barWrap.style.display = 'none';
    modeBtn.textContent = '📊 막대';
  } else {
    pizzaWrap.style.display = 'none';
    barWrap.style.display = '';
    modeBtn.textContent = '🍕 피자';
  }
  initConcept();
}

document.getElementById('concept-mode-btn').addEventListener('click', () => {
  setConceptMode(conceptState.mode === 'pizza' ? 'bar' : 'pizza');
});

function showRevealBox(val) {
  const el = document.getElementById('concept-frac-display');
  if (!el) return;
  el.innerHTML = '<div class="cfd-box" id="cfd-reveal-box"></div>';
  document.getElementById('cfd-reveal-box').addEventListener('click', () => {
    renderConceptFraction(val);
  }, { once: true });
}

function renderConceptFraction(n) {
  const el = document.getElementById('concept-frac-display');
  if (!el) return;
  if (n <= 0) {
    el.innerHTML = '';
  } else {
    el.innerHTML = `
      <div class="cfd-num cfd-animate">1</div>
      <div class="cfd-line cfd-animate" style="animation-delay:0.08s"></div>
      <div class="cfd-den cfd-animate" style="animation-delay:0.16s">${n}</div>`;
  }
}

function doConfirm() {
  const val = parseInt(document.getElementById('concept-input').value);
  if (!val || val < 1 || val > 12) { alert('1~12 사이 숫자를 입력해주세요'); return; }
  conceptState.count = val;
  conceptState.split = true;
  if (conceptState.mode === 'pizza') {
    renderPizza(val, true);
  } else {
    renderBar(val, true);
  }
  showRevealBox(val);
}

document.getElementById('concept-confirm').addEventListener('click', doConfirm);
document.getElementById('concept-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doConfirm();
});

document.getElementById('concept-reset').addEventListener('click', initConcept);

  document.getElementById('page-compare').style.display = page === 'compare' ? 'flex' : 'none';
  document.getElementById('view-tabs-bar').style.display = page === 'compare' ? 'flex' : 'none';
  document.getElementById('page-game').style.display = page === 'game' ? 'flex' : 'none';
  if (page === 'game') onGameTabOpen();
}

  const name = document.getElementById('login-student-name').value.trim();

// ── 게임 탭 진입 ─────────────────────────────────────────
let rosterRef = null;
let rosterListener = null;
let studentPresenceRef = null;

function onGameTabOpen() {
  if (session.role === 'teacher') {
    openTeacherGame();
  } else if (session.role === 'student') {
    openStudentGame();
  }
}

// ── 교사 게임 ────────────────────────────────────────────
function genRoomCode() {
  return String(Math.floor(10000 + Math.random() * 90000));
}

function openTeacherGame() {
  const tv = document.getElementById('game-teacher-view');
  tv.style.display = 'flex'; tv.style.flex = '1'; tv.style.flexDirection = 'column';
  document.getElementById('game-student-view').style.display = 'none';

  if (!session.roomCode) {
    session.roomCode = genRoomCode();
    db.ref(`rooms/${session.roomCode}`).set({ createdAt: firebase.database.ServerValue.TIMESTAMP });
  }

  document.getElementById('game-room-code-val').textContent = session.roomCode;

  // 학생 목록 실시간 리스닝
  if (rosterListener) rosterRef.off('value', rosterListener);
  rosterRef = db.ref(`rooms/${session.roomCode}/students`);
  rosterListener = rosterRef.on('value', snap => {
    const listEl = document.getElementById('roster-list');
    const emptyEl = document.getElementById('roster-empty');
    const students = [];
    snap.forEach(child => {
      const d = child.val();
      if (d.active) students.push(d.name);
    });
    if (students.length === 0) {
      listEl.innerHTML = '';
      listEl.appendChild(emptyEl);
      emptyEl.style.display = 'block';
    } else {
      listEl.innerHTML = students.map(name =>
        `<div class="roster-item"><div class="roster-dot"></div>${name}</div>`
      ).join('');
    }
  });

  // 분수 입력 → Firebase 저장
  ['game-num-input','game-den-input'].forEach(id => {
    document.getElementById(id).addEventListener('input', syncFractionToDb);
  });
}

function syncFractionToDb() {
  if (!session.roomCode) return;
  const num = document.getElementById('game-num-input').value;
  const den = document.getElementById('game-den-input').value;
  db.ref(`rooms/${session.roomCode}/fraction`).set({ num, den });
}

// ── 학생 게임 ────────────────────────────────────────────
function openStudentGame() {
  document.getElementById('game-teacher-view').style.display = 'none';
  document.getElementById('game-student-view').style.display = 'flex';
  document.getElementById('student-room-info').textContent = `방 코드: ${session.roomCode}  |  ${session.name}`;

  // Firebase에 학생 등록 (presence)
  studentPresenceRef = db.ref(`rooms/${session.roomCode}/students/${session.studentId}`);
  studentPresenceRef.set({ name: session.name, joinedAt: firebase.database.ServerValue.TIMESTAMP, active: true });

  // 접속 끊기면 active: false 처리
  studentPresenceRef.onDisconnect().update({ active: false });
}
